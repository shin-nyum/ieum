name: Android TWA (.aab)

on:
  workflow_dispatch:
  push:
    paths: ["twa/**", ".github/workflows/android.yml"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }

      - name: Restore upload keystore
        working-directory: twa
        run: echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > android.keystore

      - name: Build bundle & APK
        working-directory: twa
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon bundleRelease assembleRelease

      - name: Sign bundle (jarsigner) & APK (apksigner)
        working-directory: twa
        env:
          PASS: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          AAB=app/build/outputs/bundle/release/app-release.aab
          jarsigner -keystore android.keystore -storepass "$PASS" -keypass "$PASS" "$AAB" android
          cp "$AAB" app-release-bundle.aab
          BT=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          APK=app/build/outputs/apk/release/app-release-unsigned.apk
          "$ANDROID_HOME/build-tools/$BT/zipalign" -f 4 "$APK" aligned.apk
          "$ANDROID_HOME/build-tools/$BT/apksigner" sign --ks android.keystore \
            --ks-pass "pass:$PASS" --key-pass "pass:$PASS" --out app-release-signed.apk aligned.apk
          rm -f android.keystore aligned.apk
          ls -la app-release-bundle.aab app-release-signed.apk

      - uses: actions/upload-artifact@v4
        with:
          name: ieum-android
          path: |
            twa/app-release-bundle.aab
            twa/app-release-signed.apk
          retention-days: 30
