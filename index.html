/* ======================= 예상 하객·예산 계산기 ======================= */
function planVals(ev){ const pl=ev.plan||{};
  return { sent:+pl.sent||0, rate:pl.rate!=null?+pl.rate:60, meal:pl.meal!=null?+pl.meal:60000, gift:pl.gift!=null?+pl.gift:80000 }; }
function planInput(k,v){ const ev=hostEvent(); if(!ev.plan)ev.plan={}; ev.plan[k]=v===''?null:Number(v); save(); recalcBudget(); }
function recalcBudget(){ const ev=hostEvent(); if(!ev)return; const {sent,rate,meal,gift}=planVals(ev);
  const g=Math.round(sent*rate/100), income=g*gift, mc=g*meal, net=income-mc;
  const set=(id,val)=>{const el=document.getElementById(id); if(el)el.textContent=val;};
  set('bd-guests',g); set('bd-income',won(income)); set('bd-meal',won(mc)); set('bd-net',won(net)); }
function budgetCard(ev){ const c=cfg(ev), pl=ev.plan||{}, {sent,rate,meal,gift}=planVals(ev), led=ledgerStats(ev);
  const g=Math.round(sent*rate/100), income=g*gift, mc=g*meal, net=income-mc;
  return `<div class="card">
    <div class="secthead"><div class="t">④ 예상 ${c.counts?'하객':'조문'}·예산 계산기</div></div>
    <p class="sub">보낸 ${c.doc} 수와 참석률로 예상 인원·예산을 시뮬레이션합니다.</p>
    <div class="row">
      <div><label>보낸 ${c.doc} 수</label><input type="number" inputmode="numeric" value="${pl.sent??''}" placeholder="예: 200" oninput="planInput('sent',this.value)"></div>
      <div><label>예상 참석률(%)</label><input type="number" inputmode="numeric" value="${pl.rate??60}" oninput="planInput('rate',this.value)"></div>
    </div>
    <div class="row">
      <div><label>1인 식대(원)</label><input type="number" inputmode="numeric" value="${pl.meal??60000}" oninput="planInput('meal',this.value)"></div>
      <div><label>1인 예상 ${c.money}(원)</label><input type="number" inputmode="numeric" value="${pl.gift??80000}" oninput="planInput('gift',this.value)"></div>
    </div>
    <div class="stats" style="margin-top:12px">
      <div class="stat"><div class="v" id="bd-guests">${g}</div><div class="k">예상 ${c.counts?'참석':'조문'} 인원</div></div>
      <div class="stat"><div class="v big" id="bd-income">${won(income)}</div><div class="k">예상 ${c.money}</div></div>
      <div class="stat"><div class="v big" id="bd-meal">${won(mc)}</div><div class="k">예상 식대</div></div>
    </div>
    <div class="budget-net">예상 합계(순) <b id="bd-net">${won(net)}</b></div>
    <div class="note">현재 실제 ${c.counts?'참석':'조문'} 응답 <b>${led.attend}명</b> · 실수령 <b>${won(led.total)}</b> — 응답이 쌓일수록 예측이 정확해집니다.</div>
  </div>`;
}

/* ======================= 결제 복귀 처리 (토스 successUrl/failUrl) ======================= */
(function(){ try{
  const q=new URLSearchParams(location.search); const r=q.get('pay_result'); if(!r) return;
  const pend=payPendingGet();
  history.replaceState(null,'',location.pathname);
  if(r!=='ok'){ payPendingClear(); const msg=q.get('message'); setTimeout(()=>toast(msg?('결제 실패: '+msg):'결제를 취소했어요'),400); return; }
  const paymentKey=q.get('paymentKey'), orderId=q.get('orderId'), amount=Number(q.get('amount'));
  if(!pend){ // iOS 설치앱 등에서 복귀가 다른 브라우저 컨텍스트로 열린 경우 — 여기선 개방하지 않음(원래 앱이 부팅 복구)
    setTimeout(()=>toast('결제 확인 중 — 결제를 시작한 이음 앱을 열면 자동으로 적용돼요'),400); return; }
  // 위변조 방어: 내가 만든 주문인지 + 금액 정확 대조 + 모드 강등 차단
  if(!paymentKey || pend.orderId!==orderId || amount!==PASS_AMOUNT || pend.amount!==PASS_AMOUNT){
    payPendingClear(); setTimeout(()=>toast('결제 검증 실패(주문 정보 불일치) — 승인되지 않았어요'),400); return; }
  if(PAY.mode==='live' && pend.mode!=='live'){
    payPendingClear(); setTimeout(()=>toast('결제 모드 불일치 — 승인되지 않았어요'),400); return; }
  if(pend.mode==='live'){
    if(!PAY.confirmUrl){ payPendingClear(); setTimeout(()=>toast('결제 승인 서버 미설정 — 청구되지 않았어요. 관리자에게 문의해 주세요'),400); return; }
    pend.paymentKey=paymentKey; pend.phase='confirming'; payPendingSet(pend); // 응답 유실 대비: 재시도 핸들 보존
    payConfirm(pend);
  } else { payFinish(pend, null); } // test: 실청구 없음
}catch(e){} })();

/* ======================= 하객 응답 링크(#g=) 감지 → 주최자 장부 자동 반영 ======================= */
function clearBootHash(){ // 일부 웹뷰는 문서 파싱 중 replaceState를 무시 → 로드 완료 후 재시도
  const f=()=>{ try{ if(location.hash) history.replaceState(null,'',location.pathname); }catch(e){} };
  f(); window.addEventListener('load',f,{once:true}); setTimeout(f,700); }
(function(){ try{ const m=(location.hash||'').match(/[#&]g=([^&]+)/); if(!m) return;
  clearBootHash();
  let o=null; try{ o=JSON.parse(b64urlDec(m[1])); }catch(e){}
  if(!o||!o.n){ setTimeout(()=>toast('응답 링크가 손상됐어요'),400); return; }
  const ev=S.events.find(e=>e.role==='host' && evKey(e)===o.k);
  if(!ev){ // 이 기기의 행사가 아님(하객끼리 공유 등) — 수기 입력을 돕는다
    const info=`${o.n}${o.a!=null?(' · '+won(o.a)):''}${o.s?(' · '+(o.s==='yes'?'참석':'불참')):''}`;
    copy(info); setTimeout(()=>toast(`내 행사가 아니에요 — 주최자 폰에서 열어주세요 (${info} 복사됨)`),400); return; }
  mergeGuestReply(ev,o);
  S.ui.entered=true; S.ui.tab='host'; S.ui.hostEventId=ev.id; S.ui.hostSub=null; S.ui.hostTab='setup'; save();
  setTimeout(()=>toast(`『${o.n}』님의 응답을 장부에 반영했어요 ✓`),400);
}catch(e){} })();

/* ======================= 기기 이전 링크(#b= 데이터 / #r= 릴레이) ======================= */
(function(){ try{ const m=(location.hash||'').match(/[#&]b=([A-Za-z0-9_-]+)/); if(!m) return;
  clearBootHash();
  let p=null; try{ const c=m[1]; const body=c.slice(1);
    p=parseBackup(c[0]==='z'?lzwDec(body):b64urlDec(body)); }catch(e){}
  if(!p){ setTimeout(()=>toast('이전 링크가 손상됐어요 — 파일 백업을 이용해 주세요'),400); return; }
  handleIncomingBackup(p);
}catch(e){} })();
(function(){ try{ const m=(location.hash||'').match(/[#&]r=([A-Za-z0-9_-]+)/); if(!m) return;
  clearBootHash(); if(!RELAY.url){ setTimeout(()=>toast('이전 링크를 열 수 없어요 — 파일 백업을 이용해 주세요'),400); return; }
  fetch(RELAY.url+'/backup?k='+encodeURIComponent(m[1])).then(r=>r.ok?r.json():null).then(o=>{
    if(!o||!o.j){ toast('이전 링크가 만료됐어요 — 파일 백업을 이용해 주세요'); return; }
    let p=null; try{ const c=String(o.j); const body=c.slice(1);
      p=parseBackup(c[0]==='z'?lzwDec(body):b64urlDec(body)); }catch(e){}
    if(p) handleIncomingBackup(p); else toast('이전 링크가 손상됐어요');
  }).catch(()=>toast('이전 링크를 여는 데 실패했어요'));
}catch(e){} })();

/* ======================= 받은 청첩장 링크(#e=) 감지 → 각자 접속 (사용자 분리) ======================= */
(function(){ try{ const m=(location.hash||'').match(/[#&]e=([^&]+)/);
  if(m){ const iv=decodeInvite(m[1]);
    if(iv){ S.ui.entered=true; S.ui.tab='guest';
      const dup=S.events.find(e=>e.partyA===iv.partyA&&e.partyB===iv.partyB&&e.date===iv.date&&e.venue===iv.venue)
        || S.events.find(e=>e.role!=='host'&&e.invited&&e.partyA===iv.partyA&&e.partyB===iv.partyB&&e.type===iv.type); // 날짜·장소 변경 재공유도 같은 행사로
      if(dup){ let ch=false; // 재공유 링크의 최신 정보로 갱신 (내 응답·송금 기록은 그대로)
        if(dup.role!=='host'){ ['date','time','venue','address','message','externalUrl','subtitle'].forEach(k=>{
            if(iv[k]!==undefined && iv[k]!=='' && dup[k]!==iv[k]){ dup[k]=iv[k]; ch=true; } });
          if(iv.accounts&&iv.accounts.length&&JSON.stringify(iv.accounts)!==JSON.stringify(dup.accounts)){ dup.accounts=iv.accounts; ch=true; } }
        S.ui.currentEventId=dup.id; S.ui.guestView='detail';

      else { S.ui.pendingInvite=iv; S.ui.guestView='invite'; }
      save(); clearBootHash();
      if(RELAY.url){ try{ (async()=>{ const k=await relayKey(iv); const fl='ieum_open_'+k;
        if(!localStorage.getItem(fl)){ localStorage.setItem(fl,'1');
          fetch(RELAY.url+'/open',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({k})}).catch(()=>{}); } })(); }catch(e){} } }
    else { S.ui.entered=true; S.ui.tab='guest'; S.ui.guestView='import'; save();
      clearBootHash();
      setTimeout(()=>toast('링크가 손상됐어요 — 청첩장 내용을 붙여넣어 주세요'),400); } }
}catch(e){} })();

    <div class="tutdots">${TUT_STEPS.map((_,k)=>`<i class="${k===TUT.i?'on':''}"></i>`).join('')}</div>
    <div class="tutbtns">
      ${TUT.i>0?`<button class="btn btn-ghost btn-sm" style="flex:1" onclick="tutGo(${TUT.i-1})">이전</button>`:''}
      <button class="btn btn-primary btn-sm" style="flex:2" onclick="tutGo(${TUT.i+1})">${last?'시작하기 🎉':'다음'}</button>
    </div>`;
  if(el){ el.classList.add('tut-hi');
    if(TUT.last!==TUT.i){ try{ el.scrollIntoView({block:'center',behavior:'smooth'}); }catch(e){} TUT.last=TUT.i; } // 스텝당 1회만 스크롤
    tutPlace(el,box); setTimeout(()=>{ if(TUT.on) tutPlace(el,box); },350);
  } else { box.style.top='auto'; box.style.bottom='90px'; box.style.left='50%'; box.style.transform='translateX(-50%)'; }
}
function tutPlace(el,box){ if(!TUT.on||!document.body.contains(el)) return;
  const r=el.getBoundingClientRect(), bh=box.offsetHeight||180, bw=Math.min(340,innerWidth-40);
  box.style.transform='none'; box.style.bottom='auto';
  let top=r.bottom+12; if(top+bh>innerHeight-14) top=r.top-bh-12;
  if(top<10) top=Math.max(10, innerHeight-bh-96);
  const left=Math.min(Math.max(12, r.left+r.width/2-bw/2), innerWidth-12-bw);
  box.style.top=top+'px'; box.style.left=left+'px';
}
function endTutorial(done){ if(!TUT.on) return; TUT.on=false;
  tutTeardown();
  cleanupDemo();
  try{ pruneDraft(); }catch(e){} // 튜토리얼 중 만들어진 빈 주최자 초안 정리
  S.ui.tab='guest'; S.ui.guestView='list'; save(); render(); window.scrollTo(0,0);
  toast(done?'준비 끝! 이제 진짜 경조사를 담아보세요 🎉':'튜토리얼을 닫았어요 — 더보기에서 언제든 다시 볼 수 있어요'); }
/* ---- 데모 정리 ----
   tut(이번 튜토리얼 주입분) → 무조건 삭제(연습 조작 포함 — "끝나면 지워져요" 약속).
   demo(레거시 v1.0 소급 태깅분) → 이름 1필드가 아니라 '전체 내용 시그니처'가 순정 샘플과
   완전히 일치할 때만 삭제. 장부·하객·금액·날짜 등 어떤 흔적이라도 있으면 실데이터로 승격 보호. */
function _evSig(e){ return JSON.stringify({a:e.partyA,b:e.partyB,d:e.date,t:e.time,v:e.venue,ad:e.address,m:e.message,u:e.externalUrl||'',g:e.myGift||0,r:e.myRelation||'',
  ac:(e.accounts||[]).map(x=>[x.label,x.bank,x.number,x.holder,x.kakaopay||'']),
  gs:(e.guests||[]).map(x=>[x.name,x.relation,x.side||0,(x.rsvp||{}).status||null,(x.rsvp||{}).count||1,(x.pay||{}).amount==null?null:x.pay.amount,(x.pay||{}).method||null])
     .sort((p,q)=>String(p[0]).localeCompare(String(q[0])))}); }
function _ppSig(p){ return JSON.stringify({n:p.name,r:p.relation||'',
  it:(p.items||[]).map(i=>[i.dir,i.amount,i.label,i.date]).sort((a,b)=>String(a).localeCompare(String(b)))}); }
function cleanupDemo(){ let changed=false;
  const sd=sampleData(); const eSig={}, pSig={};
  sd.events.forEach(e=>eSig[e.id]=_evSig(e)); sd.people.forEach(p=>pSig[p.id]=_ppSig(p));
  S.events=S.events.filter(e=>{ if(!e.demo&&!e.tut) return true;
    if(e.tut || (eSig[e.id] && _evSig(e)===eSig[e.id])){ changed=true; return false; }
    delete e.demo; delete e.tut; changed=true; return true; });
  S.people=S.people.filter(p=>{ if(!p.demo&&!p.tut) return true;
    if(p.tut || (pSig[p.id] && _ppSig(p)===pSig[p.id])){ changed=true; return false; }
    delete p.demo; delete p.tut; changed=true; return true; });
  if(S.ui.currentEventId && !S.events.find(e=>e.id===S.ui.currentEventId)){ S.ui.currentEventId=null; if(S.ui.guestView==='detail')S.ui.guestView='list'; }
  if(S.ui.hostEventId && !S.events.find(e=>e.id===S.ui.hostEventId)) S.ui.hostEventId=null;
  if(changed) save(); return changed; }
window.addEventListener('resize', ()=>{ try{ if(TUT.on){ const el=document.querySelector(TUT_STEPS[TUT.i].sel); const box=document.getElementById('tutbox'); if(el&&box) tutPlace(el,box); } }catch(e){} });

/* ======================= 안드로이드 뒤로가기 지원 ======================= */
// 세부 화면에서 하드웨어 백버튼 = 앱 종료가 아니라 '한 단계 위로'. 가드 엔트리 1개 유지 패턴.
let _histGuard=false;
function atTopLevel(){ return !S.ui.entered; } // 랜딩('내 경조사/호스트' 선택 화면)에서만 백=앱 종료 — 진입 후엔 항상 한 단계 위로
function histGuard(){ if(_histGuard || atTopLevel()) return;
  _histGuard=true; try{ history.pushState({ieum:1},''); }catch(e){} }
window.addEventListener('popstate', ()=>{
  _histGuard=false;
  if(atTopLevel()) return; // 최상위면 그대로 — 한 번 더 누르면 종료
  try{
    if(document.getElementById('calsheet')) closeCalSheet();
    else if(document.getElementById('tiepop')) closeTiePop();
    else if(document.getElementById('rgsheet')) closeRestoreGuide();
    else if(document.getElementById('calpop')) closeCalPopup();
    else if(document.getElementById('paysheet')) declinePass();
    else if(typeof TUT!=='undefined'&&TUT.on) endTutorial(false);
    else if(S.ui.tab==='host'){ if(S.ui.hostSub==='thanks'){ backFromHost2(); } else { backFromHost(); } }
    else { const v=S.ui.guestView;
      if(v==='invite') declineInvite();
      else if(v==='person'||v==='personadd') openPeople();
      else if(v==='tx') setGuestTab('ledger');
      else if(v==='allev') setGuestTab('list');
      else if(v==='people') setGuestTab('ledger');
      else if(v==='settings'||v==='doc'||v==='group'||v==='envelope') setGuestTab('more');
      else if(['list','ledger','reco','more'].includes(v)) goLanding(); // 메인 탭에서 백=랜딩 (바로 종료 방지)
      else backToList(); }
  }catch(e){}
  histGuard(); // 여전히 세부 화면이면 가드 재장전
});

/* ======================= 부팅 ======================= */
window.addEventListener('error', ()=>{ try{ toast('일시적인 문제가 발생했어요'); }catch(e){} });
applyTheme();
kakaoInit();
try{ if(!TUT.on && cleanupDemo()) {} }catch(e){}  // 튜토리얼 중 앱이 꺼져 남은 데모 자동 정리
render();
try{ tryAutoRecover(); }catch(e){}
try{ payRecoverBoot(); }catch(e){}  // 미완 결제 자동 복구(승인 유실·설치앱 파티션)
try{ if(S.ui.noti) fireDueNotis(); }catch(e){}
try{ relayPull(); }catch(e){}  // 호스트: 릴레이 사서함의 하객 응답 자동 반영 (RELAY.url 설정 시에만)
try{ bootRawSnapshot(); }catch(e){}  // 업데이트 직후에도 '가공 전 원본' 3세대 보존
/* 종료·백그라운드 전환 시 자동 백업(기기 내 미러+스냅샷) — 리마인더 없이 항상 최신 유지 */
addEventListener('visibilitychange',()=>{ if(document.visibilityState!=='hidden') return;
  try{ localStorage.setItem(LS, JSON.stringify(S)); }catch(e){}
  try{ mirror(); }catch(e){} try{ dailySnapshot(); }catch(e){} });
addEventListener('pagehide',()=>{ try{ mirror(); }catch(e){} });

/* PWA: 서비스 워커 등록 */
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./service-worker.js?v=3').catch(()=>{});});}
