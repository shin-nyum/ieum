<style>
  :root{
    --bg:#f3efe8; --card:#ffffff; --ink:#39342e; --muted:#8b8378;
    --line:#e7e0d5; --primary:#a87f6a; --primary-d:#8f6852;
    --sage:#7f9080; --sage-d:#5f7060; --rose:#c08497; --gold:#bfa06a;
    --ok:#5b8c6e; --warn:#c98a4b; --danger:#bd6a5a;
    --tint:#fbf8f3; --tint2:#fbf6f1; --field:#fcfbf9; --seg-bg:#efe9e0; --ic-bg:#f4eee4; --dd-bg:#f4eedd; --note-bg:#faf7f2;
    --radius:14px; --shadow:0 6px 24px rgba(57,52,46,.08);
  }
  html[data-theme="dark"]{
    --bg:#201d19; --card:#2a2621; --ink:#ece5da; --muted:#a69c8e; --line:#39332c;
    --primary:#c69c82; --primary-d:#dcb89e; --sage:#94a594; --sage-d:#b0c3b0; --rose:#d09aaa; --gold:#cfb47d;
    --ok:#84b695; --warn:#daa86a; --danger:#df9181;
    --tint:#322d27; --tint2:#37302a; --field:#322d27; --seg-bg:#38322b; --ic-bg:#38312a; --dd-bg:#38312a; --note-bg:#2f2a24;
    --shadow:0 6px 24px rgba(0,0,0,.28);
  }
  html[data-theme="dark"] body{background:#16130f}
  html[data-theme="dark"] header{background:rgba(32,29,25,.92)}
  html[data-theme="dark"] .bnav{background:rgba(42,38,33,.96)}
  html[data-theme="dark"] .seg{background:#38322b}
  html[data-theme="dark"] .btn-ghost{background:#37312a}
  html[data-theme="dark"] .btn-line,html[data-theme="dark"] .minibtn,html[data-theme="dark"] .calnav,html[data-theme="dark"] .rrc,html[data-theme="dark"] .chip,html[data-theme="dark"] .rm-noti,html[data-theme="dark"] .seg2 button.on{background:#322d27}
  html[data-theme="dark"] .btn-disabled{background:#302b25;color:#7d746a}
  html[data-theme="dark"] .calday.ev{background:#38312a}
  html[data-theme="dark"] .relrow .bar{background:#38312a}
  html[data-theme="dark"] .budget-net{background:#37302a}
  html[data-theme="dark"] .remind{background:#2f2a24;border-color:#3a342c}
  html[data-theme="dark"] .hero{background:#2a2621}
  html[data-theme="dark"] .dday-pill,html[data-theme="dark"] .toast{background:#e8e1d5;color:#201d19}
  html[data-theme="dark"] .pill-ok,html[data-theme="dark"] .bal.pos{background:#20342a}
  html[data-theme="dark"] .pill-no,html[data-theme="dark"] .bal.neg{background:#3a2622}
  html[data-theme="dark"] .pill-wait{background:#34301f}
  html[data-theme="dark"] .bal.even{background:#302b24}
  html[data-theme="dark"] .pill-app{background:#233240;color:#9dbbdd}
  html[data-theme="dark"] .pill-cash{background:#332f24;color:#cbb888}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:#e9e3d9;color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic","맑은 고딕",sans-serif;
    font-size:15px;line-height:1.55}
  .serif{font-family:"Nanum Myeongjo",Georgia,"Apple SD Gothic Neo",serif}
  .phone{max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh;background:var(--bg);
    box-shadow:0 0 40px rgba(0,0,0,.12);position:relative;padding-bottom:calc(80px + env(safe-area-inset-bottom))}
  header{position:sticky;top:0;z-index:30;background:rgba(243,239,232,.92);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
    padding:calc(10px + env(safe-area-inset-top)) 14px 10px}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
  @keyframes viewin{from{opacity:.35;transform:translateY(4px)}to{opacity:1;transform:none}}
  main>*{animation:viewin .18s ease-out}
  .brand{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .brand .logo{display:flex;align-items:baseline;gap:8px}
  .brand b{font-size:19px;letter-spacing:.04em;color:var(--primary-d)}
  .brand .slogan{font-size:11px;color:var(--muted);letter-spacing:.02em}
  .brand .dd{font-size:11px;color:var(--muted)}
  .seg{display:flex;background:#e7e0d5;border-radius:10px;padding:3px;margin-top:9px}
  .seg button{flex:1;border:0;background:transparent;padding:8px 6px;border-radius:8px;
    font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s}
  .seg button.on{background:var(--card);color:var(--primary-d);box-shadow:0 1px 4px rgba(0,0,0,.07)}
  main{padding:16px 14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 4px;font-size:14px;letter-spacing:.02em}
  .card .sub{color:var(--muted);font-size:12px;margin:0 0 12px}
  label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px;font-weight:600}
  input,select,textarea{width:100%;padding:10px 11px;border:1px solid var(--line);
    border-radius:10px;font-size:14px;background:var(--field);color:var(--ink);font-family:inherit}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary)}
  .row{display:flex;gap:8px}.row>*{flex:1}
  .btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;
    border:0;border-radius:11px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;
    transition:.15s;font-family:inherit}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--primary);color:#fff}
  .btn-primary:hover{background:var(--primary-d)}
  .btn-kakao{background:#FEE500;color:#3A1D1D}
  .btn-toss{background:#0064FF;color:#fff}
  .btn-ghost{background:#f1ece4;color:var(--ink);border:1px solid var(--line)}
  .btn-sage{background:var(--sage);color:#fff}
  .btn-line{background:#fff;color:var(--primary-d);border:1.5px solid var(--primary)}
  .btn-sm{padding:9px 10px;font-size:13px;border-radius:9px}
  .btn[disabled],.btn-disabled{background:#ece7df;color:#b3aa9c;cursor:not-allowed;box-shadow:none}
  .btn-disabled .lock{font-size:11px;opacity:.7}
  .stack>*{margin-top:9px}
  .hero{text-align:center;padding:26px 18px 22px;background:
    radial-gradient(120% 90% at 50% 0%, #fff 0%, #f7f3ec 60%, #f0e9dd 100%);
    border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px}
  .hero .lead{font-size:11px;letter-spacing:.35em;color:var(--gold);text-transform:uppercase}
  .hero .names{font-size:25px;margin:12px 0 4px;color:#4a443c}
  .hero .names span{color:var(--rose);margin:0 9px;font-size:17px;vertical-align:middle}
  .hero .when{font-size:13px;color:var(--muted);margin-top:9px;line-height:1.7}
  .dday-pill{display:inline-block;margin-top:13px;background:var(--ink);color:#fff;
    font-size:12px;font-weight:700;letter-spacing:.05em;padding:6px 14px;border-radius:999px}
  .quote{font-size:13.5px;color:#6a6258;text-align:center;line-height:1.9;padding:4px 6px 0}
  .divider{height:1px;background:var(--line);margin:14px 0}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
  .pill-ok{background:#e7f0ea;color:var(--ok)}
  .pill-no{background:#f6e7e4;color:var(--danger)}
  .pill-wait{background:#f3ece1;color:var(--warn)}
  .pill-gold{background:var(--dd-bg);color:#9a7d3e}
  .pill-app{background:#e6eef6;color:#4a6f9a}
  .pill-cash{background:#f1ece1;color:#8a7a4e}
  .card-thumbs{display:flex;gap:8px;overflow-x:auto;padding:6px 1px 5px}
  .card-thumb{flex:none;width:50px;height:64px;border-radius:11px;border:2px solid transparent;cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 1px 4px rgba(0,0,0,.08);position:relative}
  .pbdg{position:absolute;top:-6px;right:-5px;background:var(--gold);color:#fff;font-size:9px;font-weight:800;
    padding:1.5px 5.5px;border-radius:999px;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .pchip{font-size:10px;font-weight:800;background:var(--dd-bg);color:#9a7d3e;padding:2px 8px;border-radius:999px;margin-left:4px}
  /* 결제 바텀시트 */
  .sheet-bg{position:fixed;inset:0;background:rgba(30,25,20,.45);z-index:90;display:flex;align-items:flex-end;justify-content:center;opacity:0;transition:.2s}
  .sheet-bg.show{opacity:1}
  .sheet{width:100%;max-width:430px;background:var(--card);border-radius:20px 20px 0 0;
    padding:20px 18px calc(20px + env(safe-area-inset-bottom));box-shadow:0 -8px 30px rgba(0,0,0,.18);
    transform:translateY(36px);transition:.22s}
  .sheet-bg.show .sheet{transform:none}
  .paygrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .payopt{border:1.5px solid var(--line);background:var(--field);border-radius:12px;padding:11px 12px;
    text-align:left;cursor:pointer;font-family:inherit;color:var(--ink)}
  .payopt b{display:block;font-size:13.5px}
  .payopt small{display:block;color:var(--muted);font-size:10.5px;margin-top:2px}
  .payopt.on{border-color:var(--primary);background:var(--tint2);box-shadow:0 0 0 1px var(--primary)}
  /* 튜토리얼 (스포트라이트 코치마크) */
  .tut-hi{position:relative!important;z-index:71!important;border-radius:14px;
    box-shadow:0 0 0 3px var(--gold),0 0 0 7px rgba(191,160,106,.3),0 0 0 9999px rgba(30,25,18,.45)!important}
  .tutbox{position:fixed;z-index:72;max-width:340px;width:calc(100% - 40px);background:var(--card);
    border:1px solid var(--line);border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,.28);
    padding:15px 16px 13px;transition:top .25s ease,left .25s ease}
  .tutbox .tt{font-weight:800;font-size:15px;padding-right:26px;color:var(--ink)}
  .tutbox .tx{font-size:13px;color:var(--muted);line-height:1.65;margin-top:5px}
  .tutbox .x{position:absolute;top:8px;right:10px;border:0;background:none;font-size:17px;color:var(--muted);cursor:pointer;padding:5px;line-height:1}
  .tutdots{display:flex;gap:5px;margin:11px 0 0}
  .tutdots i{width:6px;height:6px;border-radius:50%;background:var(--line);transition:.2s}
  .tutdots i.on{background:var(--gold);width:16px;border-radius:4px}
  .tutbtns{display:flex;gap:8px;margin-top:11px}
  .ftlink{border:0;background:none;color:#a59b8c;font-size:10.5px;text-decoration:underline;cursor:pointer;padding:2px 4px;font-family:inherit;opacity:.85}
  /* Quick&Easy 메인: 다음 경조사 히어로 */
  .homehero{position:relative;background:radial-gradient(120% 100% at 50% 0%,#fff 0%,#f7f1e8 70%,#f1e8da 100%);
    border:1.5px solid var(--gold);border-radius:18px;box-shadow:var(--shadow);
    padding:16px 16px 15px;margin-bottom:13px;cursor:pointer;text-align:center}
  .hh-top{display:flex;justify-content:space-between;align-items:center}
  .hh-dd{background:var(--ink);color:#fff;font-size:12px;font-weight:800;padding:5px 12px;border-radius:999px;letter-spacing:.05em}
  .hh-ic{font-size:32px;margin-top:2px}
  .hh-nm{font-size:21px;margin-top:5px;color:#463f36}
  .hh-nm .typ{font-size:11px;color:var(--sage-d);font-weight:700}
  .hh-dt{font-size:12.5px;color:var(--muted);margin-top:7px;line-height:1.7}
  .hh-btns{margin-top:12px}
  .homehero.mem{background:linear-gradient(180deg,#3a352f,#2c2823);border-color:#575047}
  .homehero.mem .hh-nm{color:#e8e0d2}.homehero.mem .hh-dt{color:#a99e8e}
  .homehero.mem .hh-dd{background:#d8cdbb;color:#26221d}
  html[data-theme="dark"] .homehero{background:linear-gradient(180deg,#332e28,#2a2621)}
  html[data-theme="dark"] .hh-nm{color:#ece5da}
  /* 접이식 섹션 */
  details.fold{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);margin-bottom:14px}
  details.fold>summary{padding:14px 16px;font-weight:700;font-size:14px;cursor:pointer;list-style:none;color:var(--ink)}
  details.fold>summary::-webkit-details-marker{display:none}
  details.fold>summary::after{content:'▾';float:right;color:var(--muted);font-size:12px}
  details.fold[open]>summary::after{content:'▴'}
  details.fold>.fold-body{padding:0 16px 16px}
  details.fold>.fold-body .card{border:0;box-shadow:none;padding:0;margin-bottom:0}
  .mi-sec{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.06em;padding:12px 14px 4px}
  /* 송금 수단 카테고리 (브랜드 버튼은 하위에 — 중립 우선) */
  .paycat{border:1px solid var(--line);border-radius:12px;background:var(--field);margin-top:8px}
  .paycat>summary{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;list-style:none}
  .paycat>summary::-webkit-details-marker{display:none}
  .paycat>summary .pc-t{flex:1}
  .paycat>summary b{font-size:14px;color:var(--ink)}
  .paycat>summary small{display:block;color:var(--muted);font-size:11.5px;margin-top:1px}
  .paycat>summary .pc-ar{color:var(--muted);font-size:12px;transition:.15s}
  .paycat[open]>summary .pc-ar{transform:rotate(180deg)}
  .paycat[open]{background:var(--card);box-shadow:0 2px 10px rgba(57,52,46,.06)}
  .pc-body{padding:2px 12px 12px}
  /* 카드 글자색 스와치 */
  .inkrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .inksw{width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,.9);cursor:pointer;
    font-size:10px;font-weight:700;color:#fff;font-family:inherit;box-shadow:0 1px 4px rgba(0,0,0,.15);padding:0}
  .inksw.on{outline:2.5px solid var(--primary);outline-offset:2px}
  .inksw.custom{background:conic-gradient(#e66,#eb3,#6c6,#5ac,#96e,#e66);font-size:15px}
  /* 송금=인연 기록 강조 */
  .tienote{background:linear-gradient(135deg,#fdf3ee,#f9e7ea);border:1px solid #eed3d4;border-radius:11px;
    padding:11px 13px;font-size:12.5px;line-height:1.7;color:#6d5350;margin-bottom:12px}
  .tienote b{color:#a05a63}
  html[data-theme="dark"] .tienote{background:#382e2c;border-color:#4a3c39;color:#cdb3ae}
  html[data-theme="dark"] .tienote b{color:#dfa0a8}
  .card-thumb.on{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary)}
  .card-preview{border-radius:12px;overflow:hidden;border:1px solid var(--line);max-width:280px;margin:6px auto 0;box-shadow:var(--shadow)}
  .card-preview svg{display:block;width:100%;height:auto}
  .glist{display:flex;flex-direction:column;gap:8px}
  .grow{border:1px solid var(--line);border-radius:11px;padding:11px 12px;background:var(--field)}
  .grow .top{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .grow .nm{font-weight:700;font-size:14px}
  .grow .meta{font-size:11.5px;color:var(--muted);margin-top:2px}
  .grow .amt{display:flex;align-items:center;gap:7px;margin-top:9px}
  .grow .amt input{padding:7px 9px;font-size:13px}
  .minibtn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 9px;
    font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;color:var(--ink)}
  .minibtn.on{background:var(--ok);color:#fff;border-color:var(--ok)}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .stat{background:var(--tint);border:1px solid var(--line);border-radius:11px;padding:11px 8px;text-align:center}
  .stat .v{font-size:19px;font-weight:800;color:var(--primary-d)}
  .stat .v.big{font-size:16px}
  .stat .k{font-size:11px;color:var(--muted);margin-top:2px}
  .seg2{display:flex;background:var(--seg-bg);border-radius:9px;padding:3px;margin:2px 0 4px}
  .seg2 button{flex:1;border:0;background:transparent;padding:8px;border-radius:7px;
    font-size:12.5px;font-weight:700;color:var(--muted);cursor:pointer}
  .seg2 button.on{background:#fff;color:var(--primary-d);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .note{font-size:11.5px;color:var(--muted);line-height:1.7;background:var(--note-bg);
    border:1px dashed var(--line);border-radius:10px;padding:10px 11px;margin-top:10px}
  .note b{color:var(--primary-d)}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:11px 18px;border-radius:999px;font-size:13px;
    font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:100;max-width:90%;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .empty{text-align:center;color:var(--muted);font-size:12.5px;padding:18px 6px}
  .footer{text-align:center;font-size:10.5px;color:#a59b8c;padding:8px 18px 0;line-height:1.7}
  .badge-add{width:100%;border:1px dashed var(--primary);background:var(--tint2);color:var(--primary-d);
    border-radius:10px;padding:11px;font-size:13px;font-weight:700;cursor:pointer}
  .secthead{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}

  const legacyNoMeta = !(o.meta && typeof o.meta==='object'); // meta가 없던 v1.0 상태만 소급 태깅 대상
  o.settings={...d.settings, ...(o.settings||{})};
  o.meta={...d.meta, ...(o.meta||{})};
  o.ui={...d.ui, ...(o.ui||{})};
  o.ui.guestSession={...d.ui.guestSession, ...((o.ui&&o.ui.guestSession)||{})};
  delete o.ui.pendingRestore; // 복원 대기본은 메모리 전용 (LS 용량 2배·잔존 방지)
  // 데모 태그 소급은 v1.0(메타 없음) 데이터에 '단 한 번만' — 이후 편집된 데이터에 재스탬프 금지
  if(legacyNoMeta){
    o.events.forEach(e=>{ if(['e1','e2','e3'].includes(e.id)) e.demo=true; });
    o.people.forEach(p=>{ if(['p1','p2','p3'].includes(p.id)) p.demo=true; });
  }
  // 이벤트/하객/계좌 깊은 정규화 (복원 파일 등 어떤 형태가 와도 뷰 크래시 방지)
  const seen=new Set();
  o.events.forEach(e=>{
    if(!e.id || seen.has(e.id)) e.id=uid('e'); seen.add(e.id);
    if(typeof e.type!=='string'||!TYPES[e.type]) e.type='wedding';
    ['partyA','partyB','subtitle','date','time','venue','address','message','externalUrl'].forEach(k=>{ if(typeof e[k]!=='string') e[k]=e[k]==null?'':String(e[k]); });
    if(!Array.isArray(e.accounts)) e.accounts=[];
    e.accounts=e.accounts.filter(a=>a&&typeof a==='object');
    e.accounts.forEach(a=>{ ['label','bank','number','holder'].forEach(k=>{ if(typeof a[k]!=='string') a[k]=a[k]==null?'':String(a[k]); }); });
    if(!Array.isArray(e.guests)) e.guests=[];
    e.guests=e.guests.filter(g=>g&&typeof g==='object');
    e.guests.forEach(g=>{ if(!g.id)g.id=uid('g'); if(typeof g.name!=='string')g.name=String(g.name||'');
      g.rsvp={status:null,count:1,meal:true, ...(g.rsvp&&typeof g.rsvp==='object'?g.rsvp:{})};
      g.pay={amount:null,source:null,method:null, ...(g.pay&&typeof g.pay==='object'?g.pay:{})}; });
  });
  const pseen=new Set();
  o.people.forEach(p=>{ if(!p.id||pseen.has(p.id))p.id=uid('p'); pseen.add(p.id);
    if(!Array.isArray(p.items))p.items=[]; p.items=p.items.filter(i=>i&&typeof i==='object'); });
  return o;
}
/* 사용자가 손댄 순간 그 데이터는 더이상 '샘플'이 아님 → 자동삭제로부터 보호(승격).

/* ---- IndexedDB 미러: localStorage가 비워져도(브라우저 정리 등) 자동 복구 ---- */
function idbOpen(){ return new Promise((res,rej)=>{ try{ const q=indexedDB.open('ieum-db',1);
  q.onupgradeneeded=()=>{ try{q.result.createObjectStore('kv');}catch(e){} };
  q.onsuccess=()=>res(q.result); q.onerror=()=>rej(q.error); }catch(e){rej(e);} }); }
function idbSet(k,v){ return idbOpen().then(db=>new Promise(res=>{ const tx=db.transaction('kv','readwrite');
  tx.objectStore('kv').put(v,k); tx.oncomplete=()=>{db.close();res(true);}; tx.onerror=()=>{db.close();res(false);} })).catch(()=>false); }

  const rq=tx.objectStore('kv').get(k); rq.onsuccess=()=>{db.close();res(rq.result);}; rq.onerror=()=>{db.close();res(undefined);} })).catch(()=>undefined); }

    if(raw && ((raw.events&&raw.events.length)||(raw.people&&raw.people.length))){
      // 복구 도착이 자동 튜토리얼과 경합하면: 투어를 정리하고 실데이터를 채택(데모 주입분은 abort가 제거)

    if(snaps.length && snaps[snaps.length-1].d===today) return;

function save(){

    if(S.events.length||S.people.length){ try{ localStorage.removeItem('ieum_wiped'); }catch(e){} } }
  try{ localStorage.setItem(LS, JSON.stringify(S)); }
  catch(e){ toast('저장 공간이 부족해요 — 데이터 정리나 백업을 권장'); }
  // 미러 갱신 제외 2경우: stale 탭 내비 저장 / 튜토리얼 중 데모 상태(자동복구 유일본을 데모로 덮는 사고 방지)

}

/* ======================= 캘린더 ======================= */
function icsStamp(d,t){const dt=new Date(d+'T'+(t||'00:00')+':00+09:00');return dt.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');}
function vevent(ev,hours){
  const start=icsStamp(ev.date,ev.time);
  const e=new Date(ev.date+'T'+(ev.time||'00:00')+':00+09:00');e.setHours(e.getHours()+(hours||2));
  const end=e.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
  return ['BEGIN:VEVENT','UID:'+uid('ics')+'@ieum','DTSTAMP:'+start,'DTSTART:'+start,'DTEND:'+end,
    'SUMMARY:'+evNamePlain(ev)+' '+cfg(ev).money.replace('금',''),'LOCATION:'+(ev.venue+' '+ev.address),
    'DESCRIPTION:'+(ev.message||'').replace(/\n/g,' '),
    'BEGIN:VALARM','TRIGGER:-P1D','ACTION:DISPLAY','DESCRIPTION:'+evNamePlain(ev),'END:VALARM','END:VEVENT'].join('\r\n');
}
/* 파일 내보내기 공용: 공유시트 우선(iOS 설치형에서 a[download]는 무동작) → 다운로드 폴백. 성공했을 때만 성공 토스트 */
function exportFile(blob, fname, shareText, okMsg){
  const file=new File([blob],fname,{type:blob.type||'application/octet-stream'});
  const dl=()=>{ if(isIOS()&&isStandalone()){ toast('이 화면에선 파일 저장이 제한돼요 — 사파리에서 열어 저장해 주세요'); return; }
    dlBlob(blob,fname); toast(okMsg); };
  if(navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file], text:shareText||fname}).then(()=>toast(okMsg))
      .catch(err=>{ if(err&&err.name==='AbortError'){ return; } dl(); });
    return;
  }
  dl();
}
function saveICS(ev){
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//ieum//ko','CALSCALE:GREGORIAN',vevent(ev,3),'END:VCALENDAR'].join('\r\n');
  exportFile(new Blob([ics],{type:'text/calendar;charset=utf-8'}),'ieum-event.ics',evNamePlain(ev)+' 일정','캘린더에 저장했어요 (.ics)');
}
function saveAllICS(){
  const body=S.events.map(e=>vevent(e,3)).join('\r\n');
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//ieum//ko','CALSCALE:GREGORIAN',body,'END:VCALENDAR'].join('\r\n');
  exportFile(new Blob([ics],{type:'text/calendar;charset=utf-8'}),'ieum-all.ics','이음 전체 일정',`경조사 ${S.events.length}건을 캘린더로 내보냈어요`);
}
function googleCal(ev){
  const start=icsStamp(ev.date,ev.time);const e=new Date(ev.date+'T'+(ev.time||'00:00')+':00+09:00');e.setHours(e.getHours()+3);
  const end=e.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
  const u='https://calendar.google.com/calendar/render?action=TEMPLATE'
    +'&text='+encodeURIComponent(evNamePlain(ev)+' '+cfg(ev).money.replace('금',''))
    +'&dates='+start+'/'+end+'&location='+encodeURIComponent(ev.venue+' '+ev.address)
    +'&details='+encodeURIComponent((ev.message||'').replace(/\n/g,' '));
  window.open(u,'_blank');
}

/* ======================= 송금 ======================= */
function tossLink(acc,amount){const num=(acc.number||'').replace(/[^0-9]/g,'');return `supertoss://send?bank=${encodeURIComponent(acc.bank)}&accountNo=${num}`+(amount?`&amount=${amount}`:'');}
function copyAcct(acc){copy(`${acc.bank} ${acc.number} ${acc.holder}`);toast('계좌번호를 복사했어요');}
function payViaApp(method){ const ev=curEvent(); if(!ev)return;
  const nm=(S.ui.guestSession.name||($('#gname')&&$('#gname').value.trim())||(S.settings&&S.settings.name)||'').trim();
  if(!nm){toast('성함을 먼저 입력하세요');return;}
  const amt=Number($('#sendamt')&&$('#sendamt').value); if(!amt){toast('보낼 금액을 입력하세요');return;}
  const acc=ev.accounts[S.ui.guestSession.acctIdx||0]||ev.accounts[0];
  if(!acc && method!=='cash'){toast('받을 계좌 정보가 없어요');return;}
  own(ev); // 검증 통과 후에만 승격 (실패 탭이 데모를 승격시키지 않도록)
  S.ui.guestSession.name=nm;
  let x=ev.guests.find(g=>g.name===nm); if(!x){x=mkGuest(nm,ev.myRelation||'지인',S.ui.guestSession.acctIdx||0);x.unregistered=true;ev.guests.push(x);}
  x.pay={amount:amt, source:method==='cash'?'manual':'app', method};
  ev.myGift=amt; save();
  if(method==='toss'){ let ok=false; try{ window.location.href=tossLink(acc,amt); ok=true; }catch(e){}
    if(!ok){ copyAcct(acc); } setTimeout(()=>toast(ok?'토스에 금액이 자동으로 채워져요':'토스를 열 수 없어 계좌를 복사했어요'),300); }
  else if(method==='kakao'){ const link=acc.kakaopay;
    if(link){ copy(`${acc.bank} ${acc.number} ${acc.holder}`); try{ window.location.href=link; }catch(e){ try{window.open(link,'_blank');}catch(e2){} }
      setTimeout(()=>toast('카카오페이로 이동 — 금액을 입력해 보내세요'),300); }
    else { copyAcct(acc); toast('카카오페이 링크가 없어 계좌를 복사했어요'); } }
  else if(method==='cash'){ toast('현금 전달로 기록했어요 — 가계부에 반영됩니다'); }
  else { copyAcct(acc); toast('계좌 복사됨 — 뱅킹앱에서 송금하세요'); }
  render(); }

/* ---------- 이음 달력 ---------- */
function ymToday(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function ensureCalYM(){ if(!S.ui.calYM){ const ds=S.events.map(e=>e.date).filter(Boolean).sort(); const t=todayStr();
  const near=ds.find(d=>d>=t)||ds[0]; S.ui.calYM = near ? near.slice(0,7) : ymToday(); } }
function selDateLabel(ds){const d=new Date(ds+'T00:00');const w=['일','월','화','수','목','금','토'];return `${d.getMonth()+1}월 ${d.getDate()}일 (${w[d.getDay()]})`;}
function calNav(delta){ ensureCalYM(); let [y,m]=S.ui.calYM.split('-').map(Number);
  const idx=y*12+(m-1)+delta; y=Math.floor(idx/12); m=idx%12+1;
  S.ui.calYM=y+'-'+String(m).padStart(2,'0'); S.ui.calSelDate=null; save(); render(); }
function calPick(ds){ S.ui.calSelDate = (S.ui.calSelDate===ds ? null : ds); save(); render(); }
function calToday(){ S.ui.calYM=ymToday(); S.ui.calSelDate=null; save(); render(); }
function addEventOnDate(ds,type){
  const isMem=type==='memorial';
  const ev={ id:uid('e'), role:'host', type, partyA:'', partyB:'',
    subtitle:isMem?'삼가 고인의 명복을 빕니다':'저희 결혼합니다',
    date:ds, time:'12:00', venue:'', address:'', message:'', externalUrl:'',
    accounts:[ {label:isMem?'상주측':'신랑측', bank:'카카오뱅크', number:'', holder:''} ], guests:[] };
  if(!isMem) ev.accounts.push({label:'신부측', bank:'토스뱅크', number:'', holder:''});
  S.events.push(ev); S.ui.hostEventId=ev.id; S.ui.tab='host'; S.ui.calSelDate=null; save(); render(); window.scrollTo(0,0);
  toast(TYPES[type].label+' 추가됨 — 정보를 입력하세요');
}
function calendarHTML(){
  ensureCalYM();
  const [y,m]=S.ui.calYM.split('-').map(Number);
  const startDow=new Date(y,m-1,1).getDay();
  const daysIn=new Date(y,m,0).getDate();
  const t=todayStr();
  const evCount={}; S.events.forEach(e=>{ if(e.date) evCount[e.date]=(evCount[e.date]||0)+1; });
  const dows=['일','월','화','수','목','금','토'];
  let cells='';
  for(let i=0;i<startDow;i++) cells+='<div class="calday empty"></div>';
  for(let d=1;d<=daysIn;d++){
    const ds=y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const has=evCount[ds]>0, isT=ds===t, isS=S.ui.calSelDate===ds;
    cells+=`<button class="calday${has?' ev':''}${isT?' today':''}${isS?' sel':''}" onclick="calPick('${ds}')">${d}${has?'<span class="cdot"></span>':''}</button>`;
  }
  const sel=S.ui.calSelDate; let below='';
  if(sel){
    const list=S.events.filter(e=>e.date===sel);
    if(list.length){
      below=`<div class="calsel"><div class="calseltt">${selDateLabel(sel)} · 경조사 ${list.length}건</div>
        ${list.map(ev=>{const c=cfg(ev);return `<div class="calevrow" onclick="openEvent('${ev.id}')">
          <span class="cic">${c.icon}</span><span class="cnm">${esc(evNamePlain(ev))||'(이름 미입력)'}</span>
          <span class="ctag">${c.label}</span><span class="cchev">›</span></div>`;}).join('')}</div>`;
    } else {
      below=`<div class="calsel"><div class="calseltt">${selDateLabel(sel)} · 경조사 없음</div>
        <div class="caladd">이 날짜에 추가 ${['wedding','hwahon','memorial'].map(tp=>`<button class="addtype" onclick="addEventOnDate('${sel}','${tp}')">${TYPES[tp].icon} ${TYPES[tp].label}</button>`).join('')}</div></div>`;
    }
  }
  return `<div class="card">
    <div class="calhead"><button class="calnav" onclick="calNav(-1)">‹</button>
      <div class="caltitle">${y}년 ${m}월 ${S.ui.calYM!==ymToday()?`<button class="minibtn" style="padding:3px 9px;font-size:11px;margin-left:6px" onclick="calToday()">오늘</button>`:''}</div>
      <button class="calnav" onclick="calNav(1)">›</button></div>
    <div class="calgrid">${dows.map((w,i)=>`<div class="caldow${i===0?' sun':''}">${w}</div>`).join('')}${cells}</div>
    ${below}
    <div class="note">💡 이음 달력 — 날짜를 누르면 그 날의 경조사를 선택하거나, 빈 날짜엔 새 경조사를 추가할 수 있어요.</div>
  </div>`;
}

function ledgerStats(ev){let attend=0,heads=0,total=0,appSum=0,manualSum=0,paid=0;
  ev.guests.forEach(x=>{if(x.rsvp.status==='yes'){attend++;heads+=x.rsvp.count||1;}

  return {attend,heads,total,appSum,manualSum,paid};}

/* ---- 백업 파일 (기기 이전의 공식 경로) ---- */
function backupPayload(){ // 데모/튜토리얼 주입분은 백업에 싣지 않음 (다른 기기 복원 오염 방지)
  const ev=S.events.filter(e=>!e.demo&&!e.tut), pp=S.people.filter(p=>!p.demo&&!p.tut);
  return { app:'ieum', v:SCHEMA_VERSION, exportedAt:new Date().toISOString(),
  counts:{events:ev.length, people:pp.length},
  data:{ events:ev, people:pp, settings:S.settings, theme:S.ui.theme||'auto' } }; }
function backupDone(){ if(S.meta){ S.meta.lastBackupAt=Date.now(); S.meta.dirty=0; } save(); render(); }
function exportData(){
  try{
    const json=JSON.stringify(backupPayload(),null,1);
    // .json.txt(text/plain): Chrome Android의 공유 확장자 허용목록에 .json이 없어 쓰는 실전 관례
    const name='ieum-backup-'+todayStr()+'.json.txt';
    const blob=new Blob([json],{type:'text/plain;charset=utf-8'});
    const file=new File([blob],name,{type:'text/plain'});
    const dlFallback=()=>{ // iOS 설치형에선 a[download]가 무동작 → 정직하게 클립보드 경로 제공
      if(isIOS()&&isStandalone()){ copy(json); backupDone(); toast('백업을 클립보드에 복사했어요 — 메모/파일 앱에 붙여넣어 보관'); return; }
      dlBlob(blob,name); backupDone(); toast('백업 파일을 저장했어요 — 안전한 곳에 보관하세요'); };
    if(navigator.canShare && navigator.canShare({files:[file]})){
      navigator.share({files:[file], title:'이음 백업', text:'이음 데이터 백업 파일 — 새 기기에서 이음 열고 [복원]으로 가져오세요'})
        .then(()=>{ backupDone(); toast('공유했어요 — 카톡 나에게/드라이브에 보관하세요'); })
        .catch(err=>{ if(err&&err.name==='AbortError'){ toast('백업을 취소했어요'); return; } // 공유시트 닫음=오류 아님
          dlFallback(); });
      return;
    }
    dlFallback();
  }catch(e){ toast('내보내기에 실패했어요'); }
}
function dlBlob(blob,name){ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name;
  document.body.appendChild(a); a.click(); setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); },800); }
function parseBackup(text){ // 신 포맷(payload) + 구 포맷(S 통짜) 모두 수용 · BOM 스트립(메모장 편집 대비)
  const o=JSON.parse(String(text).replace(/^﻿/,''));
  if(o && o.app==='ieum' && o.data) return { events:o.data.events||[], people:o.data.people||[], settings:o.data.settings||{}, theme:o.data.theme };
  if(o && Array.isArray(o.events)) return { events:o.events, people:o.people||[], settings:o.settings||{}, theme:o.ui&&o.ui.theme };
  return null;
}
let PENDING_RESTORE=null; // 메모리 전용 — LS에 싣지 않음(용량 2배·잔존 방지)
function importData(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='application/json,.json,text/plain,.txt';
  inp.style.cssText='position:fixed;left:-9999px;opacity:0'; document.body.appendChild(inp); // iOS: detached input GC 방지
  const cleanup=()=>{ try{ inp.remove(); }catch(e){} };
  inp.onchange=e=>{ const f=e.target.files&&e.target.files[0]; if(!f){cleanup();return;} const r=new FileReader();
    r.onload=()=>{ cleanup(); try{ const p=parseBackup(r.result);
        if(!p){ toast('올바른 이음 백업 파일이 아니에요'); return; }
        PENDING_RESTORE=p; S.ui.entered=true; S.ui.tab='guest'; S.ui.guestView='restore'; save(); render(); window.scrollTo(0,0);
      }catch(err){ toast('파일을 읽지 못했어요'); } };
    r.onerror=()=>{ cleanup(); toast('파일을 읽지 못했어요'); };
    r.readAsText(f); };
  inp.click(); }
function evKey(e){ return [e.partyA,e.partyB,e.date,e.venue].join('|'); }
function evHasContent(e){ return !!(e.partyA||e.partyB||e.date||e.venue||(e.guests&&e.guests.length)||e.myGift); }
function applyRestore(mode){ const p=PENDING_RESTORE; if(!p)return;
  try{ idbSet('pre-restore', JSON.stringify(coreData())); }catch(e){} // 복원 직전 안전 스냅샷
  if(mode==='replace'){ S.events=p.events; S.people=p.people; S.settings={...S.settings,...p.settings}; if(p.theme)S.ui.theme=p.theme; }
  else { // merge: 같은 행사/사람은 유지, 새 것만 추가
    // 빈 초안(evKey '|||')은 중복 판정에서 제외 — 새 기기의 자동 생성 초안이 백업 장부를 삼키지 않도록
    const have=new Set(S.events.filter(evHasContent).map(evKey));
    p.events.forEach(e=>{ if(!evHasContent(e)) return;               // 내용 없는 초안은 가져오지 않음
      if(!have.has(evKey(e))){ S.events.push(e); have.add(evKey(e)); } });
    p.people.forEach(np=>{ const mine=S.people.find(x=>x.name===np.name);
      if(!mine){ S.people.push(np); return; }
      const ids=new Set((mine.items||[]).map(i=>i.id));
      (np.items||[]).forEach(it=>{ if(!ids.has(it.id)) mine.items.push(it); }); });
  }
  S=migrate(S); // 깊은 정규화 + id 중복 재부여(delEvent 이중삭제 방지)
  try{ if(!(typeof TUT!=='undefined'&&TUT.on)) cleanupDemo(); }catch(_){} // 구 백업에 실려온 데모 정리
  PENDING_RESTORE=null; S.ui.guestView='list';
  if(S.meta){ S.meta.lastBackupAt=Date.now(); S.meta.dirty=0; }

  payPendingClear();

function payConfirm(pend){ // 승인 요청 — 일시 실패는 pending 유지 → 재실행 시 자동 복구 (중복청구 없음: 토스 confirm 멱등)

function payRecoverBoot(){ // 부팅 복구: 승인 응답 유실·iOS 설치앱 파티션 복귀 — 서버 /recover로 상태조회→필요시 승인
  const pend=payPendingGet(); if(!pend) return;
  const age=Date.now()-(pend.at||0);
  if(pend.mode!=='live'){ if(age>10*60*1000) payPendingClear(); return; } // 테스트 잔여는 조용히 정리
  if(age>24*60*60*1000){ payPendingClear(); return; }
  if(!PAY.confirmUrl) return;
  const recoverUrl=PAY.confirmUrl.replace(/\/confirm\/?$/,'/recover');
  fetch(recoverUrl+'?orderId='+encodeURIComponent(pend.orderId))
    .then(res=>res.json().then(j=>({j})).catch(()=>({j:null})))
    .then(({j})=>{
      if(j && j.ok && j.paid){ payFinish(pend, j.receiptUrl||null); return; }
      if(j && j.ok && j.paid===false && j.final){ payPendingClear(); toast('이전 결제는 승인되지 않아 청구가 없어요'); return; }

    }).catch(()=>{});

  S.events.filter(e=>e.role!=='host'&&e.myGift>0).forEach(e=>{ push(evNamePlain(e), e.myRelation, {dir:'gave',amount:e.myGift,label:cfg(e).label+' 참석',date:e.date,src:'app',auto:true}); });
  return Object.values(map).sort((a,b)=>{ const la=a.items.reduce((m,i)=>(i.date||'')>m?i.date:m,''), lb=b.items.reduce((m,i)=>(i.date||'')>m?i.date:m,''); return lb.localeCompare(la); }); }

/* ======================= 그룹 합산 축의 (N분의1) ======================= */
function groupState(){ if(!S.ui.group) S.ui.group={mode:'total', total:300000, n:5, per:50000}; return S.ui.group; }
function openGroup(){ groupState(); S.ui.guestView='group'; save(); render(); window.scrollTo(0,0); }
function groupSet(k,v){ const g=groupState(); if(k==='mode'){g.mode=v;save();render();return;} g[k]=v===''?0:(Number(v)||0); save(); recalcGroup(); }
function groupCalc(){ const g=groupState(); const n=Math.max(1,+g.n||1);
  if(g.mode==='total'){ const per=Math.round((+g.total||0)/n/1000)*1000; return {n, per, total:+g.total||0}; }
  const per=+g.per||0; return {n, per, total:per*n}; }
function recalcGroup(){ const r=groupCalc(); const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  set('g-per',won(r.per)); set('g-total',won(r.total)); set('g-n',r.n+'명'); }
function groupView(){ const g=groupState(); const r=groupCalc();
  return `<button class="backbtn" onclick="setGuestTab('more')">‹ 더보기</button>
  <div class="listhead"><div class="t serif">그룹 합산 축의</div></div>
  <p class="sub" style="margin:0 2px 12px">직장팀·동호회가 함께 축의할 때 <b>1/N 분담액</b>을 계산해요. 각자 토스/계좌로 <b>개별 송금</b>합니다(이음은 돈을 모으지 않아요).</p>
  <div class="card">
    <div class="seg2"><button class="${g.mode==='total'?'on':''}" onclick="groupSet('mode','total')">총액 → 1인당</button><button class="${g.mode==='per'?'on':''}" onclick="groupSet('mode','per')">1인당 → 총액</button></div>
    <div class="row" style="margin-top:11px">
      ${g.mode==='total'?`<div><label>총 축의금</label><input type="number" inputmode="numeric" value="${g.total}" oninput="groupSet('total',this.value)"></div>`:`<div><label>1인당</label><input type="number" inputmode="numeric" value="${g.per}" oninput="groupSet('per',this.value)"></div>`}
      <div><label>인원</label><input type="number" inputmode="numeric" value="${g.n}" oninput="groupSet('n',this.value)"></div>
    </div>
    <div class="stats" style="margin-top:13px">
      <div class="stat"><div class="v big" id="g-per">${won(r.per)}</div><div class="k">1인당</div></div>
      <div class="stat"><div class="v" id="g-n">${r.n}명</div><div class="k">인원</div></div>
      <div class="stat"><div class="v big" id="g-total">${won(r.total)}</div><div class="k">총액</div></div>
    </div>
    <div class="note">각자 1인당 금액을 <b>본인 토스/계좌</b>로 직접 보내면 됩니다. 대표 1인이 모아 보내면 송금 한도·정산 부담이 생길 수 있어요.</div>
  </div>`;
}

function upcomingSoon(){ const t=new Date(); t.setHours(0,0,0,0);

    .sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time)); }
function reminderBanner(){ const soon=upcomingSoon(); if(!soon.length) return '';

function toggleNoti(){ if(!('Notification' in window)){ toast('이 브라우저는 알림을 지원하지 않아요'); return; }

function fireDueNotis(){ if(!S.ui.noti||!('Notification' in window)||Notification.permission!=='granted')return;

/* ---- 청첩장 URL 자동 분석: 서버가 없어 공개 CORS 프록시를 경유해 HTML을 읽음 ---- */
const INVITE_PROXIES=[
  u=>'https://corsproxy.io/?url='+encodeURIComponent(u),
  u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u),
  u=>'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(u)
];
async function fetchInviteHtml(url){
  for(const mk of INVITE_PROXIES){
    try{ const ctl=new AbortController(); const tm=setTimeout(()=>ctl.abort(),9000);
      const r=await fetch(mk(url),{signal:ctl.signal}); clearTimeout(tm);
      if(!r.ok) continue; const t=await r.text();
      if(t && t.length>300) return t;
    }catch(e){}
  }
  return null;
}
function parseInviteHtml(html, url){
  const doc=new DOMParser().parseFromString(html,'text/html');
  const meta=n=>{const m=doc.querySelector(`meta[property="${n}"],meta[name="${n}"]`);return (m&&m.getAttribute('content'))||'';};
  const ogT=meta('og:title'), ogD=meta('og:description'), twT=meta('twitter:title'), twD=meta('twitter:description');
  let ogImg=meta('og:image'); try{ if(ogImg) ogImg=new URL(ogImg, url).href; }catch(e){ ogImg=''; }
  const title=(doc.querySelector('title')||{}).textContent||'';
  doc.querySelectorAll('script,style,noscript,svg').forEach(e=>e.remove());
  const body=((doc.body&&doc.body.textContent)||'').replace(/[ \t ]+/g,' ').slice(0,30000);
  const all=[ogT,ogD,twT,twD,title,body].filter(Boolean).join('\n');
  const p=parseInvite(all); p.url=url; if(ogImg&&/^https:/.test(ogImg)) p.img=ogImg;
  // 계좌 검출: 은행명 + 계좌번호 패턴 (주변 문맥으로 예금주·신랑/신부측 추정)
  const acctRe=/(카카오뱅크|토스뱅크|케이뱅크|국민|신한|우리|하나|농협|기업|SC제일|새마을금고|우체국|수협|신협|씨티|부산|대구|광주|경남|전북|제주)\s*(?:은행)?\s*[:：]?\s*(\d[\d\- ]{7,20}\d)/g;
  p.accounts=[]; const seen=new Set(); let m;
  while((m=acctRe.exec(all)) && p.accounts.length<4){
    const num=m[2].replace(/\s+/g,''); const digits=num.replace(/-/g,'');
    if(digits.length<10||digits.length>14||seen.has(digits)) continue; seen.add(digits);
    // 문맥: back=앞(측 라벨은 보통 앞에), fwd=뒤(예금주는 보통 번호 뒤에) — 이웃 계좌 줄 오염 방지
    const back=all.slice(Math.max(0,m.index-40), m.index);
    const fwd=all.slice(m.index, m.index+m[0].length+60);
    let holder=(fwd.match(/예금주\s*[:：]?\s*([가-힣]{2,4})/)||[])[1]||'';
    if(!holder){ holder=(back.match(/([가-힣]{2,4})\s*$/)||[])[1]||''; }
    if(/신랑|신부|어머니|아버지|혼주|계좌|은행|전하실/.test(holder)) holder='';
    const label=/신부|장모|장인/.test(back)?'신부측':/신랑/.test(back)?'신랑측':(p.accounts.length===0?'신랑측':'신부측');
    p.accounts.push({label, bank:m[1], number:num, holder});
  }
  return p;
}
let _impFetching=false;
async function fetchImportUrl(){
  const base=S.ui.importParsed; if(!base||!base.url||_impFetching) return;
  _impFetching=true; S.ui.importFetching=true; render();
  try{
    const html=await fetchInviteHtml(base.url);

    if(!cur || cur.url!==base.url){ return; }

  } finally { _impFetching=false; S.ui.importFetching=false; render();

}

function parseInvite(text){
  const res={names:'',date:'',time:'',venue:'',url:''};
  const um=text.match(/https?:\/\/[^\s]+/); if(um) res.url=um[0];
  let y,mo,d, m=text.match(/(20\d{2})\s*[년.\-\/]\s*(\d{1,2})\s*[월.\-\/]\s*(\d{1,2})/);
  if(m){ y=+m[1]; mo=+m[2]; d=+m[3]; }
  else if(m=text.match(/(\d{1,2})\s*월\s*(\d{1,2})\s*일/)){ mo=+m[1]; d=+m[2]; }
  else if(m=text.match(/\b(\d{1,2})[\/.](\d{1,2})\b/)){ mo=+m[1]; d=+m[2]; }
  if(mo&&d&&mo>=1&&mo<=12&&d>=1&&d<=31){ if(!y){ const now=new Date(); y=now.getFullYear();
      if(new Date(y,mo-1,d) < new Date(now.toDateString())) y++; }
    res.date=y+'-'+String(mo).padStart(2,'0')+'-'+String(d).padStart(2,'0'); }
  let hh,mm=0,pm=false,am=false, tm=text.match(/(오전|오후)?\s*(\d{1,2})\s*시\s*(\d{1,2})?\s*분?/);
  if(tm){ if(tm[1]==='오후')pm=true; if(tm[1]==='오전')am=true; hh=+tm[2]; if(tm[3])mm=+tm[3]; }
  else if(tm=text.match(/\b(\d{1,2}):(\d{2})\b/)){ hh=+tm[1]; mm=+tm[2]; }
  if(hh!=null){ if(pm&&hh<12)hh+=12; if(am&&hh===12)hh=0; if(hh>=0&&hh<=23) res.time=String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0'); }
  let nm=text.match(/([가-힣]{2,4})\s*[♥❤♡💕&,·]\s*([가-힣]{2,4})/);
  if(!nm) nm=text.match(/신랑\s*[:：]?\s*([가-힣]{2,4})[\s\S]{0,24}신부\s*[:：]?\s*([가-힣]{2,4})/);
  const badNm=/^(부고|삼가|결혼|화혼|혼인|안내|예식|모바일|청첩장|초대장|초대|감사|마음|오전|오후|본식|피로연|장소|일시|축하)$/;
  if(nm && (badNm.test(nm[1])||badNm.test(nm[2]))) nm=null;
  if(nm) res.names=nm[1]+' ♥ '+nm[2];
  const vk=/(웨딩|컨벤션|호텔|예식장|홀|가든|하우스|채플|파티움|아트홀|타워|클럽|더라움|루체|아펠가모|메리어트|그랜드|워커힐|라마다|롯데|신라|반얀트리|스퀘어|컨벤션센터)/;
  for(const ln of text.split(/[\n\r]+/)){ if(vk.test(ln)){ res.venue=ln.trim().slice(0,40); break; } }
  return res;
}

/* ======================= 예상 하객·예산 계산기 ======================= */
function planVals(ev){ const pl=ev.plan||{};
  return { sent:+pl.sent||0, rate:pl.rate!=null?+pl.rate:60, meal:pl.meal!=null?+pl.meal:60000, gift:pl.gift!=null?+pl.gift:80000 }; }
function planInput(k,v){ const ev=hostEvent(); if(!ev.plan)ev.plan={}; ev.plan[k]=v===''?null:Number(v); save(); recalcBudget(); }
function recalcBudget(){ const ev=hostEvent(); if(!ev)return; const {sent,rate,meal,gift}=planVals(ev);
  const g=Math.round(sent*rate/100), income=g*gift, mc=g*meal, net=income-mc;
  const set=(id,val)=>{const el=document.getElementById(id); if(el)el.textContent=val;};
  set('bd-guests',g); set('bd-income',won(income)); set('bd-meal',won(mc)); set('bd-net',won(net)); }
function budgetCard(ev){ const c=cfg(ev), pl=ev.plan||{}, {sent,rate,meal,gift}=planVals(ev), led=ledgerStats(ev);

(function(){ try{
  const q=new URLSearchParams(location.search); const r=q.get('pay_result'); if(!r) return;
  const pend=payPendingGet();
  history.replaceState(null,'',location.pathname);
  if(r!=='ok'){ payPendingClear(); const msg=q.get('message'); setTimeout(()=>toast(msg?('결제 실패: '+msg):'결제를 취소했어요'),400); return; }
  const paymentKey=q.get('paymentKey'), orderId=q.get('orderId'), amount=Number(q.get('amount'));
  if(!pend){ // iOS 설치앱 등에서 복귀가 다른 브라우저 컨텍스트로 열린 경우 — 여기선 개방하지 않음(원래 앱이 부팅 복구)
    setTimeout(()=>toast('결제 확인 중 — 결제를 시작한 이음 앱을 열면 자동으로 적용돼요'),400); return; }
  // 위변조 방어: 내가 만든 주문인지 + 금액 정확 대조 + 모드 강등 차단
  if(!paymentKey || pend.orderId!==orderId || amount!==PASS_AMOUNT || pend.amount!==PASS_AMOUNT){
    payPendingClear(); setTimeout(()=>toast('결제 검증 실패(주문 정보 불일치) — 승인되지 않았어요'),400); return; }
  if(PAY.mode==='live' && pend.mode!=='live'){
    payPendingClear(); setTimeout(()=>toast('결제 모드 불일치 — 승인되지 않았어요'),400); return; }
  if(pend.mode==='live'){
    if(!PAY.confirmUrl){ payPendingClear(); setTimeout(()=>toast('결제 승인 서버 미설정 — 청구되지 않았어요. 관리자에게 문의해 주세요'),400); return; }
    pend.paymentKey=paymentKey; pend.phase='confirming'; payPendingSet(pend); // 응답 유실 대비: 재시도 핸들 보존
    payConfirm(pend);
  } else { payFinish(pend, null); } // test: 실청구 없음
}catch(e){} })();

function startTutorial(){ if(TUT.on) return;

  fillSample(); tutGo(0); }

function tutTeardown(){ document.querySelectorAll('.tut-hi').forEach(e=>e.classList.remove('tut-hi'));

function abortTutorial(){ // 랜딩 이탈·멀티탭 동기화·자동복구 등: 화면 강제 이동 없이 조용히 종료+정리
  if(!TUT.on) return; TUT.on=false; tutTeardown(); try{ cleanupDemo(); }catch(e){} }
function tutApply(){ if(!TUT.on) return;
  document.querySelectorAll('.tut-hi').forEach(e=>e.classList.remove('tut-hi'));
  const st=TUT_STEPS[TUT.i];
  // 사용자가 다른 화면으로 이동했으면 동명 요소 오탐 하이라이트 금지 → 복귀 버튼 제공
  const onStep = S.ui.entered && S.ui.tab==='guest' && S.ui.guestView===st.at && (!st.ev || S.ui.currentEventId===st.ev);
  const el = onStep ? document.querySelector(st.sel) : null;
  let box=document.getElementById('tutbox');
  if(!box){ box=document.createElement('div'); box.id='tutbox'; box.className='tutbox'; document.body.appendChild(box); }
  const last=TUT.i===TUT_STEPS.length-1;
  box.innerHTML=`<button class="x" onclick="endTutorial(false)" aria-label="튜토리얼 닫기">✕</button>
    <div class="tt">${st.t}</div><div class="tx">${st.x.replace(/\n/g,'<br/>')}</div>
    ${!el?`<button class="btn btn-line btn-sm" style="margin-top:10px" onclick="tutGo(${TUT.i})">↩ 이 단계 화면으로 돌아가기</button>`:''}
    <div class="tutdots">${TUT_STEPS.map((_,k)=>`<i class="${k===TUT.i?'on':''}"></i>`).join('')}</div>
    <div class="tutbtns">
      ${TUT.i>0?`<button class="btn btn-ghost btn-sm" style="flex:1" onclick="tutGo(${TUT.i-1})">이전</button>`:''}

    if(TUT.last!==TUT.i){ try{ el.scrollIntoView({block:'center',behavior:'smooth'}); }catch(e){} TUT.last=TUT.i; } // 스텝당 1회만 스크롤

function tutPlace(el,box){ if(!TUT.on||!document.body.contains(el)) return;

  const left=Math.min(Math.max(12, r.left+r.width/2-bw/2), innerWidth-12-bw);
  box.style.top=top+'px'; box.style.left=left+'px';
}

   tut(이번 튜토리얼 주입분) → 무조건 삭제(연습 조작 포함 — "끝나면 지워져요" 약속).
   demo(레거시 v1.0 소급 태깅분) → 이름 1필드가 아니라 '전체 내용 시그니처'가 순정 샘플과
   완전히 일치할 때만 삭제. 장부·하객·금액·날짜 등 어떤 흔적이라도 있으면 실데이터로 승격 보호. */
function _evSig(e){ return JSON.stringify({a:e.partyA,b:e.partyB,d:e.date,t:e.time,v:e.venue,ad:e.address,m:e.message,u:e.externalUrl||'',g:e.myGift||0,r:e.myRelation||'',
  ac:(e.accounts||[]).map(x=>[x.label,x.bank,x.number,x.holder,x.kakaopay||'']),
  gs:(e.guests||[]).map(x=>[x.name,x.relation,x.side||0,(x.rsvp||{}).status||null,(x.rsvp||{}).count||1,(x.pay||{}).amount==null?null:x.pay.amount,(x.pay||{}).method||null])
     .sort((p,q)=>String(p[0]).localeCompare(String(q[0])))}); }
function _ppSig(p){ return JSON.stringify({n:p.name,r:p.relation||'',
  it:(p.items||[]).map(i=>[i.dir,i.amount,i.label,i.date]).sort((a,b)=>String(a).localeCompare(String(b)))}); }
function cleanupDemo(){ let changed=false;
  const sd=sampleData(); const eSig={}, pSig={};
  sd.events.forEach(e=>eSig[e.id]=_evSig(e)); sd.people.forEach(p=>pSig[p.id]=_ppSig(p));
  S.events=S.events.filter(e=>{ if(!e.demo&&!e.tut) return true;
    if(e.tut || (eSig[e.id] && _evSig(e)===eSig[e.id])){ changed=true; return false; }
    delete e.demo; delete e.tut; changed=true; return true; });
  S.people=S.people.filter(p=>{ if(!p.demo&&!p.tut) return true;
    if(p.tut || (pSig[p.id] && _ppSig(p)===pSig[p.id])){ changed=true; return false; }
    delete p.demo; delete p.tut; changed=true; return true; });
  if(S.ui.currentEventId && !S.events.find(e=>e.id===S.ui.currentEventId)){ S.ui.currentEventId=null; if(S.ui.guestView==='detail')S.ui.guestView='list'; }
  if(S.ui.hostEventId && !S.events.find(e=>e.id===S.ui.hostEventId)) S.ui.hostEventId=null;
  if(changed) save(); return changed; }
window.addEventListener('resize', ()=>{ try{ if(TUT.on){ const el=document.querySelector(TUT_STEPS[TUT.i].sel); const box=document.getElementById('tutbox'); if(el&&box) tutPlace(el,box); } }catch(e){} });

/* ======================= 안드로이드 뒤로가기 지원 ======================= */
// 세부 화면에서 하드웨어 백버튼 = 앱 종료가 아니라 '한 단계 위로'. 가드 엔트리 1개 유지 패턴.
let _histGuard=false;
function atTopLevel(){ return !S.ui.entered ||
  (S.ui.tab==='guest' && ['list','ledger','reco','more'].includes(S.ui.guestView)
   && !(typeof TUT!=='undefined'&&TUT.on) && !document.getElementById('paysheet')); }
function histGuard(){ if(_histGuard || atTopLevel()) return;
  _histGuard=true; try{ history.pushState({ieum:1},''); }catch(e){} }
window.addEventListener('popstate', ()=>{
  _histGuard=false;
  if(atTopLevel()) return; // 최상위면 그대로 — 한 번 더 누르면 종료
  try{
    if(document.getElementById('paysheet')) declinePass();
    else if(typeof TUT!=='undefined'&&TUT.on) endTutorial(false);
    else if(S.ui.tab==='host'){ if(S.ui.hostSub==='thanks'){ backFromHost2(); } else { backFromHost(); } }
    else { const v=S.ui.guestView;
      if(v==='invite') declineInvite();
      else if(v==='person') openPeople();
      else if(v==='people') setGuestTab('ledger');
      else if(v==='settings'||v==='doc'||v==='group'||v==='envelope') setGuestTab('more');
      else backToList(); }
  }catch(e){}
  histGuard(); // 여전히 세부 화면이면 가드 재장전
});

/* ======================= 부팅 ======================= */
window.addEventListener('error', ()=>{ try{ toast('일시적인 문제가 발생했어요'); }catch(e){} });
applyTheme();
kakaoInit();
try{ if(!TUT.on && cleanupDemo()) {} }catch(e){}  // 튜토리얼 중 앱이 꺼져 남은 데모 자동 정리
render();
try{ tryAutoRecover(); }catch(e){}
try{ payRecoverBoot(); }catch(e){}  // 미완 결제 자동 복구(승인 유실·설치앱 파티션)
try{ if(S.ui.noti) fireDueNotis(); }catch(e){}

/* PWA: 서비스 워커 등록 */
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./service-worker.js?v=3').catch(()=>{});});}
</script>
