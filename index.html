<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>이음 — 마음을 잇다</title>
<meta property="og:type" content="website" />
<meta property="og:title" content="이음 — 마음을 잇다" />
<meta property="og:description" content="경조사, 이제 한 곳에서. 청첩장 확인·캘린더 저장·축의금 송금까지." />
<meta property="og:image" content="https://shin-nyum.github.io/ieum/og-image.png" />
<meta property="og:url" content="https://shin-nyum.github.io/ieum/" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="이음 — 마음을 잇다" />
<meta name="twitter:image" content="https://shin-nyum.github.io/ieum/og-image.png" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#a87f6a" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="이음" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" href="icon-192.png" />
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" onerror="window.__kakaoFailed=true"></script>
<style>
  :root{
    --bg:#f3efe8; --card:#ffffff; --ink:#39342e; --muted:#8b8378;
    --line:#e7e0d5; --primary:#a87f6a; --primary-d:#8f6852;
    --sage:#7f9080; --sage-d:#5f7060; --rose:#c08497; --gold:#bfa06a;
    --ok:#5b8c6e; --warn:#c98a4b; --danger:#bd6a5a;
    --tint:#fbf8f3; --tint2:#fbf6f1; --field:#fcfbf9; --seg-bg:#efe9e0; --ic-bg:#f4eee4; --dd-bg:#f4eedd; --note-bg:#faf7f2;
    --radius:14px; --shadow:0 6px 24px rgba(57,52,46,.08);
  }
  html[data-theme="dark"]{
    --bg:#201d19; --card:#2a2621; --ink:#ece5da; --muted:#a69c8e; --line:#39332c;
    --primary:#c69c82; --primary-d:#dcb89e; --sage:#94a594; --sage-d:#b0c3b0; --rose:#d09aaa; --gold:#cfb47d;
    --ok:#84b695; --warn:#daa86a; --danger:#df9181;
    --tint:#322d27; --tint2:#37302a; --field:#322d27; --seg-bg:#38322b; --ic-bg:#38312a; --dd-bg:#38312a; --note-bg:#2f2a24;
    --shadow:0 6px 24px rgba(0,0,0,.28);
  }
  html[data-theme="dark"] body{background:#16130f}
  html[data-theme="dark"] header{background:rgba(32,29,25,.92)}
  html[data-theme="dark"] .bnav{background:rgba(42,38,33,.96)}
  html[data-theme="dark"] .seg{background:#38322b}
  html[data-theme="dark"] .btn-ghost{background:#37312a}
  html[data-theme="dark"] .btn-line,html[data-theme="dark"] .minibtn,html[data-theme="dark"] .calnav,html[data-theme="dark"] .rrc,html[data-theme="dark"] .chip,html[data-theme="dark"] .rm-noti,html[data-theme="dark"] .seg2 button.on{background:#322d27}
  html[data-theme="dark"] .btn-disabled{background:#302b25;color:#7d746a}
  html[data-theme="dark"] .calday.ev{background:#38312a}
  html[data-theme="dark"] .relrow .bar{background:#38312a}
  html[data-theme="dark"] .budget-net{background:#37302a}
  html[data-theme="dark"] .remind{background:#2f2a24;border-color:#3a342c}
  html[data-theme="dark"] .hero{background:#2a2621}
  html[data-theme="dark"] .dday-pill,html[data-theme="dark"] .toast{background:#e8e1d5;color:#201d19}
  html[data-theme="dark"] .pill-ok,html[data-theme="dark"] .bal.pos{background:#20342a}
  html[data-theme="dark"] .pill-no,html[data-theme="dark"] .bal.neg{background:#3a2622}
  html[data-theme="dark"] .pill-wait{background:#34301f}
  html[data-theme="dark"] .bal.even{background:#302b24}
  html[data-theme="dark"] .pill-app{background:#233240;color:#9dbbdd}
  html[data-theme="dark"] .pill-cash{background:#332f24;color:#cbb888}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:#e9e3d9;color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic","맑은 고딕",sans-serif;
    font-size:15px;line-height:1.55}
  .serif{font-family:"Nanum Myeongjo",Georgia,"Apple SD Gothic Neo",serif}
  .phone{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);
    box-shadow:0 0 40px rgba(0,0,0,.12);position:relative;padding-bottom:80px}
  header{position:sticky;top:0;z-index:30;background:rgba(243,239,232,.92);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:10px 14px}
  .brand{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .brand .logo{display:flex;align-items:baseline;gap:8px}
  .brand b{font-size:19px;letter-spacing:.04em;color:var(--primary-d)}
  .brand .slogan{font-size:11px;color:var(--muted);letter-spacing:.02em}
  .brand .dd{font-size:11px;color:var(--muted)}
  .seg{display:flex;background:#e7e0d5;border-radius:10px;padding:3px;margin-top:9px}
  .seg button{flex:1;border:0;background:transparent;padding:8px 6px;border-radius:8px;
    font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s}
  .seg button.on{background:var(--card);color:var(--primary-d);box-shadow:0 1px 4px rgba(0,0,0,.07)}
  main{padding:16px 14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 4px;font-size:14px;letter-spacing:.02em}
  .card .sub{color:var(--muted);font-size:12px;margin:0 0 12px}
  label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px;font-weight:600}
  input,select,textarea{width:100%;padding:10px 11px;border:1px solid var(--line);
    border-radius:10px;font-size:14px;background:var(--field);color:var(--ink);font-family:inherit}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary)}
  .row{display:flex;gap:8px}.row>*{flex:1}
  .btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;
    border:0;border-radius:11px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;
    transition:.15s;font-family:inherit}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--primary);color:#fff}
  .btn-primary:hover{background:var(--primary-d)}
  .btn-kakao{background:#FEE500;color:#3A1D1D}
  .btn-toss{background:#0064FF;color:#fff}
  .btn-ghost{background:#f1ece4;color:var(--ink);border:1px solid var(--line)}
  .btn-sage{background:var(--sage);color:#fff}
  .btn-line{background:#fff;color:var(--primary-d);border:1.5px solid var(--primary)}
  .btn-sm{padding:9px 10px;font-size:13px;border-radius:9px}
  .btn[disabled],.btn-disabled{background:#ece7df;color:#b3aa9c;cursor:not-allowed;box-shadow:none}
  .btn-disabled .lock{font-size:11px;opacity:.7}
  .stack>*{margin-top:9px}
  .hero{text-align:center;padding:26px 18px 22px;background:
    radial-gradient(120% 90% at 50% 0%, #fff 0%, #f7f3ec 60%, #f0e9dd 100%);
    border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px}
  .hero .lead{font-size:11px;letter-spacing:.35em;color:var(--gold);text-transform:uppercase}
  .hero .names{font-size:25px;margin:12px 0 4px;color:#4a443c}
  .hero .names span{color:var(--rose);margin:0 9px;font-size:17px;vertical-align:middle}
  .hero .when{font-size:13px;color:var(--muted);margin-top:9px;line-height:1.7}
  .dday-pill{display:inline-block;margin-top:13px;background:var(--ink);color:#fff;
    font-size:12px;font-weight:700;letter-spacing:.05em;padding:6px 14px;border-radius:999px}
  .quote{font-size:13.5px;color:#6a6258;text-align:center;line-height:1.9;padding:4px 6px 0}
  .divider{height:1px;background:var(--line);margin:14px 0}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
  .pill-ok{background:#e7f0ea;color:var(--ok)}
  .pill-no{background:#f6e7e4;color:var(--danger)}
  .pill-wait{background:#f3ece1;color:var(--warn)}
  .pill-gold{background:var(--dd-bg);color:#9a7d3e}
  .pill-app{background:#e6eef6;color:#4a6f9a}
  .pill-cash{background:#f1ece1;color:#8a7a4e}
  .card-thumbs{display:flex;gap:8px;overflow-x:auto;padding:3px 1px 5px}
  .card-thumb{flex:none;width:50px;height:64px;border-radius:11px;border:2px solid transparent;cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .card-thumb.on{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary)}
  .card-preview{border-radius:12px;overflow:hidden;border:1px solid var(--line);max-width:280px;margin:6px auto 0;box-shadow:var(--shadow)}
  .card-preview svg{display:block;width:100%;height:auto}
  .glist{display:flex;flex-direction:column;gap:8px}
  .grow{border:1px solid var(--line);border-radius:11px;padding:11px 12px;background:var(--field)}
  .grow .top{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .grow .nm{font-weight:700;font-size:14px}
  .grow .meta{font-size:11.5px;color:var(--muted);margin-top:2px}
  .grow .amt{display:flex;align-items:center;gap:7px;margin-top:9px}
  .grow .amt input{padding:7px 9px;font-size:13px}
  .minibtn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 9px;
    font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;color:var(--ink)}
  .minibtn.on{background:var(--ok);color:#fff;border-color:var(--ok)}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .stat{background:var(--tint);border:1px solid var(--line);border-radius:11px;padding:11px 8px;text-align:center}
  .stat .v{font-size:19px;font-weight:800;color:var(--primary-d)}
  .stat .v.big{font-size:16px}
  .stat .k{font-size:11px;color:var(--muted);margin-top:2px}
  .seg2{display:flex;background:var(--seg-bg);border-radius:9px;padding:3px;margin:2px 0 4px}
  .seg2 button{flex:1;border:0;background:transparent;padding:8px;border-radius:7px;
    font-size:12.5px;font-weight:700;color:var(--muted);cursor:pointer}
  .seg2 button.on{background:#fff;color:var(--primary-d);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .note{font-size:11.5px;color:var(--muted);line-height:1.7;background:var(--note-bg);
    border:1px dashed var(--line);border-radius:10px;padding:10px 11px;margin-top:10px}
  .note b{color:var(--primary-d)}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:11px 18px;border-radius:999px;font-size:13px;
    font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:100;max-width:90%;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .empty{text-align:center;color:var(--muted);font-size:12.5px;padding:18px 6px}
  .footer{text-align:center;font-size:10.5px;color:#a59b8c;padding:8px 18px 0;line-height:1.7}
  .badge-add{width:100%;border:1px dashed var(--primary);background:var(--tint2);color:var(--primary-d);
    border-radius:10px;padding:11px;font-size:13px;font-weight:700;cursor:pointer}
  .secthead{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .secthead .t{font-size:13px;font-weight:800;letter-spacing:.02em}
  .secthead .c{font-size:11px;color:var(--muted)}
  .acct{display:flex;align-items:center;justify-content:space-between;background:var(--tint);
    border:1px solid var(--line);border-radius:11px;padding:11px 12px;margin-top:8px}
  .acct .b{font-size:13px}.acct .b small{display:block;color:var(--muted);font-size:11px;margin-top:2px}
  /* 경조사 목록(앱 내 캘린더) */
  .listhead{display:flex;align-items:baseline;justify-content:space-between;margin:2px 2px 12px}
  .listhead .t{font-size:18px;font-weight:800;color:#4a443c}
  .listhead .c{font-size:12px;color:var(--muted)}
  .evcard{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius);padding:13px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;transition:.12s}
  .evcard:active{transform:scale(.99)}
  .evcard .ic{font-size:24px;width:48px;height:48px;flex:none;display:flex;align-items:center;
    justify-content:center;background:var(--ic-bg);border-radius:13px}
  .evcard .info{flex:1;min-width:0}
  .evcard .nm{font-weight:800;font-size:15px;color:#43403a}
  .evcard .typ{font-size:10.5px;font-weight:700;color:var(--sage-d);margin-left:6px}
  .evcard .dt{font-size:12px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .evcard .right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex:none}
  .evcard .dd{font-size:12px;font-weight:800;color:var(--primary-d);background:var(--dd-bg);padding:4px 9px;border-radius:999px;white-space:nowrap}
  .evcard .chev{color:#cabfae;font-size:16px}
  .backbtn{background:none;border:0;color:var(--primary-d);font-weight:700;font-size:13px;
    cursor:pointer;padding:4px 0;margin-bottom:6px;display:inline-flex;align-items:center;gap:4px}
  .lblnote{font-size:11px;color:var(--muted);margin-top:4px}
  /* 이음 달력 */
  .calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .caltitle{font-size:15px;font-weight:800;color:#4a443c}
  .calnav{border:1px solid var(--line);background:#fff;border-radius:8px;width:34px;height:34px;
    font-size:17px;cursor:pointer;color:var(--primary-d);line-height:1}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .caldow{text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:3px 0}
  .caldow.sun{color:var(--danger)}
  .calday{position:relative;aspect-ratio:1/1;border:0;background:transparent;border-radius:9px;
    font-size:13px;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
  .calday.empty{visibility:hidden;cursor:default}
  .calday.ev{font-weight:800;color:var(--primary-d);background:#f7f0e6}
  .calday.today{box-shadow:inset 0 0 0 1.5px var(--primary)}
  .calday.sel,.calday.sel.ev{background:var(--primary);color:#fff}
  .cdot{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--rose)}
  .calday.sel .cdot{background:#fff}
  .calsel{margin-top:12px;border-top:1px solid var(--line);padding-top:11px}
  .calseltt{font-size:12px;font-weight:800;color:var(--primary-d);margin-bottom:8px}
  .calevrow{display:flex;align-items:center;gap:9px;padding:9px 10px;border:1px solid var(--line);
    border-radius:10px;background:var(--field);cursor:pointer;margin-bottom:6px}
  .calevrow .cic{font-size:17px}.calevrow .cnm{flex:1;font-weight:700;font-size:13px}
  .calevrow .ctag{font-size:10.5px;color:var(--sage-d);font-weight:700}
  .calevrow .cchev{color:#cabfae}
  .caladd{display:flex;gap:6px;flex-wrap:wrap;align-items:center;font-size:12px;color:var(--muted)}
  .addtype{border:1px solid var(--primary);background:var(--tint2);color:var(--primary-d);border-radius:9px;
    padding:8px 11px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit}
  /* 시작(진입) 화면 */
  .landing{padding:6px 4px 20px}
  .land-hero{text-align:center;padding:34px 16px 26px}
  .land-logo{font-size:42px;color:var(--primary-d);letter-spacing:.08em;line-height:1}
  .land-slogan{font-size:13px;color:var(--gold);letter-spacing:.28em;margin-top:9px}
  .land-desc{font-size:13px;color:var(--muted);margin-top:18px;line-height:1.8}
  .land-choice{display:flex;flex-direction:column;gap:12px}
  .land-card{display:block;width:100%;text-align:left;border:1px solid var(--line);background:var(--card);
    border-radius:var(--radius);padding:20px;cursor:pointer;box-shadow:var(--shadow);transition:.12s;font-family:inherit}
  .land-card:active{transform:scale(.99)}
  .land-card.primary{border:1.5px solid var(--primary);background:var(--tint2)}
  .lc-ic{font-size:30px;line-height:1}
  .lc-t{font-size:18px;font-weight:800;color:#43403a;margin-top:9px}
  .land-card.primary .lc-t{color:var(--primary-d)}
  .lc-d{font-size:12.5px;color:var(--muted);margin-top:5px;line-height:1.6}
  .lc-go{margin-top:13px;font-size:13px;font-weight:800;color:var(--primary-d)}
  .land-foot{text-align:center;font-size:11.5px;color:var(--muted);margin-top:18px;line-height:1.6}
  .budget-net{display:flex;align-items:center;justify-content:space-between;margin-top:12px;
    background:#f3ece0;border-radius:11px;padding:13px 14px;font-weight:700;font-size:14px;color:var(--primary-d)}
  .budget-net b{font-size:19px}
  /* 가계부·관계칩 */
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 13px;font-size:12.5px;
    font-weight:700;color:var(--ink);cursor:pointer;font-family:inherit}
  .chip.on{background:var(--primary);color:#fff;border-color:var(--primary)}
  .relrow{display:flex;align-items:center;gap:9px;margin-bottom:9px}
  .relrow .rl{width:42px;font-size:12px;font-weight:700;color:var(--ink);flex:none}
  .relrow .bar{flex:1;height:9px;background:#f0e9dd;border-radius:5px;overflow:hidden}
  .relrow .bar .fill{height:100%;background:var(--primary);border-radius:5px}
  .relrow .rv,.calevrow .rv{font-size:12.5px;font-weight:800;color:var(--primary-d);min-width:62px;text-align:right;flex:none}
  /* 추천기 */
  .reco-cta{display:flex;align-items:center;gap:11px;cursor:pointer;background:var(--tint2);border-color:var(--primary)}
  .reco-cta .rc-ic{font-size:24px;flex:none}
  .reco-cta .rc-tx{flex:1;min-width:0}
  .reco-cta .rc-t{font-weight:800;font-size:15px;color:var(--primary-d)}
  .reco-cta .rc-d{font-size:12px;color:var(--muted);margin-top:2px}
  .reco-cta .rc-go{color:var(--primary-d);font-weight:800;font-size:18px;flex:none}
  .reco-result{text-align:center;background:var(--tint2);border:1px solid var(--line);border-radius:13px;padding:18px;margin-top:16px}
  .reco-result .rr-k{font-size:12px;color:var(--muted);font-weight:700}
  .reco-result .rr-v{font-size:33px;font-weight:800;color:var(--primary-d);margin-top:4px;letter-spacing:-.01em}
  .rr-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:11px}
  .rrc{font-size:12px;font-weight:700;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:999px;padding:4px 11px}
  .rrc.on{background:var(--primary);color:#fff;border-color:var(--primary)}
  /* 리마인더 */
  .remind{background:linear-gradient(180deg,#fff,#faf4ec);border-color:#e6d9c4}
  .rm-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .rm-h{font-size:13px;font-weight:800;color:var(--primary-d)}
  .rm-noti{border:1px solid var(--primary);background:#fff;color:var(--primary-d);border-radius:999px;
    padding:5px 11px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:inherit}
  .rm-noti.on{background:var(--ok);color:#fff;border-color:var(--ok)}
  .rm-ev{display:flex;align-items:center;gap:11px;cursor:pointer}
  .rm-ic{font-size:22px;width:42px;height:42px;flex:none;display:flex;align-items:center;justify-content:center;background:var(--ic-bg);border-radius:11px}
  .rm-info{flex:1;min-width:0}
  .rm-nm{font-weight:800;font-size:14px}.rm-tag{font-size:10px;color:var(--sage-d);font-weight:700;margin-left:4px}
  .rm-dt{font-size:11.5px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

<script>
/* ======================= 설정 ======================= */
// [운영자 설정] 앱 전체가 공유하는 카카오 JS 키 1개. developers.kakao.com에서 앱 생성 →
// 웹 플랫폼에 배포 도메인 등록 → 발급된 JavaScript 키를 여기에 한 번만 넣으면 모든 유저에게 적용됨.
// (비워두면 기기 기본 공유(Web Share)/링크복사로 자동 대체 — 일반 유저는 아무 설정도 필요 없음)
const KAKAO_JS_KEY = '';
try{ if(KAKAO_JS_KEY && window.Kakao && !Kakao.isInitialized()) Kakao.init(KAKAO_JS_KEY); }catch(e){}

const TYPES={
  wedding :{icon:'💍', label:'결혼', money:'축의금', join:['참석합니다','어려워요'], counts:true,  sep:'♥', nameA:'신랑', nameB:'신부', venueL:'예식장', dateL:'예식 날짜', doc:'청첩장'},
  hwahon  :{icon:'💐', label:'화혼', money:'축의금', join:['참석합니다','어려워요'], counts:true,  sep:'♥', nameA:'신랑', nameB:'신부', venueL:'예식장', dateL:'예식 날짜', doc:'청첩장'},
  memorial:{icon:'🕊️', label:'부고', money:'조의금', join:['조문합니다','어려워요'], counts:false, sep:'',  nameA:'고인', nameB:'상주', venueL:'빈소',   dateL:'발인 일자', doc:'부고'}
};
const BANKS=['카카오뱅크','토스뱅크','국민','신한','우리','하나','농협','기업','SC제일','새마을금고'];
const RELATIONS=['가족','친척','친구','직장','선후배','기타'];

/* ======================= 상태 ======================= */
const LS='ieum_v3';
let _id=1; const uid=p=>(p||'x')+Date.now().toString(36)+(_id++);
// pay: { amount, source:'app'|'manual', method:'toss'|'account'|'cash' }
function mkGuest(name,relation,side,pay){return {id:uid('g'),name,relation,side:side||0,
  rsvp:{status:null,count:1,meal:true}, pay:pay||{amount:null,source:null,method:null}, unregistered:false};}

function seed(){
  return {
    events:[
      { id:'e1', role:'host', type:'wedding',
        partyA:'김민준', partyB:'이서연', subtitle:'저희 결혼합니다',
        date:'2026-10-17', time:'13:00', venue:'더채플 앳 청담', address:'서울 강남구 청담동 123-4',
        message:'서로 마주보며 다져온 사랑을\n이제 함께 한곳을 바라보며\n걸어가고자 합니다.',
        externalUrl:'',
        accounts:[ {label:'신랑측', bank:'카카오뱅크', number:'3333-01-1234567', holder:'김민준', kakaopay:'https://qr.kakaopay.com/demo-minjun'},
                   {label:'신부측', bank:'토스뱅크', number:'1000-12-3456789', holder:'이서연'} ],
        guests:[ mkGuest('박지훈','친구',0,{amount:100000,source:'app',method:'toss'}),
                 mkGuest('최수아','직장',1,{amount:50000,source:'manual',method:'cash'}),
                 mkGuest('정해린','가족',1) ] },
      { id:'e2', role:'guest', type:'wedding',
        partyA:'박서준', partyB:'김지우', subtitle:'결혼합니다',
        date:'2026-09-05', time:'12:00', venue:'그랜드 워커힐 서울', address:'서울 광진구 워커힐로 177',
        message:'두 사람이 사랑으로 만나\n새로운 가정을 이룹니다.',
        externalUrl:'https://www.barunsoncard.com',
        accounts:[ {label:'신랑측', bank:'국민', number:'123-45-6789012', holder:'박서준', kakaopay:'https://qr.kakaopay.com/demo-seojun'},
                   {label:'신부측', bank:'신한', number:'110-234-567890', holder:'김지우'} ],
        myGift:100000, myRelation:'친구', guests:[] },
      { id:'e3', role:'guest', type:'memorial',
        partyA:'故 김정호', partyB:'', subtitle:'삼가 고인의 명복을 빕니다',
        date:'2026-07-03', time:'09:00', venue:'서울추모공원 빈소 3호', address:'서울 서초구 원지동 산4',
        message:'장례에 마음 보태주셔서 감사합니다.\n상주 김민수',
        externalUrl:'',
        accounts:[ {label:'상주측', bank:'농협', number:'302-1234-5678-91', holder:'김민수'} ],
        myGift:50000, myRelation:'직장', guests:[] }
    ],
    people:[
      { id:'p1', name:'박서준', relation:'친구', items:[ {id:'pi1', dir:'gave', amount:100000, label:'결혼식', date:'2026-09-05'} ] },
      { id:'p2', name:'이수민', relation:'친구', items:[ {id:'pi2', dir:'received', amount:100000, label:'내 결혼식 때', date:'2024-05-11'}, {id:'pi3', dir:'gave', amount:50000, label:'돌잔치', date:'2025-08-20'} ] },
      { id:'p3', name:'김태영', relation:'직장', items:[ {id:'pi4', dir:'received', amount:50000, label:'내 결혼식 때', date:'2024-05-11'} ] }
    ],
    settings:{ name:'', kakaoKey:'', premium:true },
    ui:{ entered:false, tab:'guest', hostEventId:'e1', guestView:'list', currentEventId:null,
         guestSession:{name:'', acctIdx:0} }
  };
}
let S=load();
function load(){ try{const r=localStorage.getItem(LS); if(r){ const o=JSON.parse(r); const d=seed();
  o.ui={...d.ui, ...(o.ui||{})}; o.ui.guestSession={...d.ui.guestSession, ...((o.ui&&o.ui.guestSession)||{})};
  if(!Array.isArray(o.events)) o.events=d.events; if(!Array.isArray(o.people)) o.people=d.people;
  o.settings={...d.settings, ...(o.settings||{})}; return o; } }catch(e){} return seed(); }
function save(){ localStorage.setItem(LS, JSON.stringify(S)); }
function reset(){ if(confirm('데모 데이터를 초기화할까요?')){ localStorage.removeItem(LS); S=seed(); applyTheme(); render(); toast('초기화했어요'); } }
function applyTheme(){ const t=(S.ui&&S.ui.theme)||'auto';
  const dark = t==='dark' || (t==='auto' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.dataset.theme = dark?'dark':'light';
  const m=document.querySelector('meta[name="theme-color"]'); if(m) m.setAttribute('content', dark?'#201d19':'#a87f6a'); }
function setTheme(t){ S.ui.theme=t; save(); applyTheme(); render(); }
try{ if(window.matchMedia) window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',()=>{ if(((S.ui&&S.ui.theme)||'auto')==='auto') applyTheme(); }); }catch(e){}

/* ======================= 유틸 ======================= */
const $=s=>document.querySelector(s);
const won=n=>'₩'+(Number(n)||0).toLocaleString('ko-KR');
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
const cfg=ev=>TYPES[ev.type]||TYPES.wedding;
function evName(ev){const c=cfg(ev);return ev.partyB?`${esc(ev.partyA)}${c.sep?` <span>${c.sep}</span> `:' '}${esc(ev.partyB)}`:esc(ev.partyA);}
function evNamePlain(ev){const c=cfg(ev);return ev.partyB?`${ev.partyA}${c.sep?' '+c.sep+' ':' '}${ev.partyB}`:ev.partyA;}
function dateText(ev){if(!ev.date)return '';const d=new Date(ev.date+'T'+(ev.time||'00:00'));
  const w=['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${w[d.getDay()]}) ${ev.time||''}`;}
function dday(ev){if(!ev.date)return '';const t=new Date();t.setHours(0,0,0,0);
  const d=new Date(ev.date+'T00:00');const n=Math.round((d-t)/86400000);
  return n>0?`D-${n}`:n===0?'D-DAY':`D+${-n}`;}
function copy(text){if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(text).catch(()=>fbCopy(text));}else fbCopy(text);}
function fbCopy(text){const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);}
const hostEvent=()=>S.events.find(e=>e.id===S.ui.hostEventId);
const curEvent=()=>S.events.find(e=>e.id===S.ui.currentEventId);

/* ======================= 탭/내비 ======================= */
function setTab(t){S.ui.tab=t;save();render();}
function openEvent(id){S.ui.currentEventId=id;S.ui.guestView='detail';S.ui.guestSession.acctIdx=0;save();render();window.scrollTo(0,0);}
function backToList(){S.ui.guestView='list';save();render();window.scrollTo(0,0);}

/* ======================= 청첩장 공유 ======================= */
/* 행사 정보를 링크에 인코딩 → 단톡방 공유 시 각자 열면 그 청첩장이 뜨고, 각자 자기 이음에 담김(백엔드 없이 사용자 분리) */
function b64urlEnc(str){ return btoa(unescape(encodeURIComponent(str))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
function b64urlDec(str){ str=str.replace(/-/g,'+').replace(/_/g,'/'); while(str.length%4)str+='='; return decodeURIComponent(escape(atob(str))); }
function encodeInvite(ev){ const o={t:ev.type,a:ev.partyA,b:ev.partyB,s:ev.subtitle,d:ev.date,ti:ev.time,v:ev.venue,ad:ev.address,m:ev.message,u:ev.externalUrl||'',
  ac:(ev.accounts||[]).map(a=>({l:a.label,bk:a.bank,n:a.number,h:a.holder,k:a.kakaopay||''}))};
  return b64urlEnc(JSON.stringify(o)); }
function decodeInvite(code){ try{ const o=JSON.parse(b64urlDec(code));
  return { id:uid('e'), role:'guest', type:o.t||'wedding', partyA:o.a||'', partyB:o.b||'', subtitle:o.s||'', date:o.d||'', time:o.ti||'12:00', venue:o.v||'', address:o.ad||'', message:o.m||'', externalUrl:o.u||'', invited:true,
    accounts:(o.ac||[]).map(a=>({label:a.l,bank:a.bk,number:a.n,holder:a.h,kakaopay:a.k||''})), guests:[] }; }catch(e){ return null; } }
function inviteLink(ev){ const base=location.href.split('#')[0].split('?')[0]; const dir=base.replace(/[^/]*$/,'');
  const page = ev.type==='memorial' ? dir+'memorial.html' : base;  /* 부고는 조의용 썸네일 페이지로 */
  return page + '#e=' + encodeInvite(ev); }
function shareEvent(ev){
  const link = inviteLink(ev); const c=cfg(ev); const mem=ev.type==='memorial';
  const ogImg = ev.shareImg || (mem ? 'https://shin-nyum.github.io/ieum/og-memorial.png' : 'https://shin-nyum.github.io/ieum/og-image.png');
  const text=`${evNamePlain(ev)} ${ev.subtitle}\n${dateText(ev)} · ${ev.venue}\n${mem?'부고 확인·조의 전하기':'청첩장 확인·캘린더·축의금 보내기'} ▸`;
  const ready=window.Kakao&&Kakao.isInitialized&&Kakao.isInitialized();
  if(ready){
    try{ Kakao.Share.sendDefault({objectType:'feed',
      content:{title:`${evNamePlain(ev)} ${ev.subtitle}`, description:`${dateText(ev)} · ${ev.venue}`,
        imageUrl:ogImg,
        link:{mobileWebUrl:link,webUrl:link}},
      buttons:[{title:`${c.doc} 열기`,link:{mobileWebUrl:link,webUrl:link}}]}); return; }catch(e){}
  }
  if(navigator.share){ navigator.share({title:`${evNamePlain(ev)} ${ev.subtitle}`,text,url:link}).catch(()=>{}); return; }
  copy(text+'\n'+link);
  toast(`${c.doc} 링크를 복사했어요 — 단톡방에 붙여넣으세요`);
}
/* 외부 모바일청첩장 링크를 그대로 공유 → 그 청첩장의 썸네일이 카카오톡에 뜸 */
function shareExternal(ev){ if(!ev.externalUrl){ toast('연결된 모바일청첩장이 없어요'); return; }
  const text=`${evNamePlain(ev)} ${ev.subtitle}\n${dateText(ev)} · ${ev.venue}`;
  if(navigator.share){ navigator.share({title:`${evNamePlain(ev)} ${ev.subtitle}`,text,url:ev.externalUrl}).catch(()=>{}); return; }
  copy(ev.externalUrl); toast('청첩장 링크를 복사했어요'); }
function openExternal(ev){
  if(ev.externalUrl){ window.open(ev.externalUrl,'_blank'); }
  else toast('호스트가 외부 청첩장 링크를 입력하면 여기서 열립니다');
}
/* 받은 청첩장(링크로 접속) 수락 화면 */
function acceptInvite(){ const iv=S.ui.pendingInvite; if(!iv)return;
  const dup=S.events.find(e=>e.partyA===iv.partyA&&e.partyB===iv.partyB&&e.date===iv.date&&e.venue===iv.venue);
  if(dup){ S.ui.currentEventId=dup.id; } else { S.events.push(iv); S.ui.currentEventId=iv.id; }
  S.ui.pendingInvite=null; S.ui.guestView='detail'; save(); render(); window.scrollTo(0,0); toast('내 경조사에 담았어요'); }
function declineInvite(){ S.ui.pendingInvite=null; S.ui.guestView='list'; save(); render(); }
function openInviteExternal(){ const iv=S.ui.pendingInvite; if(iv&&iv.externalUrl) window.open(iv.externalUrl,'_blank'); }
function inviteView(){ const iv=S.ui.pendingInvite; if(!iv){ S.ui.guestView='list'; return guestList(); } const c=cfg(iv); const mem=iv.type==='memorial';
  return `<div class="hero" style="margin-top:6px">
    <div class="lead">${mem?'부고':'청첩장이 도착했어요'}</div>
    <div class="names serif">${evName(iv)}</div>
    <div class="when">${dateText(iv)}<br/>${esc(iv.venue)}</div>
    <div class="dday-pill">${dday(iv)}</div>
  </div>
  <div class="card">
    <p class="quote serif">${(esc(iv.message||'').replace(/\n/g,'<br/>'))||'귀한 걸음으로 함께해 주세요.'}</p>
    <div class="stack" style="margin-top:8px">
      <button class="btn btn-primary" onclick="acceptInvite()">${mem?'확인하고 내 경조사에 담기':'수락하고 내 경조사에 담기'}</button>
      ${iv.externalUrl?`<button class="btn btn-line" onclick="openInviteExternal()">🔗 ${c.doc} 전체보기</button>`:''}
      <button class="btn btn-ghost btn-sm" onclick="declineInvite()">나중에</button>
    </div>
    <div class="note">수락하면 이 경조사가 <b>내 이음</b>에만 저장돼요 (내 기기 · 다른 분과 분리). 이후 캘린더 저장·${c.money} 송금을 여기서 한 번에.</div>
  </div>`;
}

/* ======================= 캘린더 ======================= */
function icsStamp(d,t){const dt=new Date(d+'T'+(t||'00:00')+':00+09:00');return dt.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');}
function vevent(ev,hours){
  const start=icsStamp(ev.date,ev.time);
  const e=new Date(ev.date+'T'+(ev.time||'00:00')+':00+09:00');e.setHours(e.getHours()+(hours||2));
  const end=e.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
  return ['BEGIN:VEVENT','UID:'+uid('ics')+'@ieum','DTSTAMP:'+start,'DTSTART:'+start,'DTEND:'+end,
    'SUMMARY:'+evNamePlain(ev)+' '+cfg(ev).money.replace('금',''),'LOCATION:'+(ev.venue+' '+ev.address),
    'DESCRIPTION:'+(ev.message||'').replace(/\n/g,' '),
    'BEGIN:VALARM','TRIGGER:-P1D','ACTION:DISPLAY','DESCRIPTION:'+evNamePlain(ev),'END:VALARM','END:VEVENT'].join('\r\n');
}
function downloadICS(content,fname){const blob=new Blob([content],{type:'text/calendar;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fname;document.body.appendChild(a);a.click();a.remove();}
function saveICS(ev){
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//ieum//ko','CALSCALE:GREGORIAN',vevent(ev,3),'END:VCALENDAR'].join('\r\n');
  downloadICS(ics,'ieum-event.ics');toast('캘린더에 저장했어요 (.ics)');
}
function saveAllICS(){
  const body=S.events.map(e=>vevent(e,3)).join('\r\n');
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//ieum//ko','CALSCALE:GREGORIAN',body,'END:VCALENDAR'].join('\r\n');
  downloadICS(ics,'ieum-all.ics');toast(`경조사 ${S.events.length}건을 캘린더로 내보냈어요`);
}
function googleCal(ev){
  const start=icsStamp(ev.date,ev.time);const e=new Date(ev.date+'T'+(ev.time||'00:00')+':00+09:00');e.setHours(e.getHours()+3);
  const end=e.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
  const u='https://calendar.google.com/calendar/render?action=TEMPLATE'
    +'&text='+encodeURIComponent(evNamePlain(ev)+' '+cfg(ev).money.replace('금',''))
    +'&dates='+start+'/'+end+'&location='+encodeURIComponent(ev.venue+' '+ev.address)
    +'&details='+encodeURIComponent((ev.message||'').replace(/\n/g,' '));
  window.open(u,'_blank');
}

/* ======================= 송금 ======================= */
function tossLink(acc,amount){const num=(acc.number||'').replace(/[^0-9]/g,'');return `supertoss://send?bank=${encodeURIComponent(acc.bank)}&accountNo=${num}`+(amount?`&amount=${amount}`:'');}
function copyAcct(acc){copy(`${acc.bank} ${acc.number} ${acc.holder}`);toast('계좌번호를 복사했어요');}
function payViaApp(method){ const ev=curEvent(); const nm=(S.ui.guestSession.name||($('#gname')&&$('#gname').value.trim())||'').trim();
  if(!nm){toast('성함을 먼저 입력하세요');return;}
  const amt=Number($('#sendamt')&&$('#sendamt').value); if(!amt){toast('보낼 금액을 입력하세요');return;}
  S.ui.guestSession.name=nm;
  let x=ev.guests.find(g=>g.name===nm); if(!x){x=mkGuest(nm,ev.myRelation||'지인',S.ui.guestSession.acctIdx||0);x.unregistered=true;ev.guests.push(x);}
  x.pay={amount:amt, source:'app', method};
  ev.myGift=amt; save();
  const acc=ev.accounts[S.ui.guestSession.acctIdx||0]||ev.accounts[0];
  if(method==='toss'){ let ok=false; try{ window.location.href=tossLink(acc,amt); ok=true; }catch(e){}
    if(!ok){ copyAcct(acc); } setTimeout(()=>toast(ok?'토스에 금액이 자동으로 채워져요':'토스를 열 수 없어 계좌를 복사했어요'),300); }
  else if(method==='kakao'){ const link=acc.kakaopay;
    if(link){ copy(`${acc.bank} ${acc.number} ${acc.holder}`); try{ window.location.href=link; }catch(e){ try{window.open(link,'_blank');}catch(e2){} }
      setTimeout(()=>toast('카카오페이로 이동 — 금액을 입력해 보내세요'),300); }
    else { copyAcct(acc); toast('카카오페이 링크가 없어 계좌를 복사했어요'); } }
  else { copyAcct(acc); toast('계좌 복사됨 — 뱅킹앱에서 송금하세요'); }
  render(); }

function soon(name){toast(`「${name}」 — 곧 추가될 기능이에요`);}

/* ======================= 렌더 ======================= */
function render(){
  const bn=document.getElementById('bottomnav');
  if(!S.ui.entered){ if(bn)bn.style.display='none'; $('#ddayTop').textContent=''; $('#app').innerHTML=landingView(); return; }
  if(S.ui.tab==='host'){ if(bn)bn.style.display='none'; const he=hostEvent();
    $('#ddayTop').textContent = he?dday(he):''; $('#app').innerHTML = S.ui.hostSub==='thanks'?thanksView():hostView(); return; }
  if(bn){ bn.style.display='flex'; }
  $('#ddayTop').textContent='';
  const v=S.ui.guestView;
  $('#app').innerHTML =
      v==='invite' ? inviteView()
    : v==='import' ? importView()
    : v==='ledger' ? ledgerView()
    : v==='add' ? addView()
    : v==='reco' ? recoView()
    : v==='envelope' ? envelopeView()
    : v==='more' ? moreView()
    : v==='group' ? groupView()
    : v==='people' ? peopleView()
    : v==='person' ? personView()
    : v==='settings' ? settingsView()
    : v==='doc' ? docView()
    : v==='detail' ? guestDetail() : guestList();
  updateBottomNav();
}

/* ---------- 이음 달력 ---------- */
function ymToday(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function ensureCalYM(){ if(!S.ui.calYM){ const ds=S.events.map(e=>e.date).filter(Boolean).sort(); const t=todayStr();
  const near=ds.find(d=>d>=t)||ds[0]; S.ui.calYM = near ? near.slice(0,7) : ymToday(); } }
function selDateLabel(ds){const d=new Date(ds+'T00:00');const w=['일','월','화','수','목','금','토'];return `${d.getMonth()+1}월 ${d.getDate()}일 (${w[d.getDay()]})`;}
function calNav(delta){ ensureCalYM(); let [y,m]=S.ui.calYM.split('-').map(Number);
  const idx=y*12+(m-1)+delta; y=Math.floor(idx/12); m=idx%12+1;
  S.ui.calYM=y+'-'+String(m).padStart(2,'0'); S.ui.calSelDate=null; save(); render(); }
function calPick(ds){ S.ui.calSelDate = (S.ui.calSelDate===ds ? null : ds); save(); render(); }
function addEventOnDate(ds,type){
  const isMem=type==='memorial';
  const ev={ id:uid('e'), role:'host', type, partyA:'', partyB:'',
    subtitle:isMem?'삼가 고인의 명복을 빕니다':'저희 결혼합니다',
    date:ds, time:'12:00', venue:'', address:'', message:'', externalUrl:'',
    accounts:[ {label:isMem?'상주측':'신랑측', bank:'카카오뱅크', number:'', holder:''} ], guests:[] };
  if(!isMem) ev.accounts.push({label:'신부측', bank:'토스뱅크', number:'', holder:''});
  S.events.push(ev); S.ui.hostEventId=ev.id; S.ui.tab='host'; S.ui.calSelDate=null; save(); render(); window.scrollTo(0,0);
  toast(TYPES[type].label+' 추가됨 — 정보를 입력하세요');
}
function calendarHTML(){
  ensureCalYM();
  const [y,m]=S.ui.calYM.split('-').map(Number);
  const startDow=new Date(y,m-1,1).getDay();
  const daysIn=new Date(y,m,0).getDate();
  const t=todayStr();
  const evCount={}; S.events.forEach(e=>{ if(e.date) evCount[e.date]=(evCount[e.date]||0)+1; });
  const dows=['일','월','화','수','목','금','토'];
  let cells='';
  for(let i=0;i<startDow;i++) cells+='<div class="calday empty"></div>';
  for(let d=1;d<=daysIn;d++){
    const ds=y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const has=evCount[ds]>0, isT=ds===t, isS=S.ui.calSelDate===ds;
    cells+=`<button class="calday${has?' ev':''}${isT?' today':''}${isS?' sel':''}" onclick="calPick('${ds}')">${d}${has?'<span class="cdot"></span>':''}</button>`;
  }
  const sel=S.ui.calSelDate; let below='';
  if(sel){
    const list=S.events.filter(e=>e.date===sel);
    if(list.length){
      below=`<div class="calsel"><div class="calseltt">${selDateLabel(sel)} · 경조사 ${list.length}건</div>

function updEv(k,v){hostEvent()[k]=v;save();if(k==='date'||k==='time')$('#ddayTop').textContent=dday(hostEvent());}
function setType(t){
  if(!TYPES[t])return;
  const ev=hostEvent(); ev.type=t;
  if(t==='memorial'){
    const a0=ev.accounts[0]||{bank:'카카오뱅크',number:'',holder:''};
    ev.accounts=[{...a0, label:'상주측'}];
  }else{
    if(!ev.accounts[0]) ev.accounts[0]={bank:'카카오뱅크',number:'',holder:''};
    ev.accounts[0].label='신랑측';
    if(!ev.accounts[1]) ev.accounts.push({label:'신부측',bank:'토스뱅크',number:'',holder:''});
    else ev.accounts[1].label='신부측';
  }
  save();render();toast(TYPES[t].label+'(으)로 변경');
}
function updAcct(i,f,v){hostEvent().accounts[i][f]=v;save();}
function addGuest(){const n=prompt('하객 이름');if(!n)return;const ev=hostEvent();
  const side=ev.accounts.length>1?(confirm(ev.accounts[0].label+'인가요? (취소='+ev.accounts[1].label+')')?0:1):0;
  ev.guests.push(mkGuest(n,'친구',side));save();render();toast(n+'님 추가');}
function delGuest(id){const ev=hostEvent();ev.guests=ev.guests.filter(x=>x.id!==id);save();render();}
function hostSetPay(id,v){const x=hostEvent().guests.find(g=>g.id===id);if(!x)return; const amt=v===''?null:Number(v);
  if(!x.pay)x.pay={amount:null,source:null,method:null}; x.pay.amount=amt;
  if(amt==null){x.pay.source=null;x.pay.method=null;}
  else if(x.pay.source!=='app'){x.pay.source='manual'; if(!x.pay.method)x.pay.method='manual';}
  save();render();}
function toggleCash(id){const x=hostEvent().guests.find(g=>g.id===id);if(!x)return; if(!x.pay)x.pay={amount:null,source:null,method:null};
  if(x.pay.method==='cash'){x.pay.method='manual';} else {x.pay.method='cash'; x.pay.source='manual';} save();render();}
function promote(id){const x=hostEvent().guests.find(g=>g.id===id);if(!x)return;x.unregistered=false;save();render();toast('명단으로 옮겼어요');}

function setGuestName(v){S.ui.guestSession.name=v.trim();save();render();}
function setAcct(i){S.ui.guestSession.acctIdx=i;save();render();}
function rsvp(status){const ev=curEvent();const nm=S.ui.guestSession.name||($('#gname')&&$('#gname').value.trim());
  if(!nm){toast('성함을 먼저 입력하세요');return;}S.ui.guestSession.name=nm;
  let x=ev.guests.find(g=>g.name===nm);if(!x){x=mkGuest(nm,'친구',S.ui.guestSession.acctIdx||0);x.unregistered=true;ev.guests.push(x);}
  x.rsvp.status=status;save();render();toast(status==='yes'?'전달했어요':'전달했어요');}
function rsvpField(f,v){const ev=curEvent();const x=ev.guests.find(g=>g.name===S.ui.guestSession.name);if(!x)return;
  x.rsvp[f]=f==='count'?Math.max(1,Number(v)):(f==='meal'?v==='1':v);save();render();}

/* ======================= 집계 ======================= */
function ledgerStats(ev){let attend=0,heads=0,total=0,appSum=0,manualSum=0,paid=0;
  ev.guests.forEach(x=>{if(x.rsvp.status==='yes'){attend++;heads+=x.rsvp.count||1;}
    const p=x.pay||{}; if(p.amount>0){total+=p.amount;paid++; if(p.source==='app')appSum+=p.amount; else manualSum+=p.amount;}});
  return {attend,heads,total,appSum,manualSum,paid};}

/* ======================= 내 경조사비 가계부 (품앗이) ======================= */
function myStats(){ let given=0,gaveCount=0,received=0,recvCount=0; const byRel={};
  S.events.forEach(e=>{
    if(e.role==='host'){ const c=ledgerStats(e).total; if(c>0){received+=c;recvCount++;} }
    else if(e.myGift>0){ given+=e.myGift; gaveCount++; const r=e.myRelation||'기타'; byRel[r]=(byRel[r]||0)+e.myGift; }
  });
  return {given,gaveCount,received,recvCount,net:received-given,byRel}; }
function openLedger(){ S.ui.guestView='ledger'; save(); render(); window.scrollTo(0,0); }
function setMyRelation(r){ const ev=curEvent(); if(ev){ ev.myRelation=r; save(); render(); } }

    </div>

  </div>
  <div class="card reco-cta" onclick="openPeople()" style="border-color:var(--sage)">
    <div class="rc-ic">🔎</div>
    <div class="rc-tx"><div class="rc-t" style="color:var(--sage-d)">주고받은 사람</div><div class="rc-d">이름 검색 · 지난 주고받은 금액 참고(답례용)</div></div>

  <div class="card"><div class="secthead"><div class="t">낸 내역</div><div class="c">${gaveEvents.length}건</div></div>
    <div class="glist">${gaveEvents.map(e=>{const c=cfg(e);return `<div class="calevrow" onclick="openEvent('${e.id}')"><span class="cic">${c.icon}</span><span class="cnm">${esc(evNamePlain(e))}<span style="color:var(--muted);font-weight:400;font-size:11px"> · ${esc(e.myRelation||'')}</span></span><span class="rv">${won(e.myGift)}</span><span class="cchev">›</span></div>`;}).join('')||'<div class="empty">아직 낸 내역이 없어요. 경조사를 열어 금액을 기록해 보세요.</div>'}</div>

function exportData(){ try{ const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});

function importData(){ const inp=document.createElement('input'); inp.type='file'; inp.accept='application/json,.json';
  inp.onchange=e=>{ const f=e.target.files&&e.target.files[0]; if(!f)return; const r=new FileReader();

/* ======================= 그룹 합산 축의 (N분의1) ======================= */
function groupState(){ if(!S.ui.group) S.ui.group={mode:'total', total:300000, n:5, per:50000}; return S.ui.group; }
function openGroup(){ groupState(); S.ui.guestView='group'; save(); render(); window.scrollTo(0,0); }
function groupSet(k,v){ const g=groupState(); if(k==='mode'){g.mode=v;save();render();return;} g[k]=v===''?0:(Number(v)||0); save(); recalcGroup(); }
function groupCalc(){ const g=groupState(); const n=Math.max(1,+g.n||1);
  if(g.mode==='total'){ const per=Math.round((+g.total||0)/n/1000)*1000; return {n, per, total:+g.total||0}; }
  const per=+g.per||0; return {n, per, total:per*n}; }
function recalcGroup(){ const r=groupCalc(); const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  set('g-per',won(r.per)); set('g-total',won(r.total)); set('g-n',r.n+'명'); }
function groupView(){ const g=groupState(); const r=groupCalc();
  return `<button class="backbtn" onclick="setGuestTab('more')">‹ 더보기</button>
  <div class="listhead"><div class="t serif">그룹 합산 축의</div></div>
  <p class="sub" style="margin:0 2px 12px">직장팀·동호회가 함께 축의할 때 <b>1/N 분담액</b>을 계산해요. 각자 토스/계좌로 <b>개별 송금</b>합니다(이음은 돈을 모으지 않아요).</p>
  <div class="card">
    <div class="seg2"><button class="${g.mode==='total'?'on':''}" onclick="groupSet('mode','total')">총액 → 1인당</button><button class="${g.mode==='per'?'on':''}" onclick="groupSet('mode','per')">1인당 → 총액</button></div>
    <div class="row" style="margin-top:11px">
      ${g.mode==='total'?`<div><label>총 축의금</label><input type="number" inputmode="numeric" value="${g.total}" oninput="groupSet('total',this.value)"></div>`:`<div><label>1인당</label><input type="number" inputmode="numeric" value="${g.per}" oninput="groupSet('per',this.value)"></div>`}
      <div><label>인원</label><input type="number" inputmode="numeric" value="${g.n}" oninput="groupSet('n',this.value)"></div>
    </div>
    <div class="stats" style="margin-top:13px">
      <div class="stat"><div class="v big" id="g-per">${won(r.per)}</div><div class="k">1인당</div></div>
      <div class="stat"><div class="v" id="g-n">${r.n}명</div><div class="k">인원</div></div>
      <div class="stat"><div class="v big" id="g-total">${won(r.total)}</div><div class="k">총액</div></div>
    </div>
    <div class="note">각자 1인당 금액을 <b>본인 토스/계좌</b>로 직접 보내면 됩니다. 대표 1인이 모아 보내면 송금 한도·정산 부담이 생길 수 있어요.</div>
  </div>`;
}

const RECO_CHIPS=[30000,50000,70000,100000,150000,200000,300000,500000];
const RECO_TABLE={
  wedding:[
    {label:'잘 모르는 사이·청첩장만', no:50000, yes:50000, close:50000},
    {label:'지인·동창', no:50000, yes:100000, close:100000},

    {label:'친구', no:50000, yes:100000, close:150000},
    {label:'친한 친구·절친', no:100000, yes:150000, close:200000},
    {label:'친척(이모·삼촌·사촌)', no:100000, yes:150000, close:200000, low:true},
    {label:'가까운 친척·조카', no:150000, yes:200000, close:300000, low:true},
    {label:'형제자매·직계가족', no:300000, yes:500000, close:500000, low:true},
  ],
  memorial:[
    {label:'직장 동료·지인', base:50000, close:50000},
    {label:'직장 상사·친한 동료', base:50000, close:100000},
    {label:'친구', base:50000, close:100000},
    {label:'친한 친구·절친', base:100000, close:150000},
    {label:'먼 친척', base:50000, close:50000},
    {label:'가까운 친척', base:150000, close:200000, low:true},
    {label:'직계가족', base:500000, close:500000, low:true},
  ],
  bday:[
    {label:'직장·지인', no:30000, yes:50000, close:50000},
    {label:'친구', no:30000, yes:70000, close:100000},
    {label:'친척', no:50000, yes:70000, close:100000},
    {label:'형제자매', no:100000, yes:150000, close:200000},
  ]
};
function recoState(){ if(!S.ui.reco) S.ui.reco={kind:'wedding', rel:2, attending:true, venue:'normal', close:false, ctxEventId:null}; return S.ui.reco; }
function recommend(){ const r=recoState(); const row=(RECO_TABLE[r.kind]||[])[r.rel]; if(!row) return {amount:50000};
  let amt;
  if(r.kind==='memorial'){ amt = r.close ? (row.close||row.base) : row.base; }
  else { amt = r.attending ? (r.close?row.close:row.yes) : row.no; if(r.kind==='wedding' && r.venue==='hotel') amt+=50000; }
  return {amount:amt, low:row.low, label:row.label}; }
function openReco(ctxId){ recoState(); const ev=ctxId?S.events.find(e=>e.id===ctxId):null;
  if(ev){ S.ui.reco.kind = ev.type==='memorial'?'memorial':'wedding'; S.ui.reco.ctxEventId=ev.id;
    if(ev.myRelation){ const idx=RECO_TABLE[S.ui.reco.kind].findIndex(x=>x.label.includes(ev.myRelation)); if(idx>=0)S.ui.reco.rel=idx; } }
  else S.ui.reco.ctxEventId=null;
  S.ui.guestView='reco'; save(); render(); window.scrollTo(0,0); }
function recoSet(k,v){ const r=recoState(); r[k]=v; if(k==='kind'&&r.rel>=(RECO_TABLE[v]||[]).length)r.rel=0; save(); render(); }
function recoApply(){ const r=recoState(); const {amount}=recommend();
  if(r.ctxEventId){ const ev=S.events.find(e=>e.id===r.ctxEventId);
    if(ev){ ev.myGift=amount; if(!ev.myRelation){ ev.myRelation=(RECO_TABLE[r.kind][r.rel].label.split(/[·(]/)[0]); }
      S.ui.guestView='detail'; S.ui.currentEventId=ev.id; save(); render(); window.scrollTo(0,0); toast(won(amount)+' 기록했어요'); return; } }
  copy(won(amount)); toast(won(amount)+' 복사 — 추천 금액'); }
function recoShare(){ const r=recoState(); const {amount,label}=recommend(); const kindL=r.kind==='memorial'?'조의금':r.kind==='bday'?'축하금':'축의금';
  const att=r.kind==='memorial'?'':((r.attending?'참석':'불참')+' · ');
  const text=`${label} · ${att}${kindL} ${won(amount)} 추천\n— 이음(마음을 잇다)에서 계산했어요`;
  const url=location.href.split('?')[0].split('#')[0];
  if(navigator.share){ navigator.share({title:'이음 경조사비 추천',text,url}).catch(()=>{}); }
  else { copy(text+'\n'+url); toast('추천 결과를 복사했어요 — 친구에게 붙여넣기'); } }
function recoView(){ const r=recoState(); const rows=RECO_TABLE[r.kind]; const res=recommend();
  const kindL=r.kind==='memorial'?'조의금':r.kind==='bday'?'축하금':'축의금';
  const tabs=[['wedding','💍 결혼'],['memorial','🕊️ 부고'],['bday','🎂 돌잔치']];
  return `${r.ctxEventId?`<button class="backbtn" onclick="openEvent('${r.ctxEventId}')">‹ 돌아가기</button>`:''}
  <div class="listhead"><div class="t serif">경조사비 얼마?</div></div>
  <div class="card">
    <div class="seg2">${tabs.map(([k,l])=>`<button class="${r.kind===k?'on':''}" onclick="recoSet('kind','${k}')">${l}</button>`).join('')}</div>
    ${r.kind!=='memorial'?`<label style="margin-top:13px">참석 여부</label>
    <div class="seg2"><button class="${r.attending?'on':''}" onclick="recoSet('attending',true)">참석</button><button class="${!r.attending?'on':''}" onclick="recoSet('attending',false)">불참 (봉투만)</button></div>`:''}
    <label style="margin-top:13px">관계</label>
    <div class="chips">${rows.map((row,i)=>`<button class="chip ${r.rel===i?'on':''}" onclick="recoSet('rel',${i})">${row.label}</button>`).join('')}</div>
    <div class="chips" style="margin-top:8px"><button class="chip ${r.close?'on':''}" onclick="recoSet('close',${!r.close})">💛 특히 가까운 사이</button></div>
    ${r.kind==='wedding'?`<label style="margin-top:13px">예식장 등급</label>
    <div class="seg2"><button class="${r.venue==='normal'?'on':''}" onclick="recoSet('venue','normal')">일반 웨딩홀</button><button class="${r.venue==='hotel'?'on':''}" onclick="recoSet('venue','hotel')">호텔·프리미엄</button></div>`:''}
    <div class="reco-result">
      <div class="rr-k">추천 ${kindL}</div>
      <div class="rr-v">${won(res.amount)}</div>
      <div class="rr-chips">${RECO_CHIPS.filter(c=>c<=Math.max(res.amount*2,200000)).map(c=>`<span class="rrc ${c===res.amount?'on':''}">${(c/10000)}만</span>`).join('')}</div>
    </div>
    ${res.low?`<div class="note">⚠️ 친척·가족 금액은 정해진 기준이 없어요. <b>권장 범위</b>이니 가족과 상의해 정하세요.</div>`:`<div class="note">💡 ${r.kind==='memorial'?'조의금은 <b>5만원</b>이 가장 보편적이에요(김영란법 경조사비 한도와도 일치).':'<b>5만·10만</b>이 가장 보편적이에요. 4·6·8만은 피하는 게 관례예요(홀수 선호).'}</div>`}
    <div class="stack" style="margin-top:12px">
      <button class="btn btn-primary" onclick="recoApply()">${r.ctxEventId?'이 금액으로 기록':'금액 복사'}</button>
      <button class="btn btn-kakao" onclick="recoShare()">💬 결과 공유 (친구에게도 추천)</button>
    </div>
    <div class="note" style="background:none;border:none;text-align:center;padding:6px 0 0">관계·참석·식장 기준 2024~2026 통념 · 참고용</div>
  </div>`;
}

/* ======================= 청첩장 가져오기 (공유/붙여넣기) ======================= */
function openImport(){ S.ui.guestView='import'; S.ui.importParsed=null; save(); render(); window.scrollTo(0,0); }
function closeImport(){ S.ui.guestView='list'; S.ui.importText=''; S.ui.importParsed=null; save(); render(); }
function analyzeImport(){ const t=$('#impText').value; S.ui.importText=t;
  if(!t.trim()){ toast('내용을 붙여넣어 주세요'); return; }
  const p=parseInvite(t); S.ui.importParsed=p; save(); render();
  toast((p.date||p.venue||p.names)?'정보를 찾았어요 — 확인해 주세요':'자동 인식이 어려워요 — 직접 입력해 주세요'); }
function addImported(){
  const names=($('#ip_names').value||'').split(/[♥❤♡·]|그리고/).map(s=>s.trim()).filter(Boolean);
  const ev={ id:uid('e'), role:'guest', type:'wedding', partyA:names[0]||'', partyB:names[1]||'', subtitle:'결혼합니다',
    date:$('#ip_date').value||'', time:$('#ip_time').value||'12:00', venue:$('#ip_venue').value||'', address:'', message:'',
    externalUrl:$('#ip_url').value||'',
    accounts:[{label:'신랑측',bank:'카카오뱅크',number:'',holder:''},{label:'신부측',bank:'토스뱅크',number:'',holder:''}], guests:[] };
  S.events.push(ev); S.ui.guestView='detail'; S.ui.currentEventId=ev.id; S.ui.importText=''; S.ui.importParsed=null;
  save(); render(); window.scrollTo(0,0); toast('내 경조사에 추가했어요'); }
function parseInvite(text){
  const res={names:'',date:'',time:'',venue:'',url:''};
  const um=text.match(/https?:\/\/[^\s]+/); if(um) res.url=um[0];
  let y,mo,d, m=text.match(/(20\d{2})\s*[년.\-\/]\s*(\d{1,2})\s*[월.\-\/]\s*(\d{1,2})/);
  if(m){ y=+m[1]; mo=+m[2]; d=+m[3]; }
  else if(m=text.match(/(\d{1,2})\s*월\s*(\d{1,2})\s*일/)){ mo=+m[1]; d=+m[2]; }
  else if(m=text.match(/\b(\d{1,2})[\/.](\d{1,2})\b/)){ mo=+m[1]; d=+m[2]; }
  if(mo&&d&&mo>=1&&mo<=12&&d>=1&&d<=31){ if(!y){ const now=new Date(); y=now.getFullYear();
      if(new Date(y,mo-1,d) < new Date(now.toDateString())) y++; }
    res.date=y+'-'+String(mo).padStart(2,'0')+'-'+String(d).padStart(2,'0'); }
  let hh,mm=0,pm=false,am=false, tm=text.match(/(오전|오후)?\s*(\d{1,2})\s*시\s*(\d{1,2})?\s*분?/);
  if(tm){ if(tm[1]==='오후')pm=true; if(tm[1]==='오전')am=true; hh=+tm[2]; if(tm[3])mm=+tm[3]; }
  else if(tm=text.match(/\b(\d{1,2}):(\d{2})\b/)){ hh=+tm[1]; mm=+tm[2]; }
  if(hh!=null){ if(pm&&hh<12)hh+=12; if(am&&hh===12)hh=0; if(hh>=0&&hh<=23) res.time=String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0'); }
  let nm=text.match(/([가-힣]{2,4})\s*[♥❤♡💕&,·]\s*([가-힣]{2,4})/);
  if(!nm) nm=text.match(/신랑\s*[:：]?\s*([가-힣]{2,4})[\s\S]{0,24}신부\s*[:：]?\s*([가-힣]{2,4})/);
  if(nm) res.names=nm[1]+' ♥ '+nm[2];
  const vk=/(웨딩|컨벤션|호텔|예식장|홀|가든|하우스|채플|파티움|아트홀|타워|클럽|더라움|루체|아펠가모|메리어트|그랜드|워커힐|라마다|롯데|신라|반얀트리|스퀘어|컨벤션센터)/;
  for(const ln of text.split(/[\n\r]+/)){ if(vk.test(ln)){ res.venue=ln.trim().slice(0,40); break; } }
  return res;
}
function importView(){
  const t=S.ui.importText||'', p=S.ui.importParsed;
  return `<button class="backbtn" onclick="closeImport()">‹ 내 경조사</button>
  <div class="card">
    <h3>청첩장 가져오기</h3>
    <p class="sub">카카오톡으로 받은 청첩장 메시지나 링크를 붙여넣으면, 이음이 날짜·장소·이름을 자동으로 찾아드립니다.</p>
    <textarea id="impText" rows="5" placeholder="카톡 청첩장 메시지를 길게 눌러 복사 → 여기에 붙여넣기&#10;예) 김민준 ♥ 이서연 결혼합니다 / 2026년 10월 17일 토요일 오후 1시 / 더채플 앳 청담 / https://...">${esc(t)}</textarea>
    <button class="btn btn-primary" style="margin-top:10px" onclick="analyzeImport()">🔍 붙여넣기 분석</button>
    <div class="note">💡 카카오톡 메시지를 앱이 <b>직접 읽을 수는 없습니다</b>(카카오 정책). 대신 ① 메시지 <b>복사 → 붙여넣기</b>, 또는 ② (안드로이드) 청첩장 링크 <b>공유 → 이음</b>으로 보내면 자동으로 들어옵니다.</div>
  </div>
  ${p?`<div class="card">
    <h3>찾은 정보 · 확인 후 추가</h3>
    <p class="sub">자동으로 채운 값입니다. 틀린 곳은 직접 고쳐주세요.</p>
    <label>이름</label><input id="ip_names" value="${esc(p.names)}" placeholder="예: 김민준 ♥ 이서연">
    <div class="row"><div><label>날짜</label><input id="ip_date" type="date" value="${p.date}"></div>
      <div><label>시간</label><input id="ip_time" type="time" value="${p.time}"></div></div>
    <label>장소</label><input id="ip_venue" value="${esc(p.venue)}">
    <label>청첩장 링크</label><input id="ip_url" value="${esc(p.url)}" placeholder="https://...">
    <button class="btn btn-sage" style="margin-top:13px" onclick="addImported()">＋ 내 경조사에 추가</button>
  </div>`:''}`;
}

/* ======================= 예상 하객·예산 계산기 ======================= */
function planVals(ev){ const pl=ev.plan||{};
  return { sent:+pl.sent||0, rate:pl.rate!=null?+pl.rate:60, meal:pl.meal!=null?+pl.meal:60000, gift:pl.gift!=null?+pl.gift:80000 }; }
function planInput(k,v){ const ev=hostEvent(); if(!ev.plan)ev.plan={}; ev.plan[k]=v===''?null:Number(v); save(); recalcBudget(); }
function recalcBudget(){ const ev=hostEvent(); if(!ev)return; const {sent,rate,meal,gift}=planVals(ev);
  const g=Math.round(sent*rate/100), income=g*gift, mc=g*meal, net=income-mc;
  const set=(id,val)=>{const el=document.getElementById(id); if(el)el.textContent=val;};
  set('bd-guests',g); set('bd-income',won(income)); set('bd-meal',won(mc)); set('bd-net',won(net)); }
function budgetCard(ev){ const c=cfg(ev), pl=ev.plan||{}, {sent,rate,meal,gift}=planVals(ev), led=ledgerStats(ev);
  const g=Math.round(sent*rate/100), income=g*gift, mc=g*meal, net=income-mc;
  return `<div class="card">
    <div class="secthead"><div class="t">④ 예상 ${c.counts?'하객':'조문'}·예산 계산기</div></div>
    <p class="sub">보낸 ${c.doc} 수와 참석률로 예상 인원·예산을 시뮬레이션합니다.</p>
    <div class="row">
      <div><label>보낸 ${c.doc} 수</label><input type="number" inputmode="numeric" value="${pl.sent??''}" placeholder="예: 200" oninput="planInput('sent',this.value)"></div>
      <div><label>예상 참석률(%)</label><input type="number" inputmode="numeric" value="${pl.rate??60}" oninput="planInput('rate',this.value)"></div>
    </div>
    <div class="row">
      <div><label>1인 식대(원)</label><input type="number" inputmode="numeric" value="${pl.meal??60000}" oninput="planInput('meal',this.value)"></div>
      <div><label>1인 예상 ${c.money}(원)</label><input type="number" inputmode="numeric" value="${pl.gift??80000}" oninput="planInput('gift',this.value)"></div>
    </div>
    <div class="stats" style="margin-top:12px">
      <div class="stat"><div class="v" id="bd-guests">${g}</div><div class="k">예상 ${c.counts?'참석':'조문'} 인원</div></div>
      <div class="stat"><div class="v big" id="bd-income">${won(income)}</div><div class="k">예상 ${c.money}</div></div>
      <div class="stat"><div class="v big" id="bd-meal">${won(mc)}</div><div class="k">예상 식대</div></div>
    </div>
    <div class="budget-net">예상 정산(순) <b id="bd-net">${won(net)}</b></div>
    <div class="note">현재 실제 ${c.counts?'참석':'조문'} 응답 <b>${led.attend}명</b> · 실수령 <b>${won(led.total)}</b> — 응답이 쌓일수록 예측이 정확해집니다.</div>
  </div>`;
}

/* ======================= 받은 청첩장 링크(#e=) 감지 → 각자 접속 (사용자 분리) ======================= */
(function(){ try{ const m=(location.hash||'').match(/[#&]e=([^&]+)/);
  if(m){ const iv=decodeInvite(m[1]);
    if(iv){ S.ui.entered=true; S.ui.tab='guest';
      const dup=S.events.find(e=>e.partyA===iv.partyA&&e.partyB===iv.partyB&&e.date===iv.date&&e.venue===iv.venue);
      if(dup){ S.ui.currentEventId=dup.id; S.ui.guestView='detail'; }
      else { S.ui.pendingInvite=iv; S.ui.guestView='invite'; }
      save(); history.replaceState(null,'',location.pathname); } }
}catch(e){} })();

/* ======================= 공유받기 (PWA Share Target) ======================= */
(function(){ try{ const q=new URLSearchParams(location.search);
  const shared=[q.get('shared_text'),q.get('shared_url'),q.get('shared_title')].filter(Boolean).join('\n');
  if(shared){ S.ui.entered=true; S.ui.tab='guest'; S.ui.guestView='import'; S.ui.importText=shared; S.ui.importParsed=parseInvite(shared); save();
    history.replaceState(null,'',location.pathname); }
}catch(e){} })();

applyTheme();
kakaoInit();
render();
try{ if(S.ui.noti) fireDueNotis(); }catch(e){}

/* PWA: 서비스 워커 등록 */
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./service-worker.js?v=3').catch(()=>{});});}
</script>
