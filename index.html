<!-- 서체: 본문 Pretendard(가변)·디스플레이 고운바탕 — display:swap, 오프라인 시 시스템 폴백으로 무해 -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" />
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.8.1/kakao.min.js" integrity="sha384-OL+ylM/iuPLtW5U3XcvLSGhE8JzReKDank5InqlHGWPhb4140/yrBw0bg0y7+C9J" crossorigin="anonymous" onerror="window.__kakaoFailed=true"></script>
<style>
  :root{
    /* 절제된 고급감: 먹에 가까운 딥 모카(CTA 대비 AA 통과), 브론즈 골드(금은 어두울수록 격), 한지톤 카드 */
    --bg:#f3efe8; --card:#fffdf9; --ink:#39342e; --muted:#6e6759;
    --line:#e7e0d5; --primary:#8f6852; --primary-d:#734f3d;
    --sage:#647663; --sage-d:#5f7060; --rose:#c08497; --gold:#9c7c4a; --gold-text:#7f6430;
    --ok:#43724f; --warn:#8c5e2a; --danger:#9d4f41;
    --tint:#fbf8f3; --tint2:#fbf6f1; --field:#fcfbf9; --seg-bg:#efe9e0; --ic-bg:#f4eee4; --dd-bg:#f4eedd; --note-bg:#faf7f2;
    --radius:14px; --shadow:0 1px 2px rgba(57,52,46,.05),0 6px 20px rgba(57,52,46,.06);
  }
  html[data-theme="dark"]{
    --bg:#201d19; --card:#2a2621; --ink:#ece5da; --muted:#a69c8e; --line:#39332c;
    --primary:#c69c82; --primary-d:#dcb89e; --sage:#94a594; --sage-d:#b0c3b0; --rose:#d09aaa; --gold:#c3a978; --gold-text:#d9bd85;
    --ok:#84b695; --warn:#daa86a; --danger:#df9181;
    --tint:#322d27; --tint2:#37302a; --field:#322d27; --seg-bg:#38322b; --ic-bg:#38312a; --dd-bg:#38312a; --note-bg:#2f2a24;
    --shadow:0 1px 2px rgba(0,0,0,.45),0 8px 24px rgba(0,0,0,.3);
  }
  /* 다크: 밝은 채움 위 흰 글자는 대비 탈락 — 진한 잉크로 반전(기존 .dday-pill 문법 확장) */
  html[data-theme="dark"] .btn-primary,html[data-theme="dark"] .btn-sage,html[data-theme="dark"] .chip.on,
  html[data-theme="dark"] .rrc.on,html[data-theme="dark"] .calday.sel,html[data-theme="dark"] .calday.sel.ev,
  html[data-theme="dark"] .minibtn.on,html[data-theme="dark"] .rm-noti.on,html[data-theme="dark"] .rm-dd,
  html[data-theme="dark"] .pbdg{color:#241f19}
  html[data-theme="dark"] .quote{color:#b5aa99}
  html[data-theme="dark"] .pill-gold,html[data-theme="dark"] .pchip{color:var(--gold)}
  html[data-theme="dark"] .footer,html[data-theme="dark"] .ftlink{color:#a59b8c}
  .homehero.mem .hh-nm .typ{color:#b0c3b0}
  html[data-theme="dark"] body{background:#16130f}
  html[data-theme="dark"] header{background:rgba(32,29,25,.92)}
  html[data-theme="dark"] .bnav{background:rgba(42,38,33,.96)}
  html[data-theme="dark"] .seg{background:#38322b}
  html[data-theme="dark"] .btn-ghost{background:#37312a}
  html[data-theme="dark"] .btn-line,html[data-theme="dark"] .minibtn,html[data-theme="dark"] .calnav,html[data-theme="dark"] .rrc,html[data-theme="dark"] .chip,html[data-theme="dark"] .rm-noti,html[data-theme="dark"] .seg2 button.on{background:#322d27}
  html[data-theme="dark"] .btn-disabled{background:#302b25;color:#7d746a}
  html[data-theme="dark"] .calday.ev{background:#38312a}
  html[data-theme="dark"] .relrow .bar{background:#38312a}
  html[data-theme="dark"] .budget-net{background:#37302a}
  html[data-theme="dark"] .remind{background:#2f2a24;border-color:#3a342c}
  html[data-theme="dark"] .hero{background:#2a2621}
  html[data-theme="dark"] .dday-pill,html[data-theme="dark"] .toast{background:#e8e1d5;color:#201d19}
  html[data-theme="dark"] .pill-ok,html[data-theme="dark"] .bal.pos{background:#20342a}
  html[data-theme="dark"] .pill-no,html[data-theme="dark"] .bal.neg{background:#3a2622}
  html[data-theme="dark"] .pill-wait{background:#34301f}
  html[data-theme="dark"] .bal.even{background:#302b24}
  html[data-theme="dark"] .pill-app{background:#233240;color:#9dbbdd}
  html[data-theme="dark"] .pill-cash{background:#332f24;color:#cbb888}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  button,a,input,select,textarea,summary{touch-action:manipulation} /* 핀치줌 허용하되 더블탭 줌 오작동 방지 */
  html,body{margin:0;padding:0;background:#e9e3d9;color:var(--ink);
    font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic","맑은 고딕",sans-serif;
    font-size:15px;line-height:1.55;letter-spacing:-.01em;
    word-break:keep-all;overflow-wrap:break-word;-webkit-font-smoothing:antialiased}
  .serif{font-family:"Gowun Batang","Nanum Myeongjo","Apple SD Gothic Neo",Georgia,serif;letter-spacing:.02em}
  /* 금액·날짜: 고정폭 숫자 = 정갈한 장부 */
  .stat .v,.reco-result .rr-v,.budget-net b,.relrow .rv,.calevrow .rv,.grow .amt input,
  .calday,.hh-dd,.dday-pill,.evcard .dd,.rm-dd{font-variant-numeric:tabular-nums}
  :focus-visible{outline:2px solid var(--primary);outline-offset:2px}
  .phone{max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh;background:var(--bg);
    box-shadow:0 0 40px rgba(0,0,0,.12);position:relative;padding-bottom:calc(80px + env(safe-area-inset-bottom))}
  header{position:sticky;top:0;z-index:30;background:rgba(243,239,232,.92);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
    padding:calc(10px + env(safe-area-inset-top)) 14px 10px}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
  @keyframes viewin{from{opacity:.35;transform:translateY(4px)}to{opacity:1;transform:none}}
  main>*{animation:viewin .18s ease-out}
  .brand{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .brand .logo{display:flex;align-items:baseline;gap:8px}
  .brand b{font-size:19px;letter-spacing:.1em;color:var(--primary-d)} /* 두 글자 '이음' — 자간이 낙관(落款)의 격 */
  .brand .slogan{font-size:11px;color:var(--muted);letter-spacing:.08em}
  .brand .dd{font-size:11px;color:var(--muted)}
  .seg{display:flex;background:#e7e0d5;border-radius:10px;padding:3px;margin-top:9px}
  .seg button{flex:1;border:0;background:transparent;padding:8px 6px;border-radius:8px;
    font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s}
  .seg button.on{background:var(--card);color:var(--primary-d);box-shadow:0 1px 4px rgba(0,0,0,.07)}
  main{padding:16px 14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
  .card h3{margin:0 0 4px;font-size:14px;letter-spacing:.02em}
  .card .sub{color:var(--muted);font-size:12px;margin:0 0 12px}
  label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px;font-weight:500;letter-spacing:.02em}
  input,select,textarea{width:100%;padding:10px 11px;border:1px solid var(--line);
    border-radius:10px;font-size:14px;background:var(--field);color:var(--ink);font-family:inherit}
  /* iOS 사파리: 16px 미만 입력 포커스 시 강제 확대(자동 줌) → iOS에서만 16px (핀치줌 정책은 유지) */
  @supports(-webkit-touch-callout:none){ input,select,textarea{font-size:16px} }
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(143,104,82,.13)}
  html[data-theme="dark"] input:focus,html[data-theme="dark"] select:focus,html[data-theme="dark"] textarea:focus{box-shadow:0 0 0 3px rgba(198,156,130,.2)}
  .row{display:flex;gap:8px}.row>*{flex:1}
  .btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;
    border:0;border-radius:11px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;
    transition:background-color .18s ease,border-color .18s ease,transform .1s ease,box-shadow .18s ease;font-family:inherit}
  .btn:active{transform:scale(.98)}
  .chip:active,.minibtn:active,.payopt:active,.calday:active{transform:scale(.96);transition:transform .1s ease}
  .btn-primary{background:var(--primary);color:#fff}
  .btn-primary:hover{background:var(--primary-d)}
  .btn-kakao{background:#FEE500;color:#3A1D1D}
  .btn-toss{background:#0064FF;color:#fff}
  .btn-ghost{background:#f1ece4;color:var(--ink);border:1px solid var(--line)}
  .btn-sage{background:var(--sage);color:#fff}
  .btn-line{background:var(--card);color:var(--primary-d);border:1px solid var(--primary)}
  .btn-sm{padding:9px 10px;font-size:13px;border-radius:9px}
  .btn[disabled],.btn-disabled{background:#ece7df;color:#b3aa9c;cursor:not-allowed;box-shadow:none}
  .btn-disabled .lock{font-size:11px;opacity:.7}
  .stack>*{margin-top:9px}
  .hero{text-align:center;padding:26px 18px 22px;background:
    radial-gradient(140% 100% at 50% 0%, #fffefb 0%, #f9f4eb 60%, #f4eee2 100%);
    border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px}
  .hero .lead{font-size:10.5px;letter-spacing:.3em;font-weight:500;color:var(--gold-text);text-transform:uppercase}
  .hero .names{font-size:25px;margin:12px 0 4px;color:var(--ink);line-height:1.45}
  .hero .names span{color:var(--rose);margin:0 9px;font-size:17px;vertical-align:middle}
  .hero .when{font-size:13px;color:var(--muted);margin-top:9px;line-height:1.7}
  .dday-pill{display:inline-block;margin-top:13px;background:var(--ink);color:#fff;
    font-size:12px;font-weight:600;letter-spacing:.08em;padding:6px 14px;border-radius:999px}
  /* 부고 상세: 먹색 히어로 — 기쁜 자리가 아니므로 톤을 낮춘다 (homehero.mem 문법 재사용) */
  .hero{position:relative}
  .hero-cal{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:10px;border:1px solid var(--line);
    background:rgba(255,255,255,.72);color:var(--primary-d);display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0}
  .hero.mem .hero-cal{background:rgba(255,255,255,.08);border-color:#575047;color:#d8cdbb}
  html[data-theme="dark"] .hero-cal{background:rgba(255,255,255,.06);border-color:var(--line);color:var(--primary)}
  .hero.mem{background:linear-gradient(180deg,#3a352f,#2c2823);border-color:#575047}
  .hero.mem .names{color:#e8e0d2}
  .hero.mem .when{color:#a99e8e}
  .hero.mem .lead{color:#8f857a;letter-spacing:.3em}
  .hero.mem .dday-pill{background:#d8cdbb;color:#26221d}
  html[data-theme="dark"] .hero.mem{background:linear-gradient(180deg,#332e28,#2a2621)}
  /* 알리기 확인 체크박스 행 */
  .ckrow{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--line);
    border-radius:10px;background:var(--field);font-size:13px;margin-top:8px;cursor:pointer;color:var(--ink)}
  .ckrow input{width:18px;height:18px;flex:none;margin:0;accent-color:var(--primary);padding:0}
  .ckrow span{flex:1;line-height:1.5}
  .quote{font-size:13.5px;color:#6a6258;text-align:center;line-height:1.9;padding:4px 6px 0}
  .divider{height:1px;background:var(--line);margin:14px 0}
  .pill{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px;letter-spacing:.01em}
  .pill-ok{background:#e7f0ea;color:var(--ok)}
  .pill-no{background:#f6e7e4;color:var(--danger)}
  .pill-wait{background:#f3ece1;color:var(--warn)}
  .pill-gold{background:var(--dd-bg);color:#7f6430}
  .pill-app{background:#e6eef6;color:#4a6f9a}
  .pill-cash{background:#f1ece1;color:#75663c}
  .card-thumbs{display:flex;gap:8px;overflow-x:auto;padding:6px 1px 5px}
  .card-thumb{flex:none;width:50px;height:64px;border-radius:11px;border:2px solid transparent;cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 1px 4px rgba(0,0,0,.08);position:relative}
  .pbdg{position:absolute;top:-6px;right:-5px;background:var(--gold);color:#fff;font-size:9px;font-weight:700;
    padding:1.5px 5.5px;border-radius:999px;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .pchip{font-size:10px;font-weight:700;background:var(--dd-bg);color:#7f6430;padding:2px 8px;border-radius:999px;margin-left:4px}
  /* 결제 바텀시트 */
  .sheet-bg{position:fixed;inset:0;background:rgba(30,25,20,.45);z-index:90;display:flex;align-items:flex-end;justify-content:center;opacity:0;transition:.2s}
  .sheet-bg.show{opacity:1}
  .sheet{width:100%;max-width:430px;background:var(--card);border-radius:20px 20px 0 0;
    padding:20px 18px calc(20px + env(safe-area-inset-bottom));box-shadow:0 -8px 30px rgba(0,0,0,.18);
    transform:translateY(36px);transition:.22s}
  .sheet-bg.show .sheet{transform:none}
  .paygrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .payopt{border:1px solid var(--line);background:var(--field);border-radius:12px;padding:11px 12px;
    text-align:left;cursor:pointer;font-family:inherit;color:var(--ink)}
  .payopt b{display:block;font-size:13.5px}
  .payopt small{display:block;color:var(--muted);font-size:10.5px;margin-top:2px}
  .payopt.on{border-color:var(--primary);background:var(--tint2);box-shadow:0 0 0 1px var(--primary)}
  /* 튜토리얼 (스포트라이트 코치마크) */
  .tut-hi{position:relative!important;z-index:71!important;border-radius:14px;
    box-shadow:0 0 0 2px var(--gold),0 0 0 6px rgba(156,124,74,.22),0 0 0 9999px rgba(30,25,18,.5)!important}
  .tutbox{position:fixed;z-index:72;max-width:340px;width:calc(100% - 40px);background:var(--card);
    border:1px solid var(--line);border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,.28);
    padding:15px 16px 13px;transition:top .25s ease,left .25s ease}
  .tutbox .tt{font-weight:700;font-size:15px;padding-right:26px;color:var(--ink)}
  .tutbox .tx{font-size:13px;color:var(--muted);line-height:1.65;margin-top:5px}
  .tutbox .x{position:absolute;top:8px;right:10px;border:0;background:none;font-size:17px;color:var(--muted);cursor:pointer;padding:5px;line-height:1}
  .tutdots{display:flex;gap:5px;margin:11px 0 0}
  .tutdots i{width:6px;height:6px;border-radius:50%;background:var(--line);transition:.2s}
  .tutdots i.on{background:var(--gold);width:16px;border-radius:4px}
  .tutbtns{display:flex;gap:8px;margin-top:11px}
  .ftlink{border:0;background:none;color:#6e6759;font-size:10.5px;text-decoration:underline;cursor:pointer;padding:2px 4px;font-family:inherit;opacity:.85}
  /* Quick&Easy 메인: 다음 경조사 히어로 */
  .homehero{position:relative;background:radial-gradient(140% 110% at 50% 0%,#fffefa 0%,#f9f3e9 65%,#f4ecdd 100%);
    border:1px solid #d9c8a4;border-radius:16px;box-shadow:var(--shadow); /* 금테는 탈색 헤어라인으로만 암시 */
    padding:16px 16px 15px;margin-bottom:13px;cursor:pointer;text-align:center}
  .hh-top{display:flex;justify-content:space-between;align-items:center}
  .hh-dd{background:var(--ink);color:#fff;font-size:12px;font-weight:600;padding:5px 12px;border-radius:999px;letter-spacing:.08em}
  .hh-ic{font-size:32px;margin-top:2px}
  .hh-nm{font-size:21px;margin-top:5px;color:var(--ink)}
  .hh-nm .typ{font-size:11px;color:var(--sage-d);font-weight:700}
  .hh-dt{font-size:12.5px;color:var(--muted);margin-top:7px;line-height:1.7}
  .hh-btns{margin-top:12px}
  .homehero.mem{background:linear-gradient(180deg,#3a352f,#2c2823);border-color:#575047}
  .homehero.mem .hh-nm{color:#e8e0d2}.homehero.mem .hh-dt{color:#a99e8e}
  .homehero.mem .hh-dd{background:#d8cdbb;color:#26221d}
  html[data-theme="dark"] .homehero{background:linear-gradient(180deg,#332e28,#2a2621);border-color:#4a4234}
  html[data-theme="dark"] .hh-nm{color:#ece5da}
  /* 접이식 섹션 */
  details.fold{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);margin-bottom:14px}
  details.fold>summary{padding:14px 16px;font-weight:700;font-size:14px;cursor:pointer;list-style:none;color:var(--ink)}
  details.fold>summary::-webkit-details-marker{display:none}
  details.fold>summary::after{content:'▾';float:right;color:var(--muted);font-size:12px}
  details.fold[open]>summary::after{content:'▴'}
  details.fold>.fold-body{padding:0 16px 16px}

<script>
/* ======================= 설정 ======================= */
// [운영자 설정] 앱 전체가 공유하는 카카오 JS 키 1개. developers.kakao.com에서 앱 생성 →
// 웹 플랫폼에 배포 도메인 등록 → 발급된 JavaScript 키를 여기에 한 번만 넣으면 모든 유저에게 적용됨.
// (비워두면 기기 기본 공유(Web Share)/링크복사로 자동 대체 — 일반 유저는 아무 설정도 필요 없음)
const KAKAO_JS_KEY = '07bb97e7792dc2f572d02120cd9a3f0f';
try{ if(KAKAO_JS_KEY && window.Kakao && !Kakao.isInitialized()) Kakao.init(KAKAO_JS_KEY); }catch(e){}

const TYPES={
  wedding :{icon:'💍', label:'결혼', money:'축의금', join:['참석합니다','어려워요'], counts:true,  sep:'♥', nameA:'신랑', nameB:'신부', venueL:'예식장', dateL:'예식 날짜', doc:'청첩장'},
  hwahon  :{icon:'💐', label:'화혼', money:'축의금', join:['참석합니다','어려워요'], counts:true,  sep:'♥', nameA:'신랑', nameB:'신부', venueL:'예식장', dateL:'예식 날짜', doc:'청첩장'},
  memorial:{icon:'🕊️', label:'부고', money:'조의금', join:['조문합니다','어려워요'], counts:false, sep:'',  nameA:'고인', nameB:'상주', venueL:'빈소',   dateL:'발인 일자', doc:'부고'}
};
const BANKS=['카카오뱅크','토스뱅크','국민','신한','우리','하나','농협','기업','SC제일','새마을금고'];
const RELATIONS=['가족','친척','친구','직장','선후배','기타'];

/* ======================= 상태 · 데이터 계층 ======================= */
// 설계: localStorage(주 저장소) + IndexedDB(미러·스냅샷 이중화) + 파일 백업(기기 교체용).
// 기기 교체 시 웹 저장소는 자동 이전되지 않으므로, 파일 백업/복원이 공식 이전 경로.
const LS='ieum_v3';
const SCHEMA_VERSION=3;
let _id=1; const uid=p=>(p||'x')+Date.now().toString(36)+(_id++);
// pay: { amount, source:'app'|'manual', method:'toss'|'account'|'cash' }
function mkGuest(name,relation,side,pay){return {id:uid('g'),name,relation,side:side||0,
  rsvp:{status:null,count:1,meal:true}, pay:pay||{amount:null,source:null,method:null}, unregistered:false};}

function seed(){ // 신규 사용자: 빈 상태로 시작 (샘플은 원할 때만 fillSample)
  return {
    _v:SCHEMA_VERSION,
    events:[], people:[],
    settings:{ name:'', kakaoKey:'', premium:true },
    meta:{ createdAt:Date.now(), lastBackupAt:null, dirty:0 },
    ui:{ entered:false, tab:'guest', hostEventId:null, guestView:'list', currentEventId:null,
         guestSession:{name:'', acctIdx:0} }
  };
}
function sampleData(){ // 둘러보기용 샘플 (demo:true 표시 → 한 번에 삭제 가능)
  return {
    events:[
      { id:'e1', demo:true, role:'host', type:'wedding',
        partyA:'김민준', partyB:'이서연', subtitle:'저희 결혼합니다',
        date:'2026-10-17', time:'13:00', venue:'더채플 앳 청담', address:'서울 강남구 청담동 123-4',
        message:'서로 마주보며 다져온 사랑을\n이제 함께 한곳을 바라보며\n걸어가고자 합니다.',
        externalUrl:'',
        accounts:[ {label:'신랑측', bank:'카카오뱅크', number:'3333-01-1234567', holder:'김민준', kakaopay:'https://qr.kakaopay.com/demo-minjun'},
                   {label:'신부측', bank:'토스뱅크', number:'1000-12-3456789', holder:'이서연'} ],
        guests:[ mkGuest('박지훈','친구',0,{amount:100000,source:'app',method:'toss'}),
                 mkGuest('최수아','직장',1,{amount:50000,source:'manual',method:'cash'}),
                 mkGuest('정해린','가족',1) ] },
      { id:'e2', demo:true, role:'guest', type:'wedding',
        partyA:'박서준', partyB:'김지우', subtitle:'결혼합니다',
        date:'2026-09-05', time:'12:00', venue:'그랜드 워커힐 서울', address:'서울 광진구 워커힐로 177',
        message:'두 사람이 사랑으로 만나\n새로운 가정을 이룹니다.',
        externalUrl:'https://www.barunsoncard.com',
        accounts:[ {label:'신랑측', bank:'국민', number:'123-45-6789012', holder:'박서준', kakaopay:'https://qr.kakaopay.com/demo-seojun'},
                   {label:'신부측', bank:'신한', number:'110-234-567890', holder:'김지우'} ],
        myGift:100000, myRelation:'친구', guests:[] },
      { id:'e3', demo:true, role:'guest', type:'memorial',
        partyA:'故 김정호', partyB:'', subtitle:'삼가 고인의 명복을 빕니다',
        date:'2026-07-03', time:'09:00', venue:'서울추모공원 빈소 3호', address:'서울 서초구 원지동 산4',
        message:'장례에 마음 보태주셔서 감사합니다.\n상주 김민수',
        externalUrl:'',
        accounts:[ {label:'상주측', bank:'농협', number:'302-1234-5678-91', holder:'김민수'} ],
        myGift:50000, myRelation:'직장', guests:[] }
    ],
    people:[
      { id:'p1', demo:true, name:'박서준', relation:'친구', items:[ {id:'pi1', dir:'gave', amount:100000, label:'결혼식', date:'2026-09-05'} ] },
      { id:'p2', demo:true, name:'이수민', relation:'친구', items:[ {id:'pi2', dir:'received', amount:100000, label:'내 결혼식 때', date:'2024-05-11'}, {id:'pi3', dir:'gave', amount:50000, label:'돌잔치', date:'2025-08-20'} ] },
      { id:'p3', demo:true, name:'김태영', relation:'직장', items:[ {id:'pi4', dir:'received', amount:50000, label:'내 결혼식 때', date:'2024-05-11'} ] }
    ]
  };
}
function fillSample(){ // 튜토리얼 전용: 데모 주입 (tut=이번 세션 주입분 → 종료 시 무조건 삭제 대상)
  const d=sampleData();
  d.events.forEach(e=>{ if(!S.events.find(x=>x.id===e.id)){ e.tut=true; S.events.push(e); } });
  d.people.forEach(p=>{ if(!S.people.find(x=>x.id===p.id)){ p.tut=true; S.people.push(p); } });
  save(); }

function migrate(o){ // 어떤 과거 상태가 와도 안전하게 현재 스키마로 (깊은 정규화 포함)
  const d=seed();
  if(!o||typeof o!=='object') return d;
  o._v=SCHEMA_VERSION;
  if(!Array.isArray(o.events)) o.events=[]; o.events=o.events.filter(e=>e&&typeof e==='object');
  if(!Array.isArray(o.people)) o.people=[]; o.people=o.people.filter(p=>p&&typeof p==='object');
  const legacyNoMeta = !(o.meta && typeof o.meta==='object'); // meta가 없던 v1.0 상태만 소급 태깅 대상
  o.settings={...d.settings, ...(o.settings||{})};
  o.meta={...d.meta, ...(o.meta||{})};
  o.ui={...d.ui, ...(o.ui||{})};
  o.ui.guestSession={...d.ui.guestSession, ...((o.ui&&o.ui.guestSession)||{})};
  delete o.ui.pendingRestore; // 복원 대기본은 메모리 전용 (LS 용량 2배·잔존 방지)
  // 데모 태그 소급은 v1.0(메타 없음) 데이터에 '단 한 번만' — 이후 편집된 데이터에 재스탬프 금지
  if(legacyNoMeta){
    o.events.forEach(e=>{ if(['e1','e2','e3'].includes(e.id)) e.demo=true; });
    o.people.forEach(p=>{ if(['p1','p2','p3'].includes(p.id)) p.demo=true; });
  }
  // 이벤트/하객/계좌 깊은 정규화 (복원 파일 등 어떤 형태가 와도 뷰 크래시 방지)
  const seen=new Set();
  o.events.forEach(e=>{
    if(!e.id || seen.has(e.id)) e.id=uid('e'); seen.add(e.id);
    if(typeof e.type!=='string'||!TYPES[e.type]) e.type='wedding';
    ['partyA','partyB','subtitle','date','time','venue','address','message','externalUrl'].forEach(k=>{ if(typeof e[k]!=='string') e[k]=e[k]==null?'':String(e[k]); });
    if(!Array.isArray(e.accounts)) e.accounts=[];
    e.accounts=e.accounts.filter(a=>a&&typeof a==='object');
    e.accounts.forEach(a=>{ ['label','bank','number','holder'].forEach(k=>{ if(typeof a[k]!=='string') a[k]=a[k]==null?'':String(a[k]); }); });
    if(!Array.isArray(e.guests)) e.guests=[];
    e.guests=e.guests.filter(g=>g&&typeof g==='object');
    e.guests.forEach(g=>{ if(!g.id)g.id=uid('g'); if(typeof g.name!=='string')g.name=String(g.name||'');
      g.rsvp={status:null,count:1,meal:true, ...(g.rsvp&&typeof g.rsvp==='object'?g.rsvp:{})};
      g.pay={amount:null,source:null,method:null, ...(g.pay&&typeof g.pay==='object'?g.pay:{})}; });
  });
  const pseen=new Set();
  o.people.forEach(p=>{ if(!p.id||pseen.has(p.id))p.id=uid('p'); pseen.add(p.id);
    if(!Array.isArray(p.items))p.items=[]; p.items=p.items.filter(i=>i&&typeof i==='object'); });
  return o;
}
/* 사용자가 손댄 순간 그 데이터는 더이상 '샘플'이 아님 → 자동삭제로부터 보호(승격).
   단 '튜토리얼 진행 중'의 데모 조작은 연습이므로 승격하지 않음 → 종료 시 함께 삭제("데모는 지워져요" 약속). */
function own(ev){ if(!ev) return ev;
  if(typeof TUT!=='undefined' && TUT.on && (ev.demo||ev.tut)) return ev;
  if(ev.demo) delete ev.demo; if(ev.tut) delete ev.tut; if(ev.draft) delete ev.draft; return ev; }
let S=load();
function load(){
  try{ const r=localStorage.getItem(LS); if(r) return migrate(JSON.parse(r)); }catch(e){}
  return seed();
}
/* ---- IndexedDB 미러: localStorage가 비워져도(브라우저 정리 등) 자동 복구 ---- */
function idbOpen(){ return new Promise((res,rej)=>{ try{ const q=indexedDB.open('ieum-db',1);
  q.onupgradeneeded=()=>{ try{q.result.createObjectStore('kv');}catch(e){} };
  q.onsuccess=()=>res(q.result); q.onerror=()=>rej(q.error); }catch(e){rej(e);} }); }
function idbSet(k,v){ return idbOpen().then(db=>new Promise(res=>{ const tx=db.transaction('kv','readwrite');
  tx.objectStore('kv').put(v,k); tx.oncomplete=()=>{db.close();res(true);}; tx.onerror=()=>{db.close();res(false);} })).catch(()=>false); }
function idbGet(k){ return idbOpen().then(db=>new Promise(res=>{ const tx=db.transaction('kv','readonly');
  const rq=tx.objectStore('kv').get(k); rq.onsuccess=()=>{db.close();res(rq.result);}; rq.onerror=()=>{db.close();res(undefined);} })).catch(()=>undefined); }
function coreData(){ return {events:S.events, people:S.people, settings:S.settings, meta:S.meta, theme:S.ui.theme||'auto'}; }
let _mirrorT=null;
function mirror(){ clearTimeout(_mirrorT); _mirrorT=setTimeout(()=>{ try{ idbSet('state', JSON.stringify(coreData())); }catch(e){} }, 600); }
function tryAutoRecover(){ // 부팅 시: LS는 비었는데 미러에 실데이터가 있으면 복구
  if(localStorage.getItem('ieum_wiped')){ return; } // 사용자가 명시 삭제함 — 미러로 되살리지 않음
  if(S.events.length||S.people.length) { dailySnapshot(); return; }
  idbGet('state').then(rawStr=>{ try{ const raw=rawStr&&JSON.parse(rawStr);
    if(raw && ((raw.events&&raw.events.length)||(raw.people&&raw.people.length))){
      // 복구 도착이 자동 튜토리얼과 경합하면: 투어를 정리하고 실데이터를 채택(데모 주입분은 abort가 제거)
      try{ if(typeof TUT!=='undefined' && TUT.on) abortTutorial(); }catch(_){}
      S.events=raw.events||[]; S.people=raw.people||[]; S.settings={...S.settings,...(raw.settings||{})};
      S.meta={...S.meta,...(raw.meta||{})}; if(raw.theme)S.ui.theme=raw.theme;
      S=migrate(S); try{ cleanupDemo(); }catch(_){} // 미러에 실려온 데모도 정리
      save(); applyTheme(); render(); toast('저장소에서 데이터를 자동 복구했어요');
    } }catch(e){} dailySnapshot(); });
}
const APP_VER='1.2'; // 데이터 보호 정책 버전 — 부팅 스냅샷 라벨용
function bootRawSnapshot(){ // 업데이트/마이그레이션 버그 대비: 가공 전 localStorage 원본을 3세대 롤링 보관 (IDB)
  try{ const raw=localStorage.getItem(LS); if(!raw) return;
    idbGet('boot-raw').then(s=>{ let arr=[]; try{ arr=JSON.parse(s||'[]'); }catch(e){}
      if(arr.length && arr[arr.length-1].j===raw) return; // 변화 없으면 스킵
      arr.push({d:todayStr(), v:APP_VER, j:raw}); while(arr.length>3) arr.shift();
      idbSet('boot-raw', JSON.stringify(arr)); }); }catch(e){} }
function dailySnapshot(){ // 하루 1회 롤링 스냅샷 5개 (실수 삭제·오염 대비)
  if(!(S.events.length||S.people.length)) return;
  const today=todayStr();
  idbGet('snaps').then(s=>{ let snaps=[]; try{ snaps=JSON.parse(s||'[]'); }catch(e){}
    if(snaps.length && snaps[snaps.length-1].d===today) return;
    snaps.push({d:today, j:JSON.stringify(coreData())}); while(snaps.length>5) snaps.shift();
    idbSet('snaps', JSON.stringify(snaps)); });
}
/* ---- 저장: 데이터가 실제로 바뀐 저장만 dirty·미러 반영 (내비게이션 저장은 제외) ---- */
let _lastDataSig=null;
function dataSig(){ try{ return JSON.stringify({e:S.events,p:S.people,s:S.settings}); }catch(e){ return null; } }
function save(){
  const sig=dataSig();
  const changed = sig!==null && sig!==_lastDataSig;
  if(changed && S.meta){ S.meta.dirty=(S.meta.dirty||0)+1; _lastDataSig=sig;
    if(S.events.length||S.people.length){ try{ localStorage.removeItem('ieum_wiped'); }catch(e){} } }
  try{ localStorage.setItem(LS, JSON.stringify(S)); }
  catch(e){ toast('저장 공간이 부족해요 — 데이터 정리나 백업을 권장'); }
  // 미러 갱신 제외 2경우: stale 탭 내비 저장 / 튜토리얼 중 데모 상태(자동복구 유일본을 데모로 덮는 사고 방지)
  if(changed && !(typeof TUT!=='undefined' && TUT.on)) mirror();
}
_lastDataSig=dataSig(); // 부팅 기준선
function reset(){
  if(!confirm('모든 데이터를 삭제할까요?\n백업하지 않았다면 복구할 수 없어요.'))return;
  if(!confirm('정말 삭제합니다. 계속할까요?'))return;
  clearTimeout(_mirrorT);
  localStorage.removeItem(LS);
  try{ localStorage.setItem('ieum_wiped','1'); }catch(e){}           // 미러 부활 방지
  try{ indexedDB.deleteDatabase('ieum-db'); }catch(e){}              // state·snaps·pre-restore 전부 삭제
  S=seed(); _lastDataSig=dataSig(); applyTheme(); render(); toast('모든 데이터를 삭제했어요');
}
/* ---- 멀티탭 동기화: 다른 탭이 저장하면 이 탭도 그 상태를 채택 (last-writer 덮어쓰기 방지) ---- */
window.addEventListener('storage', e=>{
  if(e.key!==LS || e.newValue==null) return;
  try{
    const tut=(typeof TUT!=='undefined' && TUT.on);
    if(tut){ try{ abortTutorial(); }catch(_){} } // 다른 탭 상태 채택 전 투어 정리(빈 화면 위 코치마크 방지)
    S=migrate(JSON.parse(e.newValue)); _lastDataSig=dataSig(); applyTheme(); render();
    if(tut) toast('다른 탭의 변경사항을 반영해 튜토리얼을 종료했어요');
  }catch(err){}
});
/* ---- 저장소 영속화 요청 (브라우저 자동정리 방지) ---- */

/* LZW 압축(UTF-8 바이트 기반) — 기기 이전 링크(#b=)에 백업 JSON을 담기 위한 경량 압축 */
function lzwEnc(str){ const s=unescape(encodeURIComponent(str)); const dict=new Map(); let size=256;
  for(let i=0;i<256;i++) dict.set(String.fromCharCode(i),i);
  let w='', out=[];
  for(const c of s){ const wc=w+c;
    if(dict.has(wc)) w=wc;
    else { out.push(dict.get(w)); if(size<65536) dict.set(wc,size++); w=c; } }
  if(w) out.push(dict.get(w));
  let bytes=''; out.forEach(code=>{ bytes+=String.fromCharCode(code>>8, code&255); });
  return btoa(bytes).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
function lzwDec(b64){ let s=b64.replace(/-/g,'+').replace(/_/g,'/'); while(s.length%4)s+='=';
  const bytes=atob(s); const codes=[];
  for(let i=0;i+1<bytes.length;i+=2) codes.push((bytes.charCodeAt(i)<<8)|bytes.charCodeAt(i+1));
  const dict=new Map(); let size=256;
  for(let i=0;i<256;i++) dict.set(i,String.fromCharCode(i));
  let w=dict.get(codes[0]), res=w;
  for(let i=1;i<codes.length;i++){ const k=codes[i]; let entry;
    if(dict.has(k)) entry=dict.get(k); else if(k===size) entry=w+w[0]; else throw new Error('lzw');
    res+=entry; if(size<65536) dict.set(size++, w+entry[0]); w=entry; }
  return decodeURIComponent(escape(res)); }
function b64urlEnc(str){ return btoa(unescape(encodeURIComponent(str))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
function b64urlDec(str){ str=str.replace(/-/g,'+').replace(/_/g,'/'); while(str.length%4)str+='='; return decodeURIComponent(escape(atob(str))); }
function encodeInvite(ev){ const o={t:ev.type,a:ev.partyA,b:ev.partyB,s:ev.subtitle,d:ev.date,ti:ev.time,v:ev.venue,ad:ev.address,m:ev.message,u:ev.externalUrl||'',
  ac:(ev.accounts||[]).map(a=>({l:a.label,bk:a.bank,n:a.number,h:a.holder,k:a.kakaopay||''}))};
  const j=JSON.stringify(o); const z=lzwEnc(j), p=b64urlEnc(j);

/* 릴레이: 사서함 주소는 행사 키의 해시(서버에 이름·행사 원문 비노출), 응답은 호스트 수신 시 서버에서 삭제 */
async function relayKey(ev){ const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode('ieum1|'+evKey(ev)));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,32); }
async function relaySend(ev,code,nm,me,opt){ const mem=ev.type==='memorial';
  toast('이음으로 전달하는 중…');
  try{ const k=await relayKey(ev);
    const ctl=new AbortController(); const tm=setTimeout(()=>ctl.abort(),8000);
    const r=await fetch(RELAY.url+'/reply',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({k,code}),signal:ctl.signal}); clearTimeout(tm);
    if(!r.ok) throw 0;
    toast(`전달했어요 — ${mem?'상주':'주최자'}가 이음을 열면 장부에 자동 반영돼요 ✓`);
  }catch(e){ toast('직접 전달이 안 돼 공유로 전환할게요'); setTimeout(()=>shareReply(ev,code,nm,me,opt),600); } }
function mergeGuestReply(ev,o){ // #g= 딥링크·릴레이 공용 병합 (같은 값 재적용은 무해=멱등)
  if(!o||!o.n) return false;
  if(!(typeof TUT!=='undefined'&&TUT.on)) own(ev);
  let g=ev.guests.find(x=>x.name===o.n);
  if(!g){ g=mkGuest(o.n, o.rel||'지인', 0); g.unregistered=true; ev.guests.push(g); }
  if(o.s){ g.rsvp.status=o.s; if(o.c) g.rsvp.count=Math.max(1,Number(o.c)||1); }
  if(o.a!=null){ g.pay={amount:Number(o.a)||0, source:o.m==='cash'?'manual':'app', method:o.m||'toss'}; }
  return true; }
let _relayPullAt=0;
async function relayPull(){ if(!RELAY.url) return; // 호스트: 내 행사 사서함 확인 (60초 스로틀)
  if(Date.now()-_relayPullAt<60000) return; _relayPullAt=Date.now();
  for(const ev of S.events.filter(e=>e.role==='host'&&evHasContent(e))){
    try{ const k=await relayKey(ev);
      try{ const ro=await fetch(RELAY.url+'/open?k='+k); if(ro.ok){ const o=await ro.json();
        if(!S.meta.openCnt)S.meta.openCnt={}; if(o.n>(S.meta.openCnt[ev.id]||0)){ S.meta.openCnt[ev.id]=o.n; save(); } } }catch(e){}
      const r=await fetch(RELAY.url+'/replies?k='+k); if(!r.ok) continue;
      const arr=await r.json(); if(!Array.isArray(arr)||!arr.length) continue;
      let n=0;
      arr.forEach(code=>{ try{ const o=JSON.parse(b64urlDec(code));
        if(o.k===evKey(ev) && mergeGuestReply(ev,o)) n++; }catch(e){} });
      if(n){ save(); render(); setTimeout(()=>toast(`하객 응답 ${n}건이 장부에 자동 반영됐어요 ✓`),300); }
    }catch(e){} } }

function roundRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

/* ======================= 캘린더 ======================= */
function icsStamp(d,t){const dt=new Date(d+'T'+(t||'00:00')+':00+09:00');return dt.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');}
function vevent(ev,hours){
  const start=icsStamp(ev.date,ev.time);
  const e=new Date(ev.date+'T'+(ev.time||'00:00')+':00+09:00');e.setHours(e.getHours()+(hours||2));
  const end=e.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
  return ['BEGIN:VEVENT','UID:'+uid('ics')+'@ieum','DTSTAMP:'+start,'DTSTART:'+start,'DTEND:'+end,
    'SUMMARY:'+evNamePlain(ev)+' '+cfg(ev).money.replace('금',''),'LOCATION:'+(ev.venue+' '+ev.address),
    'DESCRIPTION:'+(ev.message||'').replace(/\n/g,' '),
    'BEGIN:VALARM','TRIGGER:-P1D','ACTION:DISPLAY','DESCRIPTION:'+evNamePlain(ev),'END:VALARM','END:VEVENT'].join('\r\n');
}
/* 파일 내보내기 공용: 공유시트 우선(iOS 설치형에서 a[download]는 무동작) → 다운로드 폴백. 성공했을 때만 성공 토스트 */
function exportFile(blob, fname, shareText, okMsg){
  const file=new File([blob],fname,{type:blob.type||'application/octet-stream'});
  const dl=()=>{ if(noDownload()){ toast(isInApp()?'이 브라우저에선 파일 저장이 막혀 있어요 — Safari로 열어 저장해 주세요':'이 화면에선 파일 저장이 제한돼요 — 사파리에서 열어 저장해 주세요'); return; }
    dlBlob(blob,fname); toast(okMsg); };
  if(navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file], text:shareText||fname}).then(()=>toast(okMsg))
      .catch(err=>{ if(err&&err.name==='AbortError'){ return; } dl(); });
    return;
  }
  dl();
}
function saveICS(ev){
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//ieum//ko','CALSCALE:GREGORIAN',vevent(ev,3),'END:VCALENDAR'].join('\r\n');
  exportFile(new Blob([ics],{type:'text/calendar;charset=utf-8'}),'ieum-event.ics',evNamePlain(ev)+' 일정','.ics 파일을 보냈어요 — 파일을 열면 캘린더에 추가돼요');
}

}

  const start=icsStamp(ev.date,ev.time);const e=new Date(ev.date+'T'+(ev.time||'00:00')+':00+09:00');e.setHours(e.getHours()+3);

  const slot=(ev.accounts||[]).find(a=>a&&!a.number); // 빈 슬롯(신랑측 등 라벨 유지) 우선
  if(slot){ slot.bank=gv('ga_bank')||slot.bank; slot.number=num; slot.holder=gv('ga_hold').trim()||slot.holder; }
  else { if(!ev.accounts) ev.accounts=[];
    ev.accounts.push({label:ev.type==='memorial'?'상주측':'받는분', bank:gv('ga_bank')||'카카오뱅크', number:num, holder:gv('ga_hold').trim()}); }
  S.ui.gacctOpen=false; S.ui.guestSession.acctIdx=0; save(); render();
  toast('계좌를 저장했어요 — 이제 바로 보낼 수 있어요'); }
function focusGname(){ const el=$('#gname'); if(el){ try{ el.scrollIntoView({behavior:'smooth',block:'center'}); }catch(e){} setTimeout(()=>el.focus(),350); } }
function payViaApp(method){ const ev=curEvent(); if(!ev)return;
  const nm=(S.ui.guestSession.name||($('#gname')&&$('#gname').value.trim())||(S.settings&&S.settings.name)||'').trim();
  const amt=Number($('#sendamt')&&$('#sendamt').value);
  if(!nm&&!amt){toast('성함과 금액을 입력해 주세요');focusGname();return;}
  if(!nm){toast('성함을 입력해 주세요');focusGname();return;}
  if(!amt){toast('보낼 금액을 입력하세요');return;}
  const acc=curAcct();
  if(!acc && method!=='cash'){toast('받을 계좌를 먼저 입력해 주세요');openGuestAcct();return;}
  own(ev); // 검증 통과 후에만 승격 (실패 탭이 데모를 승격시키지 않도록)
  S.ui.guestSession.name=nm;
  let x=ev.guests.find(g=>g.name===nm); if(!x){x=mkGuest(nm,ev.myRelation||'지인',S.ui.guestSession.acctIdx||0);x.unregistered=true;ev.guests.push(x);}
  x.pay={amount:amt, source:method==='cash'?'manual':'app', method};
  ev.myGift=amt; S.ui.guestSession.draftAmt=null; save();
  if(method==='toss'){
    if(isInApp()&&!isKakaoInApp()){ // 인스타·페북 등 웹뷰는 커스텀 스킴을 조용히 무시 — 시도 없이 정직하게
      copyAcct(acc); setTimeout(()=>toast('이 브라우저에선 토스 연결이 막혀 계좌를 복사했어요 — 뱅킹앱에 붙여넣어 이체하세요'),300); }
    else { toast('토스로 연결하는 중…');
      // 스킴 대입은 실패해도 throw하지 않음 → '이탈 이력'으로 실패 감지.
      // iOS는 앱 전환 중 타이머를 정지시켜 복귀 후 발화하므로(그땐 이미 visible) 발화 시점 가시성만으론 오탐.
      let left=false; const onLeave=()=>{left=true;};
      ['visibilitychange','pagehide','blur'].forEach(t=>addEventListener(t,onLeave,{once:true}));
      try{ window.location.href=tossLink(acc,amt); }catch(e){}
      setTimeout(()=>{ ['visibilitychange','pagehide','blur'].forEach(t=>removeEventListener(t,onLeave));
        if(left||document.hidden||document.visibilityState==='hidden') return;
        copyAcct(acc); toast(`토스가 안 열리면 계좌로 이체하세요 — ${acc.bank} ${acc.number} (복사됨)`); },1600); } }
  else if(method==='kakao'){ const link=acc.kakaopay;
    if(link){ copy(`${acc.bank} ${acc.number} ${acc.holder}`);
      toast('카카오페이로 이동 — 금액을 입력해 보내세요 (계좌도 복사해 뒀어요)');
      openUrl(link); } // https 링크: 새 탭 우선(이음 화면 보존), 인앱 등 실패 시 현재 탭
    else { copyAcct(acc); toast('카카오페이 링크가 없어 계좌를 복사했어요'); } }
  else if(method==='cash'){ toast('현금 전달로 기록했어요 — 가계부에 반영됩니다'); }
  else { copyAcct(acc); toast('계좌 복사됨 — 뱅킹앱에서 송금하세요'); }
  render(); tiePop(ev); }

function ensureHostEvent(){ // 빈 시작에서도 호스트 모드가 안전하도록 (미입력 초안은 draft — 목록 비노출·이탈 시 정리)
  let ev=S.events.find(e=>e.id===S.ui.hostEventId) || S.events.find(e=>e.role==='host');
  if(!ev){ ev={ id:uid('e'), draft:true, role:'host', type:'wedding', partyA:'', partyB:'', subtitle:'저희 결혼합니다',
    date:'', time:'13:00', venue:'', address:'', message:'', externalUrl:'',
    accounts:[{label:'신랑측',bank:'카카오뱅크',number:'',holder:''},{label:'신부측',bank:'토스뱅크',number:'',holder:''}], guests:[] };
    S.events.push(ev); S.ui.hostEventId=ev.id; save(); }
  S.ui.hostEventId=ev.id; return ev; }
function pruneDraft(){ // 아무것도 입력 안 한 호스트 초안은 나갈 때 조용히 제거
  const before=S.events.length;
  S.events=S.events.filter(e=>!(e.draft && e.role==='host' && !evHasContent(e)));
  if(S.events.length!==before){ if(!S.events.find(e=>e.id===S.ui.hostEventId)) S.ui.hostEventId=null; save(); } }
function tutAutoOk(){ // 첫 설치 판정: 빈 초안(draft)은 제외, 자동복구로 데이터가 도착했으면 취소
  return S.meta && !S.meta.tutDone && !S.people.length
    && !S.events.filter(e=>!(e.draft&&!evHasContent(e))).length; }
function enterAs(mode){ S.ui.tab=mode; if(mode==='guest'){ S.ui.guestView='list'; } else { ensureHostEvent(); S.ui.hostTab='setup'; } S.ui.entered=true; save(); render(); window.scrollTo(0,0);
  // 첫 설치(빈 데이터) 유저: 튜토리얼 자동 시작 (X로 닫으면 다시 안 뜸)
  if(mode==='guest' && tutAutoOk()){ setTimeout(()=>{ if(!TUT.on && tutAutoOk()) startTutorial(); },400); } }
function goLanding(){ try{ abortTutorial(); }catch(e){} try{ pruneDraft(); }catch(e){}
  S.ui.entered=false; save(); render(); window.scrollTo(0,0); }

/* ---------- 이음 달력 ---------- */
function ymToday(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function ensureCalYM(){ if(!S.ui.calYM){ const ds=S.events.map(e=>e.date).filter(Boolean).sort(); const t=todayStr();
  const near=ds.find(d=>d>=t)||ds[0]; S.ui.calYM = near ? near.slice(0,7) : ymToday(); } }
function selDateLabel(ds){const d=new Date(ds+'T00:00');const w=['일','월','화','수','목','금','토'];return `${d.getMonth()+1}월 ${d.getDate()}일 (${w[d.getDay()]})`;}
function calNav(delta){ ensureCalYM(); let [y,m]=S.ui.calYM.split('-').map(Number);
  const idx=y*12+(m-1)+delta; y=Math.floor(idx/12); m=idx%12+1;
  S.ui.calYM=y+'-'+String(m).padStart(2,'0'); S.ui.calSelDate=null; save(); render(); }
function calPick(ds){ S.ui.calSelDate = (S.ui.calSelDate===ds ? null : ds); save(); render(); }
function calToday(){ S.ui.calYM=ymToday(); S.ui.calSelDate=null; save(); render(); }
function addEventOnDate(ds,type){ // 달력에서 날짜 탭 → 참석할 경조사 추가 폼(날짜 프리필). 내 행사 만들기는 호스트 메뉴에서 명시적으로.
  S.ui.tab='guest'; S.ui.guestView='add'; S.ui.addType=type; S.ui.addRelation='';
  S.ui.addDraft={ na:'', nb:'', nd:ds, nt:'12:00', nv:'' };
  S.ui.calSelDate=null; save(); render(); window.scrollTo(0,0);
  toast(selDateLabel(ds)+'로 채워뒀어요 — 정보를 입력하세요');
}
/* ---- 직접 추가: 달력 팝업에서 날짜 선택 → 전체 입력 폼 (본문 상시 달력 진입과 병행) ---- */
let CALPOP_YM=null, _calpopHideT=null;
let _calshHideT=null;
function openCalSheet(){ let bg=document.getElementById('calsheet');
  if(!bg){ bg=document.createElement('div'); bg.id='calsheet'; bg.className='sheet-bg';
    bg.addEventListener('click',e=>{ if(e.target===bg) closeCalSheet(); }); document.body.appendChild(bg); }
  const ev=curEvent(); const doc=ev?cfg(ev).doc:'경조사';
  bg.innerHTML=`<div class="sheet" onclick="event.stopPropagation()" style="padding-bottom:calc(16px + env(safe-area-inset-bottom))">
    <div class="secthead"><div class="t" style="font-size:15px">캘린더에 저장</div>
      <button class="minibtn" onclick="closeCalSheet()">닫기</button></div>
    <p class="sub" style="margin:2px 0 12px">${doc} 일정을 내 캘린더에 넣어드려요.</p>
    <button class="btn btn-sage" onclick="closeCalSheet();saveICS(curEvent())">내 캘린더에 저장 <span style="font-weight:400;font-size:11.5px;opacity:.85">· .ics 파일</span></button>
    <button class="btn btn-ghost" style="margin-top:8px" onclick="closeCalSheet();googleCal(curEvent())">구글 캘린더에 등록</button>
  </div>`;
  clearTimeout(_calshHideT); setTimeout(()=>bg.classList.add('show'),10); }
function closeCalSheet(){ const bg=document.getElementById('calsheet'); if(!bg) return;
  bg.classList.remove('show'); _calshHideT=setTimeout(()=>{ try{ bg.remove(); }catch(e){} },220); }
function openCalPopup(){ CALPOP_YM=CALPOP_YM||ymToday(); clearTimeout(_calpopHideT);
  renderCalPopup(); const bg=document.getElementById('calpop');
  setTimeout(()=>bg.classList.add('show'),10);
  try{ histGuard(); }catch(e){} } // 안드로이드 백버튼으로 닫히도록
function renderCalPopup(){ let bg=document.getElementById('calpop');
  if(!bg){ bg=document.createElement('div'); bg.id='calpop'; bg.className='sheet-bg';
    bg.addEventListener('click',e=>{ if(e.target===bg) closeCalPopup(); });
    document.body.appendChild(bg); }
  const [y,m]=CALPOP_YM.split('-').map(Number);
  bg.innerHTML=`<div class="sheet" style="padding-bottom:calc(16px + env(safe-area-inset-bottom))">
    <div class="secthead"><div class="t" style="font-size:15px">참석할 날짜를 선택하세요</div>
      <button class="minibtn" onclick="closeCalPopup()">닫기</button></div>
    <p class="sub" style="margin:2px 0 10px">날짜를 고르면 경조사 정보 입력으로 이어져요.</p>
    <div class="calhead"><button class="calnav" onclick="calpopNav(-1)">‹</button>
      <div class="caltitle">${y}년 ${m}월</div>
      <button class="calnav" onclick="calpopNav(1)">›</button></div>
    <div class="calgrid">${['일','월','화','수','목','금','토'].map((w,i)=>`<div class="caldow ${i===0?'sun':''}">${w}</div>`).join('')}${calpopGrid(y,m)}</div>
  </div>`; }
function calpopGrid(y,m){ const first=new Date(y,m-1,1).getDay(); const days=new Date(y,m,0).getDate();
  const evDates=new Set(S.events.filter(e=>!(e.draft&&!evHasContent(e))&&e.date).map(e=>e.date));
  const t=todayStr(); let cells='';
  for(let i=0;i<first;i++) cells+='<button class="calday empty"></button>';
  for(let d=1;d<=days;d++){ const ds=y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    cells+=`<button class="calday ${evDates.has(ds)?'ev':''}${ds===t?' today':''}" onclick="calpopPick('${ds}')">${d}${evDates.has(ds)?'<span class="cdot"></span>':''}</button>`; }
  return cells; }
function calpopNav(d){ let [y,m]=CALPOP_YM.split('-').map(Number); const i=y*12+(m-1)+d;
  y=Math.floor(i/12); m=i%12+1; CALPOP_YM=y+'-'+String(m).padStart(2,'0'); renderCalPopup();
  document.getElementById('calpop').classList.add('show'); }
function calpopPick(ds){ closeCalPopup(); addEventOnDate(ds,'wedding'); } // 유형은 폼에서 변경 가능
function closeCalPopup(){ const bg=document.getElementById('calpop'); if(!bg) return;
  bg.classList.remove('show'); clearTimeout(_calpopHideT);
  _calpopHideT=setTimeout(()=>{ try{ bg.remove(); }catch(e){} },220); }
function calendarHTML(){
  ensureCalYM();
  const [y,m]=S.ui.calYM.split('-').map(Number);
  const startDow=new Date(y,m-1,1).getDay();
  const daysIn=new Date(y,m,0).getDate();
  const t=todayStr();
  const evCount={}; S.events.forEach(e=>{ if(e.date) evCount[e.date]=(evCount[e.date]||0)+1; });
  const dows=['일','월','화','수','목','금','토'];
  let cells='';
  for(let i=0;i<startDow;i++) cells+='<div class="calday empty"></div>';
  for(let d=1;d<=daysIn;d++){
    const ds=y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const has=evCount[ds]>0, isT=ds===t, isS=S.ui.calSelDate===ds;
    cells+=`<button class="calday${has?' ev':''}${isT?' today':''}${isS?' sel':''}" onclick="calPick('${ds}')">${d}${has?'<span class="cdot"></span>':''}</button>`;
  }
  const sel=S.ui.calSelDate; let below='';
  if(sel){
    const list=S.events.filter(e=>e.date===sel);
    if(list.length){
      below=`<div class="calsel"><div class="calseltt">${selDateLabel(sel)} · 경조사 ${list.length}건</div>
        ${list.map(ev=>{const c=cfg(ev);return `<div class="calevrow" onclick="openEvent('${ev.id}')">
          <span class="cic">${c.icon}</span><span class="cnm">${esc(evNamePlain(ev))||'(이름 미입력)'}</span>
          <span class="ctag">${c.label}</span><span class="cchev">›</span></div>`;}).join('')}</div>`;
    } else {
      below=`<div class="calsel"><div class="calseltt">${selDateLabel(sel)} · 경조사 없음</div>
        <div class="caladd">이 날짜에 추가 ${['wedding','hwahon','memorial'].map(tp=>`<button class="addtype" onclick="addEventOnDate('${sel}','${tp}')">${TYPES[tp].icon} ${TYPES[tp].label}</button>`).join('')}</div></div>`;
    }
  }
  return `<div class="card">
    <div class="calhead"><button class="calnav" onclick="calNav(-1)">‹</button>
      <div class="caltitle">${y}년 ${m}월 ${S.ui.calYM!==ymToday()?`<button class="minibtn" style="padding:3px 9px;font-size:11px;margin-left:6px" onclick="calToday()">오늘</button>`:''}</div>
      <button class="calnav" onclick="calNav(1)">›</button></div>
    <div class="calgrid">${dows.map((w,i)=>`<div class="caldow${i===0?' sun':''}">${w}</div>`).join('')}${cells}</div>
    ${below}
    <div class="note">💡 이음 달력 — 날짜를 누르면 그 날의 경조사를 선택하거나, 빈 날짜엔 새 경조사를 추가할 수 있어요.</div>
  </div>`;
}

// 부고용 검은 리본 (이모지 돈다발 대신 — 근조의 격식)
const RIBBON=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;color:#3a352e"><path d="M12 2.5c-2.6 0-4.2 1.7-4.2 4 0 1.8.9 3.2 2 4.6L5.5 20.5h3.4L12 15l3.1 5.5h3.4L14.2 11c1.1-1.4 2-2.8 2-4.6 0-2.3-1.6-3.9-4.2-3.9z"/><path d="M9.8 6.5c0 1.5 1 2.7 2.2 4.1 1.2-1.4 2.2-2.6 2.2-4.1"/></svg>`;
function guestDetail(){
  const ev=curEvent(); if(!ev){S.ui.guestView='list';return guestList();}
  const c=cfg(ev); const nm=S.ui.guestSession.name||(S.settings&&S.settings.name)||''; const me=nm?ev.guests.find(x=>x.name===nm):null;
  const accts=(ev.accounts||[]).filter(a=>a&&a.number); // 번호 없는 빈 계좌는 송금 UI에서 제외 (직접 추가 행사 등)

  return `

  ${ev.message?`<p class="quote serif" style="margin:2px 6px 14px">${esc(ev.message).replace(/\n/g,'<br/>')}</p>`:''}

    <h3>${ev.type==='memorial'?`${RIBBON} 마음 전하기 (${c.money})`:`💸 마음 전하기 (${c.money})`}</h3>

      <button class="minibtn" onclick="copyCurAcct()">복사</button></div>`

    <details id="gacct" style="margin-top:8px" ${S.ui.gacctOpen?'open':''} ontoggle="S.ui.gacctOpen=this.open">
      <summary style="cursor:pointer;font-size:12.5px;font-weight:600;color:var(--primary-d)">＋ 받을 계좌 직접 입력</summary>

        <div style="max-width:34%"><select id="ga_bank">${BANKS.map(b=>`<option>${b}</option>`).join('')}</select></div>

      </div>

      <button class="btn btn-sage btn-sm" style="margin-top:8px" onclick="saveGuestAcct()">계좌 저장</button>
    </details>`}
    <label>보내는 분 성함</label>
    <input id="gname" placeholder="이름 (주최자가 알아볼 수 있게)" value="${esc(nm)}" onchange="setGuestName(this.value)">
    <label>보낼 금액 <button class="minibtn" style="float:right;padding:4px 9px" onclick="openReco(curEvent().id)">${ev.type==='memorial'?'얼마가 적당할까요':'💡 얼마가 적당할까?'}</button></label>
    <input id="sendamt" type="number" inputmode="numeric" placeholder="예: 100000" value="${me&&me.pay&&me.pay.amount!=null?me.pay.amount:(S.ui.guestSession.draftAmt||'')}" oninput="amtPreview()">

      <div class="chips">${[50000,100000,150000,200000].map(a=>`<button class="chip" style="padding:5px 11px;font-size:12px" onclick="setAmt(${a})">${a/10000}만</button>`).join('')}</div>

      <summary><span class="pc-t"><b>${ev.type==='memorial'?'간편송금':'⚡ 간편송금'}</b><small>토스 · 카카오페이 — 앱에서 바로</small></span><span class="pc-ar">▾</span></summary>

        <button class="btn btn-toss" onclick="payViaApp('toss')">토스로 보내기 · 금액 자동완성</button>
        ${acc.kakaopay?`<button class="btn btn-kakao" style="margin-top:8px" onclick="payViaApp('kakao')">카카오페이로 보내기</button>`:''}
      </div>
    </details>
    <details class="paycat" ${S.ui.payCat==='bank'?'open':''} ontoggle="if(this.open)S.ui.payCat='bank'">
      <summary><span class="pc-t"><b>${ev.type==='memorial'?'계좌이체':'🏦 계좌이체'}</b><small>모든 은행 · 증권 앱</small></span><span class="pc-ar">▾</span></summary>
      <div class="pc-body">
        <button class="btn btn-ghost" onclick="payViaApp('account')">계좌번호 복사 → 내 뱅킹앱에서 이체</button>
        <p class="lblnote" style="margin-top:6px">${esc(acc.bank)} ${esc(acc.number)} 가 복사돼요</p>
      </div>
    </details>`:`
    <details class="paycat" ${(S.ui.payCat||'easy')==='easy'?'open':''} ontoggle="if(this.open)S.ui.payCat='easy'">
      <summary><span class="pc-t"><b>${ev.type==='memorial'?'간편송금':'⚡ 간편송금'}</b><small>토스 · 카카오페이 — 앱에서 바로</small></span><span class="pc-ar">▾</span></summary>
      <div class="pc-body">
        <button class="btn btn-toss" onclick="openGuestAcct()">계좌 입력하고 토스로 보내기</button>
        <p class="lblnote" style="margin-top:6px">위 [받을 계좌 직접 입력]에 넣으면 금액 자동완성으로 바로 보내져요.</p>
      </div>
    </details>
    <details class="paycat" ${S.ui.payCat==='bank'?'open':''} ontoggle="if(this.open)S.ui.payCat='bank'">
      <summary><span class="pc-t"><b>${ev.type==='memorial'?'계좌이체':'🏦 계좌이체'}</b><small>모든 은행 · 증권 앱</small></span><span class="pc-ar">▾</span></summary>
      <div class="pc-body">
        <button class="btn btn-ghost" onclick="openGuestAcct()">계좌 입력하고 복사하기</button>
      </div>
    </details>`}
    <details class="paycat" ${S.ui.payCat==='cash'?'open':''} ontoggle="if(this.open)S.ui.payCat='cash'">
      <summary><span class="pc-t"><b>${ev.type==='memorial'?'✉️ 현금 · 부의 봉투':'🧧 현금 · 봉투'}</b><small>${ev.type==='memorial'?'조문 시':'식장에서'} 직접 전달</small></span><span class="pc-ar">▾</span></summary>
      <div class="pc-body">
        <button class="btn btn-ghost btn-sm" onclick="payViaApp('cash')">현금으로 전달했어요 · 기록만</button>
        <button class="btn btn-line btn-sm" style="margin-top:8px" onclick="openEnvelope(curEvent().id)">봉투 쓰는 법 보기</button>
      </div>
    </details>
    ${me&&me.pay&&me.pay.amount!=null?`<div class="note" style="margin-top:10px">✓ <b>${won(me.pay.amount)}</b> 보냄 — 내 가계부에 저장했어요. 아래 <b>[${ev.type==='memorial'?'상주에게 알리기':'주최자에게 알리기'}]</b>로 전할 수 있어요.
      <div class="row" style="margin-top:9px">
        <button class="btn btn-ghost btn-sm" onclick="clearMyPay()">기록 지우기</button>
      </div></div>${iosNudge()}`:''}
    <p class="lblnote" style="margin-top:9px">이음은 자금을 거치지 않아요 — 송금은 내 금융앱에서 직접 이루어집니다.</p>
  </div>

  <details class="fold" ${(me&&me.rsvp.status)||S.ui.rsvpOpen?'open':''} ontoggle="S.ui.rsvpOpen=this.open">
    <summary>${ev.type==='memorial'?'조문 여부 알리기':'🙋 참석 여부 알리기 (RSVP)'} <span style="font-weight:400;color:var(--muted);font-size:12px">· 선택</span></summary>
    <div class="fold-body">
    <p class="lblnote" style="margin-top:2px">성함은 위 '마음 전하기'의 성함을 함께 써요${nm?` — <b>${esc(nm)}</b>`:''}</p>

      <button class="${me&&me.rsvp.status==='yes'?'on':''}" onclick="rsvp('yes')">${c.join[0]}</button>
      <button class="${me&&me.rsvp.status==='no'?'on':''}" onclick="rsvp('no')">${c.join[1]}</button>
    </div>
    ${c.counts&&me&&me.rsvp.status==='yes'?`
    <div class="row" style="margin-top:8px">
      <div><label>참석 인원</label><input type="number" min="1" value="${me.rsvp.count}" onchange="rsvpField('count',this.value)"></div>
      <div><label>식사</label><select onchange="rsvpField('meal',this.value)">
        <option value="1" ${me.rsvp.meal?'selected':''}>예정</option><option value="0" ${!me.rsvp.meal?'selected':''}>안 함</option>
      </select></div></div>`:''}
    ${me&&me.rsvp.status?`<div class="note" style="margin-top:10px">✓ ${esc(me.name)}님 응답을 저장했어요 — 아래 [${ev.type==='memorial'?'상주에게 알리기':'주최자에게 알리기'}]로 전할 수 있어요.</div>`:''}
    </div>
  </details>
  ${notifyCard(ev,me,nm)}
  <button class="backbtn" style="color:var(--danger);margin:0 4px 10px" onclick="delEvent('${ev.id}')">이 경조사 삭제</button>`;
}
function notifyCard(ev,me,nm){ // 알리기 단일 진입점: 보낼 내용을 체크박스로 확인 후 전송 (삭제 버튼 직전)
  const mem=ev.type==='memorial'; const c=cfg(ev);
  const hasPay=me&&me.pay&&me.pay.amount!=null, hasRsvp=me&&me.rsvp&&me.rsvp.status;
  if(!hasPay&&!hasRsvp) return ''; // 알릴 내용이 생기면 나타남
  const who=mem?'상주':'주최자';
  const rsvpTxt=hasRsvp?(me.rsvp.status==='yes'?(c.counts?`${c.join[0]} · ${me.rsvp.count||1}명`:c.join[0]):c.join[1]):'';
  const payTxt=hasPay?`${c.money} ${won(me.pay.amount)}${me.pay.method==='toss'?' (토스)':me.pay.method==='kakao'?' (카카오페이)':me.pay.method==='cash'?' (현금 전달)':''}`:'';
  const direct=RELAY.url&&ev.invited;
  return `<div class="card" id="notifycard">
    <h3>${mem?'🕊️ 상주에게 알리기':'📨 주최자에게 알리기'}</h3>
    <div class="tienote" style="margin:6px 0 10px">${mem
      ?`🕊️ 알리기를 누르면 상주의 장부에 위로가 이름과 함께 남아요 — 슬픔의 곁을 지켜준 마음, 오래 기억되도록.`
      :`💞 알리기를 누르면 주최자 장부에 내 이름이 기록돼요 — 언젠가 내 경조사에서 서로의 마음이 다시 이어지도록. 기록을 잃어도 주최자 장부엔 내 마음이 남아요.`}</div>
    <p class="sub" style="margin:0 0 4px">보낼 내용을 확인해 주세요${nm?` — <b>${esc(nm)}</b>`:''}.</p>
    ${hasRsvp?`<label class="ckrow"><input type="checkbox" id="nf_rsvp" checked><span>${mem?'조문 여부':'참석 여부'} — <b>${esc(rsvpTxt)}</b></span></label>`:''}
    ${hasPay?`<label class="ckrow"><input type="checkbox" id="nf_pay" checked><span>${c.money} — <b>${esc(payTxt)}</b></span></label>`:''}
    <button class="btn btn-primary" style="margin-top:11px" onclick="notifyHost()">${mem?'상주에게 알리기':'주최자에게 알리기'}</button>
    <p class="lblnote" style="margin-top:7px">${direct
      ?`공유창 없이 ${who}의 이음으로 바로 전달돼요 — ${who}가 앱을 열면 장부에 자동 반영.`
      :`카톡 등으로 메시지를 보내면, ${who}가 링크를 탭할 때 장부에 자동 반영돼요.`}</p>
  </div>`; }

/* ======================= 액션 ======================= */
function updEv(k,v){const ev=own(hostEvent());ev[k]=v;save();if(k==='date'||k==='time')$('#ddayTop').textContent=dday(ev);}
function setType(t){
  if(!TYPES[t])return;
  const ev=own(hostEvent()); ev.type=t;
  if(ev.cardIdx!=null && CARDS[ev.cardIdx] && (CARDS[ev.cardIdx].mood==='mourn')!==(t==='memorial')) delete ev.cardIdx;
  if(t==='memorial'){
    const a0=ev.accounts[0]||{bank:'카카오뱅크',number:'',holder:''};
    ev.accounts=[{...a0, label:'상주측'}];
  }else{
    if(!ev.accounts[0]) ev.accounts[0]={bank:'카카오뱅크',number:'',holder:''};
    ev.accounts[0].label='신랑측';
    if(!ev.accounts[1]) ev.accounts.push({label:'신부측',bank:'토스뱅크',number:'',holder:''});
    else ev.accounts[1].label='신부측';
  }
  save();render();toast(TYPES[t].label+'(으)로 변경');
}
function updAcct(i,f,v){const ev=own(hostEvent());ev.accounts[i][f]=v;save();}
function addGuestInline(){ const n=gv('hg_name').trim(); if(!n){toast('하객 이름을 입력하세요');return;}
  const ev=own(hostEvent()); const side=Math.min(Number(gv('hg_side')||0), Math.max(0,ev.accounts.length-1));
  ev.guests.push(mkGuest(n,'친구',side)); save(); render(); toast(n+'님을 추가했어요');
  setTimeout(()=>{ const el=$('#hg_name'); if(el){ el.focus(); } },50); } // 연속 추가 편의
function delGuest(id){const ev=hostEvent();const x=ev.guests.find(g=>g.id===id);
  if(x && !confirm(`${x.name}님을 명단에서 삭제할까요?`))return;
  ev.guests=ev.guests.filter(g=>g.id!==id);save();render();toast('삭제했어요');}
function delEvent(id){ const ev=S.events.find(e=>e.id===id); if(!ev)return;
  if(!confirm(`'${evNamePlain(ev)||'이 경조사'}'를 삭제할까요?\n장부·기록도 함께 삭제됩니다.`))return;
  S.events=S.events.filter(e=>e.id!==id);
  if(S.ui.hostEventId===id)S.ui.hostEventId=null;
  if(S.ui.currentEventId===id)S.ui.currentEventId=null;
  S.ui.tab='guest'; S.ui.guestView=(S.ui.evFrom==='allev')?'allev':'list'; S.ui.evFrom=null; S.ui.hostSub=null;
  save(); render(); window.scrollTo(0,0); toast('경조사를 삭제했어요'); }
let HGQ=''; // 하객 검색어 (세션 한정)
function hostGuestsHTML(ev){ const q=HGQ.trim();
  let list=ev.guests.filter(x=>!x.unregistered);
  if(q) list=list.filter(x=>(x.name||'').includes(q)||(x.relation||'').includes(q));
  if(!list.length) return q?`<div class="empty">'${esc(q)}' 검색 결과가 없어요</div>`:'<div class="empty">하객을 추가해 주세요</div>';
  return list.map(x=>rowHost(ev,x)).join(''); }
function renderHostGuests(){ const ev=hostEvent(); const el=$('#hg-list'); if(ev&&el) el.innerHTML=hostGuestsHTML(ev); }
function updateHostLedgerUI(ev,x){ // 입력 포커스·키보드 유지를 위한 부분 갱신
  const led=ledgerStats(ev);
  const set=(id,v)=>{const el=document.getElementById(id); if(el)el.textContent=v;};
  set('hl-attend',led.attend); set('hl-paid',led.paid); set('hl-total',won(led.total));
  const sp=document.getElementById('hl-split'); if(sp) sp.textContent=`🔵 이음 송금 ${won(led.appSum)} · ✏️ 현금·직접입력 ${won(led.manualSum)}`;
  if(x){ const p=x.pay||{};
    const src=p.amount!=null?(p.source==='app'?`<span class="pill pill-app">🔵 이음${p.method==='kakao'?'·카카오':p.method==='toss'?'·토스':''}</span>`:`<span class="pill pill-cash">${p.method==='cash'?'💵 현금':'✏️ 직접입력'}</span>`):'';
    const se=document.getElementById('src-'+x.id); if(se) se.innerHTML=src;
    const cb=document.getElementById('cash-'+x.id); if(cb) cb.classList.toggle('on',p.method==='cash'); } }
function hostSetPay(id,v){const ev=own(hostEvent());const x=ev.guests.find(g=>g.id===id);if(!x)return; const amt=v===''?null:Number(v);
  if(!x.pay)x.pay={amount:null,source:null,method:null}; x.pay.amount=amt;
  if(amt==null){x.pay.source=null;x.pay.method=null;}
  else if(x.pay.source!=='app'){x.pay.source='manual'; if(!x.pay.method)x.pay.method='manual';}
  save();updateHostLedgerUI(ev,x);}
function toggleCash(id){const ev=own(hostEvent());const x=ev.guests.find(g=>g.id===id);if(!x)return; if(!x.pay)x.pay={amount:null,source:null,method:null};
  if(x.pay.method==='cash'){x.pay.method='manual';} else {x.pay.method='cash'; x.pay.source='manual';} save();updateHostLedgerUI(hostEvent(),x);}
function promote(id){const x=hostEvent().guests.find(g=>g.id===id);if(!x)return;x.unregistered=false;save();render();toast('명단으로 옮겼어요');}

function captureAmt(){ const el=$('#sendamt'); if(el) S.ui.guestSession.draftAmt=el.value; } // 재렌더 시 금액 유실 방지
function setGuestName(v){captureAmt();S.ui.guestSession.name=v.trim();save();render();}
function setAmt(v){ const el=$('#sendamt'); if(el){ el.value=v; amtPreview(); } }
function amtPreview(){ const el=$('#sendamt'), p=$('#amtPrev'); if(!el||!p) return;
  S.ui.guestSession.draftAmt=el.value;
  const n=Number(el.value); p.textContent = n>0 ? won(n) : ''; }
function clearMyPay(){ const ev=curEvent(); if(!ev)return;
  const nm=(S.ui.guestSession.name||(S.settings&&S.settings.name)||'').trim();
  const me=ev.guests.find(g=>g.name===nm);
  if(me) me.pay={amount:null,source:null,method:null};
  ev.myGift=null; S.ui.guestSession.draftAmt=null; save(); render(); toast('보냄 기록을 지웠어요'); }

function ledgerStats(ev){let attend=0,heads=0,total=0,appSum=0,manualSum=0,paid=0;

function myStats(){ let given=0,gaveCount=0,received=0,recvCount=0; const byRel={};
  S.events.forEach(e=>{
    if(e.role==='host'){ const c=ledgerStats(e).total; if(c>0){received+=c;recvCount++;} }
    else if(e.myGift>0){ given+=e.myGift; gaveCount++; const r=e.myRelation||'기타'; byRel[r]=(byRel[r]||0)+e.myGift; }
  });
  (S.people||[]).forEach(p=>(p.items||[]).forEach(it=>{ // 사람 탭 수기 이력도 합산 (행사 연동분은 위에서 이미 집계)

    if(it.dir==='gave'){ given+=it.amount; gaveCount++; const r=p.relation||'기타'; byRel[r]=(byRel[r]||0)+it.amount; }
    else { received+=it.amount; recvCount++; }
  }));
  return {given,gaveCount,received,recvCount,net:received-given,byRel}; }

  (S.people||[]).forEach(p=>{ if(p.demo||p.tut) return; (p.items||[]).forEach(it=>{ if(it.amount>0)
    arr.push({dir:it.dir,amount:it.amount,label:p.name,sub:(it.label||'경조사')+' · 직접 기록',date:it.date||''}); }); });

/* ---- 백업 파일 (기기 이전의 공식 경로) ---- */
function backupPayload(){ // 데모/튜토리얼 주입분은 백업에 싣지 않음 (다른 기기 복원 오염 방지)
  const ev=S.events.filter(e=>!e.demo&&!e.tut), pp=S.people.filter(p=>!p.demo&&!p.tut);
  return { app:'ieum', v:SCHEMA_VERSION, exportedAt:new Date().toISOString(),
  counts:{events:ev.length, people:pp.length, items:pp.reduce((s,p)=>s+((p.items||[]).length),0)},
  data:{ events:ev, people:pp, settings:S.settings, theme:S.ui.theme||'auto' } }; }
function backupDone(){ if(S.meta){ S.meta.lastBackupAt=Date.now(); S.meta.dirty=0; } save(); render(); }
function exportData(){
  try{
    const json=JSON.stringify(backupPayload(),null,1);
    // .json.txt(text/plain): Chrome Android의 공유 확장자 허용목록에 .json이 없어 쓰는 실전 관례
    const name='ieum-backup-'+todayStr()+'.json.txt';
    const blob=new Blob([json],{type:'text/plain;charset=utf-8'});
    const file=new File([blob],name,{type:'text/plain'});
    const dlFallback=()=>{ // iOS 설치형·인앱 웹뷰에선 a[download]가 무동작 → 정직하게 클립보드 경로 제공
      if(noDownload()){ copy(json); backupDone(); toast(isInApp()?'백업을 클립보드에 복사했어요 — 카톡 "나에게 보내기"나 메모에 붙여넣어 보관하세요':'백업을 클립보드에 복사했어요 — 메모/파일 앱에 붙여넣어 보관'); return; }
      dlBlob(blob,name); backupDone(); toast('백업 파일을 저장했어요 — 안전한 곳에 보관하세요'); };
    if(navigator.canShare && navigator.canShare({files:[file]})){
      navigator.share({files:[file], title:'이음 백업', text:'이음 데이터 백업 파일 — 새 기기에서 이음 열고 [복원]으로 가져오세요'})
        .then(()=>{ backupDone(); toast('공유했어요 — 카톡 나에게/드라이브에 보관하세요'); })
        .catch(err=>{ if(err&&err.name==='AbortError'){ toast('백업을 취소했어요'); return; } // 공유시트 닫음=오류 아님
          dlFallback(); });
      return;

function acceptPass(){
  if(_payPick){ if(!S.meta.passStats)S.meta.passStats={shown:0,accepted:0,declined:0,used:{},method:{}};
    if(!S.meta.passStats.method)S.meta.passStats.method={};

    const m=_payPick||'card'; save(); _passCont=null; _payPick=null; hidePassSheet();

function _flower(cx,cy,r,fill,core,rot,op){ // 5잎 레이어드 플라워 — 수채 느낌(반투명 겹)

const jsq=s=>(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;'); // onclick 속성은 엔티티 디코드 후 JS 파싱 → &quot; 안전
function unifiedPeople(){ const map={};
  const push=(name,relation,item)=>{ const k=(name||'').trim(); if(!k)return;
    if(!map[k])map[k]={name:k,relation:relation||'',items:[]}; if(relation&&!map[k].relation)map[k].relation=relation; map[k].items.push(item); };
  (S.people||[]).forEach(p=>{ const k=(p.name||'').trim(); if(k&&!map[k]) map[k]={name:k,relation:p.relation||'',items:[]}; // 이력 0건도 목록·상세에 노출
    (p.items||[]).forEach(it=>push(p.name,p.relation,{dir:it.dir,amount:it.amount,label:it.label,date:it.date,src:'manual',auto:false,pid:p.id,iid:it.id})); });
  S.events.filter(e=>e.role==='host').forEach(e=>{ (e.guests||[]).forEach(g=>{ const p=g.pay||{}; if(p.amount>0) push(g.name,g.relation,{dir:'received',amount:p.amount,label:evNamePlain(e)+' '+cfg(e).label,date:e.date,src:p.source==='app'?'app':(p.method==='cash'?'cash':'manual'),auto:true}); }); });
  S.events.filter(e=>e.role!=='host'&&e.myGift>0).forEach(e=>{ push(evNamePlain(e), e.myRelation, {dir:'gave',amount:e.myGift,label:cfg(e).label+' 참석',date:e.date,src:'app',auto:true}); });
  return Object.values(map).sort((a,b)=>{ const la=a.items.reduce((m,i)=>(i.date||'')>m?i.date:m,''), lb=b.items.reduce((m,i)=>(i.date||'')>m?i.date:m,''); return lb.localeCompare(la); }); }
function pStats2(p){ let gave=0,recv=0; p.items.forEach(it=>{ if(it.dir==='gave')gave+=it.amount; else recv+=it.amount; }); return {gave,recv,net:gave-recv}; }
function balHint(net){ if(net>0) return `<span class="bal pos">더 보냄</span>`;
  if(net<0) return `<span class="bal neg">더 받음</span>`; return `<span class="bal even">균형</span>`; }

/* ======================= 품앗이 상호 알림: 주고받은 기록이 있는 분의 경조사를 놓치지 않게 =======================
   서버 없이 가능한 방식: 경조사의 주인공 이름을 내 '주고받은 사람' 기록과 매칭.
   ①상세 화면 품앗이 카드(받은 만큼 보답 원터치) ②추가 직후 토스트 ③임박 알림에 보답 문구. */
function reciOn(){ return !(S.settings&&S.settings.recipro===false); } // 기본 켜짐 — 설정에서 끌 수 있음
function toggleRecipro(){ S.settings=S.settings||{}; S.settings.recipro=!reciOn(); save(); render();
  toast(reciOn()?'품앗이 알림을 켰어요 — 주고받은 분의 경조사를 챙겨드릴게요':'품앗이 알림을 껐어요'); }
function reciFor(ev){ if(!reciOn()||!ev||ev.role==='host') return null;
  const names=[evNamePlain(ev),ev.partyA,ev.partyB].map(s=>(s||'').trim()).filter(s=>s.length>=2);
  if(!names.length) return null;
  try{ const ppl=unifiedPeople();
    for(const nm of names){ const p=ppl.find(x=>x.name===nm); if(!p) continue;
      // 이 행사에서 내가 보낸 기록은 '과거'가 아님 — 자동(myGift 파생)이든 수기든 같은 날짜의 gave는 이 행사 것으로 간주해 제외
      const items=p.items.filter(it=>!(it.dir==='gave'&&it.date===ev.date));
      if(!items.length) continue;
      let gave=0,recv=0,recvMax=0;
      items.forEach(it=>{ const a=it.amount||0; if(it.dir==='gave')gave+=a; else{ recv+=a; if(a>recvMax)recvMax=a; } });
      if(!gave&&!recv) continue;
      return {name:p.name,gave,recv,recvMax,count:items.length}; } }catch(e){}
  return null; }
function reciCard(ev){ const r=reciFor(ev); if(!r) return '';
  const mem=ev.type==='memorial';
  return `<div class="card" style="border-color:var(--gold);background:var(--tint2)">
    <div class="secthead"><div class="t">🌱 품앗이 — 주고받은 기록이 있는 분이에요</div>
      <button class="minibtn" onclick="openPerson('${jsq(r.name)}')">내역</button></div>
    <p class="sub" style="margin:6px 0 0"><b>${esc(r.name)}</b>님과 ${r.count}건 — 받은 ${won(r.recv)} · 보낸 ${won(r.gave)} ${balHint(r.gave-r.recv)}</p>
    ${r.recvMax>0?`<button class="btn btn-sage btn-sm" style="margin-top:10px" onclick="setAmt(${r.recvMax});toast('받은 만큼 채워뒀어요 — 아래에서 보내세요')">${mem?'🕊️ 받은 마음 돌려드리기':'💞 받은 만큼 보답하기'} · ${won(r.recvMax)}</button>`:''}
    <p class="lblnote" style="margin-top:7px">${mem?'슬픔의 곁을 지켜준 마음, 잊지 않고 돌려드리세요.':'한 번 받은 마음, 잊지 않고 이어드릴게요.'}</p>

function reciToastFor(ev){ try{ const r=reciFor(ev); if(!r) return; const mem=ev.type==='memorial';
  setTimeout(()=>toast(`🌱 ${r.name}님과 주고받은 기록이 있어요${r.recvMax>0?(mem?` — 받은 ${won(r.recvMax)}, 마음을 돌려드릴 차례예요`:` — 받은 ${won(r.recvMax)}, 보답 잊지 마세요`):' — 상세에서 확인하세요'}`),700); }catch(e){} }

function groupState(){ if(!S.ui.group) S.ui.group={mode:'total', total:300000, n:5, per:50000}; return S.ui.group; }
function openGroup(){ groupState(); S.ui.guestView='group'; save(); render(); window.scrollTo(0,0); }
function groupSet(k,v){ const g=groupState(); if(k==='mode'){g.mode=v;save();render();return;} g[k]=v===''?0:(Number(v)||0); save(); recalcGroup(); }
function groupCalc(){ const g=groupState(); const n=Math.max(1,+g.n||1);
  if(g.mode==='total'){ const per=Math.round((+g.total||0)/n/1000)*1000; return {n, per, total:+g.total||0}; }
  const per=+g.per||0; return {n, per, total:per*n}; }
function recalcGroup(){ const r=groupCalc(); const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  set('g-per',won(r.per)); set('g-total',won(r.total)); set('g-n',r.n+'명'); }

  return `<button class="backbtn" onclick="setGuestTab('more')">‹ 더보기</button>

  <div class="card">
    <div class="seg2"><button class="${g.mode==='total'?'on':''}" onclick="groupSet('mode','total')">총액 → 1인당</button><button class="${g.mode==='per'?'on':''}" onclick="groupSet('mode','per')">1인당 → 총액</button></div>
    <div class="row" style="margin-top:11px">
      ${g.mode==='total'?`<div><label>총 축의금</label><input type="number" inputmode="numeric" value="${g.total}" oninput="groupSet('total',this.value)"></div>`:`<div><label>1인당</label><input type="number" inputmode="numeric" value="${g.per}" oninput="groupSet('per',this.value)"></div>`}

function upcomingSoon(){ const t=new Date(); t.setHours(0,0,0,0);
  return S.events.filter(e=>{ if(!e.date)return false; const d=new Date(e.date+'T00:00'); const days=Math.round((d-t)/86400000); return days>=0&&days<=7; })
    .sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time)); }
function reminderBanner(){ const soon=upcomingSoon(); if(!soon.length) return '';
  const ev=soon[0]; const c=cfg(ev);
  return `<div class="card remind">
    <div class="rm-top"><span class="rm-h">🔔 곧 다가와요</span>
      <button class="rm-noti ${S.ui.noti?'on':''}" onclick="toggleNoti()">${S.ui.noti?'✓ 알림 켜짐':'알림 받기'}</button></div>
    <div class="rm-ev" onclick="openEvent('${ev.id}')">
      <span class="rm-ic">${c.icon}</span>
      <div class="rm-info"><div class="rm-nm">${esc(evNamePlain(ev))} <span class="rm-tag">${c.label}</span></div>

      <span class="rm-dd">${dday(ev)}</span></div>

  </div>`; }
function toggleNoti(){ if(!('Notification' in window)){ toast('이 브라우저는 알림을 지원하지 않아요'); return; }
  if(S.ui.noti){ S.ui.noti=false; save(); render(); toast('알림을 껐어요'); return; }
  Promise.resolve(Notification.requestPermission()).then(p=>{ if(p==='granted'){ S.ui.noti=true; save(); render();
      try{ new Notification('이음 알림이 켜졌어요', {body:'다가오는 경조사를 미리 알려드릴게요.', icon:'icon-192.png'}); }catch(e){}
      fireDueNotis();
    } else { toast('알림 권한이 거부되었어요'); } }).catch(()=>toast('알림을 켤 수 없어요')); }
function fireDueNotis(){ if(!S.ui.noti||!('Notification' in window)||Notification.permission!=='granted')return;
  const t=new Date(); t.setHours(0,0,0,0);
  upcomingSoon().forEach(ev=>{ const d=new Date(ev.date+'T00:00'); const days=Math.round((d-t)/86400000);
    if(days<=1){ try{ const r=reciFor(ev); // 품앗이: 주고받은 분의 행사면 보답 리마인드를 함께
      const reciTxt=r&&r.recvMax>0?(ev.type==='memorial'?` — 🌱 받은 ${won(r.recvMax)}, 마음을 돌려드릴 차례`:` — 🌱 받은 ${won(r.recvMax)}, 보답 잊지 마세요`):'';
      new Notification(`${evNamePlain(ev)} ${cfg(ev).label} ${dday(ev)}`, {body:`${dateText(ev)} · ${ev.venue||''}`+reciTxt, icon:'icon-192.png', tag:'ieum-'+ev.id}); }catch(e){} } }); }

function monthlyChart(){ // 최근 6개월 보냄/받음 막대 — 자랑용 공유 없이 나를 위한 요약
  const now=new Date(); const months=[];
  for(let i=5;i>=0;i--){ const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    months.push({ym:d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'), label:(d.getMonth()+1)+'월', sent:0, recv:0}); }
  const idx={}; months.forEach(m=>idx[m.ym]=m);
  S.events.forEach(e=>{ if(e.demo||e.tut) return; const m=idx[(e.date||'').slice(0,7)]; if(!m) return;
    if(e.role==='host'){ m.recv+=ledgerStats(e).total; } else if(e.myGift>0){ m.sent+=e.myGift; } });
  (S.people||[]).forEach(p=>{ if(p.demo||p.tut) return; (p.items||[]).forEach(it=>{ const m=idx[(it.date||'').slice(0,7)];
    if(!m||!(it.amount>0)) return; if(it.dir==='gave') m.sent+=it.amount; else m.recv+=it.amount; }); });
  if(!months.some(m=>m.sent||m.recv)) return '';
  const max=Math.max(1,...months.map(m=>Math.max(m.sent,m.recv)));
  return `<div class="card"><div class="secthead"><div class="t">월별 경조사비 · 최근 6개월</div>
      <div class="c"><span style="color:var(--primary)">■</span> 보냄 <span style="color:var(--sage)">■</span> 받음</div></div>
    <div style="display:flex;gap:6px;align-items:flex-end;height:112px;margin-top:12px">
      ${months.map(m=>`<div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:3px;height:100%">
        <div style="display:flex;gap:2px;align-items:flex-end;justify-content:center;width:100%;height:90px">
          <div style="width:38%;max-width:14px;height:${Math.round(m.sent/max*100)}%;min-height:${m.sent?3:0}px;background:var(--primary);border-radius:3px 3px 0 0"></div>
          <div style="width:38%;max-width:14px;height:${Math.round(m.recv/max*100)}%;min-height:${m.recv?3:0}px;background:var(--sage);border-radius:3px 3px 0 0"></div>
        </div>
        <div style="font-size:10.5px;color:var(--muted);font-variant-numeric:tabular-nums">${m.label}</div></div>`).join('')}
    </div></div>`; }

function recoState(){ if(!S.ui.reco) S.ui.reco={kind:'wedding', rel:2, attending:true, venue:'normal', close:false, ctxEventId:null}; return S.ui.reco; }
function recommend(){ const r=recoState(); const row=(RECO_TABLE[r.kind]||[])[r.rel]; if(!row) return {amount:50000};
  let amt;
  if(r.kind==='memorial'){ amt = r.close ? (row.close||row.base) : row.base; }

function openReco(ctxId){ recoState(); const ev=ctxId?S.events.find(e=>e.id===ctxId):null;

  else S.ui.reco.ctxEventId=null;

    if(ev){ if(!ev.myRelation){ own(ev); ev.myRelation=(RECO_TABLE[r.kind][r.rel].label.split(/[·(]/)[0]); }

/* ---- 청첩장 URL 자동 분석: 서버가 없어 공개 CORS 프록시를 경유해 HTML을 읽음 ---- */
const INVITE_PROXIES=[
  u=>'https://corsproxy.io/?url='+encodeURIComponent(u),
  u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u),
  u=>'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(u)
];
async function fetchInviteHtml(url){
  for(const mk of INVITE_PROXIES){
    try{ const ctl=new AbortController(); const tm=setTimeout(()=>ctl.abort(),9000);
      const r=await fetch(mk(url),{signal:ctl.signal}); clearTimeout(tm);
      if(!r.ok) continue; const t=await r.text();
      if(t && t.length>300) return t;
    }catch(e){}
  }
  return null;
}
function parseInviteHtml(html, url){
  const doc=new DOMParser().parseFromString(html,'text/html');
  const meta=n=>{const m=doc.querySelector(`meta[property="${n}"],meta[name="${n}"]`);return (m&&m.getAttribute('content'))||'';};
  const ogT=meta('og:title'), ogD=meta('og:description'), twT=meta('twitter:title'), twD=meta('twitter:description');
  let ogImg=meta('og:image'); try{ if(ogImg) ogImg=new URL(ogImg, url).href; }catch(e){ ogImg=''; }
  const title=(doc.querySelector('title')||{}).textContent||'';
  doc.querySelectorAll('script,style,noscript,svg').forEach(e=>e.remove());
  const body=((doc.body&&doc.body.textContent)||'').replace(/[ \t ]+/g,' ').slice(0,30000);
  const all=[ogT,ogD,twT,twD,title,body].filter(Boolean).join('\n');
  const p=parseInvite(all); p.url=url; if(ogImg&&/^https:/.test(ogImg)) p.img=ogImg;
  // 계좌 검출: 은행명 + 계좌번호 패턴 (주변 문맥으로 예금주·신랑/신부측 추정)
  const acctRe=/(카카오뱅크|토스뱅크|케이뱅크|국민|신한|우리|하나|농협|기업|SC제일|새마을금고|우체국|수협|신협|씨티|부산|대구|광주|경남|전북|제주)\s*(?:은행)?\s*[:：]?\s*(\d[\d\- ]{7,20}\d)/g;
  p.accounts=[]; const seen=new Set(); let m;
  while((m=acctRe.exec(all)) && p.accounts.length<4){
    const num=m[2].replace(/\s+/g,''); const digits=num.replace(/-/g,'');
    if(digits.length<10||digits.length>14||seen.has(digits)) continue; seen.add(digits);
    // 문맥: back=앞(측 라벨은 보통 앞에), fwd=뒤(예금주는 보통 번호 뒤에) — 이웃 계좌 줄 오염 방지
    const back=all.slice(Math.max(0,m.index-40), m.index);
    const fwd=all.slice(m.index, m.index+m[0].length+60);
    let holder=(fwd.match(/예금주\s*[:：]?\s*([가-힣]{2,4})/)||[])[1]||'';
    if(!holder){ holder=(back.match(/([가-힣]{2,4})\s*$/)||[])[1]||''; }
    if(/신랑|신부|어머니|아버지|혼주|계좌|은행|전하실/.test(holder)) holder='';
    const label=/신부|장모|장인/.test(back)?'신부측':/신랑/.test(back)?'신랑측':(p.accounts.length===0?'신랑측':'신부측');
    p.accounts.push({label, bank:m[1], number:num, holder});
  }
  return p;
}

function parseInvite(text){
  const res={names:'',date:'',time:'',venue:'',url:''};
  const um=text.match(/https?:\/\/[^\s]+/); if(um) res.url=um[0];
  let y,mo,d, m=text.match(/(20\d{2})\s*[년.\-\/]\s*(\d{1,2})\s*[월.\-\/]\s*(\d{1,2})/);
  if(m){ y=+m[1]; mo=+m[2]; d=+m[3]; }
  else if(m=text.match(/(\d{1,2})\s*월\s*(\d{1,2})\s*일/)){ mo=+m[1]; d=+m[2]; }
  else if(m=text.match(/\b(\d{1,2})[\/.](\d{1,2})\b/)){ mo=+m[1]; d=+m[2]; }
  if(mo&&d&&mo>=1&&mo<=12&&d>=1&&d<=31){ if(!y){ const now=new Date(); y=now.getFullYear();
      if(new Date(y,mo-1,d) < new Date(now.toDateString())) y++; }
    res.date=y+'-'+String(mo).padStart(2,'0')+'-'+String(d).padStart(2,'0'); }
  let hh,mm=0,pm=false,am=false, tm=text.match(/(오전|오후)?\s*(\d{1,2})\s*시\s*(\d{1,2})?\s*분?/);
  if(tm){ if(tm[1]==='오후')pm=true; if(tm[1]==='오전')am=true; hh=+tm[2]; if(tm[3])mm=+tm[3]; }
  else if(tm=text.match(/\b(\d{1,2}):(\d{2})\b/)){ hh=+tm[1]; mm=+tm[2]; }
  if(hh!=null){ if(pm&&hh<12)hh+=12; if(am&&hh===12)hh=0; if(hh>=0&&hh<=23) res.time=String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0'); }
  let nm=text.match(/([가-힣]{2,4})\s*[♥❤♡💕&,·]\s*([가-힣]{2,4})/);
  if(!nm) nm=text.match(/신랑\s*[:：]?\s*([가-힣]{2,4})[\s\S]{0,24}신부\s*[:：]?\s*([가-힣]{2,4})/);
  const badNm=/^(부고|삼가|결혼|화혼|혼인|안내|예식|모바일|청첩장|초대장|초대|감사|마음|오전|오후|본식|피로연|장소|일시|축하)$/;
  if(nm && (badNm.test(nm[1])||badNm.test(nm[2]))) nm=null;
  if(nm) res.names=nm[1]+' ♥ '+nm[2];
  const vk=/(웨딩|컨벤션|호텔|예식장|홀|가든|하우스|채플|파티움|아트홀|타워|클럽|더라움|루체|아펠가모|메리어트|그랜드|워커힐|라마다|롯데|신라|반얀트리|스퀘어|컨벤션센터)/;
  for(const ln of text.split(/[\n\r]+/)){ if(vk.test(ln)){ res.venue=ln.trim().slice(0,40); break; } }
  return res;
}
