<style>

  /* iOS мӮ¬нҢҢлҰ¬: 16px лҜёл§Ң мһ…л Ҙ нҸ¬м»ӨмҠӨ мӢң к°•м ң нҷ•лҢҖ(мһҗлҸҷ мӨҢ) вҶ’ iOSм—җм„ңл§Ң 16px (н•Җм№ҳмӨҢ м •мұ…мқҖ мң м§Җ) */

function migrate(o){ // м–ҙл–Ө кіјкұ° мғҒнғңк°Җ мҷҖлҸ„ м•Ҳм „н•ҳкІҢ нҳ„мһ¬ мҠӨнӮӨл§ҲлЎң (к№ҠмқҖ м •к·ңнҷ” нҸ¬н•Ё)
  const d=seed();
  if(!o||typeof o!=='object') return d;
  o._v=SCHEMA_VERSION;
  if(!Array.isArray(o.events)) o.events=[]; o.events=o.events.filter(e=>e&&typeof e==='object');
  if(!Array.isArray(o.people)) o.people=[]; o.people=o.people.filter(p=>p&&typeof p==='object');
  const legacyNoMeta = !(o.meta && typeof o.meta==='object'); // metaк°Җ м—ҶлҚҳ v1.0 мғҒнғңл§Ң мҶҢкёү нғңк№… лҢҖмғҒ
  o.settings={...d.settings, ...(o.settings||{})};
  o.meta={...d.meta, ...(o.meta||{})};
  o.ui={...d.ui, ...(o.ui||{})};
  o.ui.guestSession={...d.ui.guestSession, ...((o.ui&&o.ui.guestSession)||{})};
  delete o.ui.pendingRestore; // ліөмӣҗ лҢҖкё°ліёмқҖ л©”лӘЁлҰ¬ м „мҡ© (LS мҡ©лҹү 2л°°В·мһ”мЎҙ л°©м§Җ)
  // лҚ°лӘЁ нғңк·ё мҶҢкёүмқҖ v1.0(л©”нғҖ м—ҶмқҢ) лҚ°мқҙн„°м—җ 'лӢЁ н•ң лІҲл§Ң' вҖ” мқҙнӣ„ нҺём§‘лҗң лҚ°мқҙн„°м—җ мһ¬мҠӨнғ¬н”„ кёҲм§Җ
  if(legacyNoMeta){
    o.events.forEach(e=>{ if(['e1','e2','e3'].includes(e.id)) e.demo=true; });
    o.people.forEach(p=>{ if(['p1','p2','p3'].includes(p.id)) p.demo=true; });
  }
  // мқҙлІӨнҠё/н•ҳк°қ/кі„мўҢ к№ҠмқҖ м •к·ңнҷ” (ліөмӣҗ нҢҢмқј л“ұ м–ҙл–Ө нҳ•нғңк°Җ мҷҖлҸ„ л·° нҒ¬лһҳмӢң л°©м§Җ)
  const seen=new Set();
  o.events.forEach(e=>{

    e.accounts.forEach(a=>{ ['label','bank','number','holder'].forEach(k=>{ if(typeof a[k]!=='string') a[k]=a[k]==null?'':String(a[k]); }); });
    if(!Array.isArray(e.guests)) e.guests=[];
    e.guests=e.guests.filter(g=>g&&typeof g==='object');
    e.guests.forEach(g=>{ if(!g.id)g.id=uid('g'); if(typeof g.name!=='string')g.name=String(g.name||'');
      g.rsvp={status:null,count:1,meal:true, ...(g.rsvp&&typeof g.rsvp==='object'?g.rsvp:{})};
      g.pay={amount:null,source:null,method:null, ...(g.pay&&typeof g.pay==='object'?g.pay:{})}; });
  });
  const pseen=new Set();
  o.people.forEach(p=>{ if(!p.id||pseen.has(p.id))p.id=uid('p'); pseen.add(p.id);
    if(!Array.isArray(p.items))p.items=[]; p.items=p.items.filter(i=>i&&typeof i==='object'); });
  return o;
}
/* мӮ¬мҡ©мһҗк°Җ мҶҗлҢ„ мҲңк°„ к·ё лҚ°мқҙн„°лҠ” лҚ”мқҙмғҒ 'мғҳн”Ң'мқҙ м•„лӢҳ вҶ’ мһҗлҸҷмӮӯм ңлЎңл¶Җн„° ліҙнҳё(мҠ№кІ©).

function own(ev){ if(!ev) return ev;
  if(typeof TUT!=='undefined' && TUT.on && (ev.demo||ev.tut)) return ev;
  if(ev.demo) delete ev.demo; if(ev.tut) delete ev.tut; if(ev.draft) delete ev.draft; return ev; }

/* ---- IndexedDB лҜёлҹ¬: localStorageк°Җ л№„мӣҢм ёлҸ„(лёҢлқјмҡ°м Җ м •лҰ¬ л“ұ) мһҗлҸҷ ліөкө¬ ---- */
function idbOpen(){ return new Promise((res,rej)=>{ try{ const q=indexedDB.open('ieum-db',1);
  q.onupgradeneeded=()=>{ try{q.result.createObjectStore('kv');}catch(e){} };
  q.onsuccess=()=>res(q.result); q.onerror=()=>rej(q.error); }catch(e){rej(e);} }); }
function idbSet(k,v){ return idbOpen().then(db=>new Promise(res=>{ const tx=db.transaction('kv','readwrite');
  tx.objectStore('kv').put(v,k); tx.oncomplete=()=>{db.close();res(true);}; tx.onerror=()=>{db.close();res(false);} })).catch(()=>false); }
function idbGet(k){ return idbOpen().then(db=>new Promise(res=>{ const tx=db.transaction('kv','readonly');
  const rq=tx.objectStore('kv').get(k); rq.onsuccess=()=>{db.close();res(rq.result);}; rq.onerror=()=>{db.close();res(undefined);} })).catch(()=>undefined); }

  if(S.events.length||S.people.length) { dailySnapshot(); return; }
  idbGet('state').then(rawStr=>{ try{ const raw=rawStr&&JSON.parse(rawStr);
    if(raw && ((raw.events&&raw.events.length)||(raw.people&&raw.people.length))){
      // ліөкө¬ лҸ„м°©мқҙ мһҗлҸҷ нҠңнҶ лҰ¬м–јкіј кІҪн•©н•ҳл©ҙ: нҲ¬м–ҙлҘј м •лҰ¬н•ҳкі  мӢӨлҚ°мқҙн„°лҘј мұ„нғқ(лҚ°лӘЁ мЈјмһ…л¶„мқҖ abortк°Җ м ңкұ°)

function lzwEnc(str){ const s=unescape(encodeURIComponent(str)); const dict=new Map(); let size=256;

    if(dict.has(wc)) w=wc;
    else { out.push(dict.get(w)); if(size<65536) dict.set(wc,size++); w=c; } }
  if(w) out.push(dict.get(w));

  return btoa(bytes).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }

  const dict=new Map(); let size=256;
  for(let i=0;i<256;i++) dict.set(i,String.fromCharCode(i));
  let w=dict.get(codes[0]), res=w;
  for(let i=1;i<codes.length;i++){ const k=codes[i]; let entry;
    if(dict.has(k)) entry=dict.get(k); else if(k===size) entry=w+w[0]; else throw new Error('lzw');

/* лҰҙл Ҳмқҙ: мӮ¬м„ңн•Ё мЈјмҶҢлҠ” н–үмӮ¬ нӮӨмқҳ н•ҙмӢң(м„ңлІ„м—җ мқҙлҰ„В·н–үмӮ¬ мӣҗл¬ё л№„л…ём¶ң), мқ‘лӢөмқҖ нҳёмҠӨнҠё мҲҳмӢ  мӢң м„ңлІ„м—җм„ң мӮӯм ң */
async function relayKey(ev){ const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode('ieum1|'+evKey(ev)));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,32); }
async function relaySend(ev,code,nm,me,opt){ const mem=ev.type==='memorial';
  toast('мқҙмқҢмңјлЎң м „лӢ¬н•ҳлҠ” мӨ‘вҖҰ');
  try{ const k=await relayKey(ev);
    const ctl=new AbortController(); const tm=setTimeout(()=>ctl.abort(),8000);
    const r=await fetch(RELAY.url+'/reply',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({k,code}),signal:ctl.signal}); clearTimeout(tm);
    if(!r.ok) throw 0;
    toast(`м „лӢ¬н–Ҳм–ҙмҡ” вҖ” ${mem?'мғҒмЈј':'нҳёмҠӨнҠё'}к°Җ мқҙмқҢмқ„ м—ҙл©ҙ мһҘл¶Җм—җ мһҗлҸҷ л°ҳмҳҒлҸјмҡ” вң“`);
  }catch(e){ toast('м§Ғм ‘ м „лӢ¬мқҙ м•Ҳ лҸј кіөмң лЎң м „нҷҳн• кІҢмҡ”'); setTimeout(()=>shareReply(ev,code,nm,me,opt),600); } }
function mergeGuestReply(ev,o){ // #g= л”Ҙл§ҒнҒ¬В·лҰҙл Ҳмқҙ кіөмҡ© лі‘н•© (к°ҷмқҖ к°’ мһ¬м Ғмҡ©мқҖ л¬ҙн•ҙ=л©ұл“ұ)
  if(!o||!o.n) return false;
  if(!(typeof TUT!=='undefined'&&TUT.on)) own(ev);
  let g=ev.guests.find(x=>x.name===o.n);
  if(!g){ g=mkGuest(o.n, o.rel||'м§Җмқё', 0); g.unregistered=true; ev.guests.push(g); }
  if(o.s){ g.rsvp.status=o.s; if(o.c) g.rsvp.count=Math.max(1,Number(o.c)||1); }
  if(o.a!=null){ g.pay={amount:Number(o.a)||0, source:o.m==='cash'?'manual':'app', method:o.m||'toss'}; }
  return true; }
let _relayPullAt=0;
async function relayPull(){ if(!RELAY.url) return; // нҳёмҠӨнҠё: лӮҙ н–үмӮ¬ мӮ¬м„ңн•Ё нҷ•мқё (60мҙҲ мҠӨлЎңнӢҖ)
  if(Date.now()-_relayPullAt<60000) return; _relayPullAt=Date.now();
  for(const ev of S.events.filter(e=>e.role==='host'&&evHasContent(e))){
    try{ const k=await relayKey(ev);
      const r=await fetch(RELAY.url+'/replies?k='+k); if(!r.ok) continue;
      const arr=await r.json(); if(!Array.isArray(arr)||!arr.length) continue;
      let n=0;
      arr.forEach(code=>{ try{ const o=JSON.parse(b64urlDec(code));
        if(o.k===evKey(ev) && mergeGuestReply(ev,o)) n++; }catch(e){} });
      if(n){ save(); render(); setTimeout(()=>toast(`н•ҳк°қ мқ‘лӢө ${n}кұҙмқҙ мһҘл¶Җм—җ мһҗлҸҷ л°ҳмҳҒлҗҗм–ҙмҡ” вң“`),300); }

/* ======================= мәҳлҰ°лҚ” ======================= */
function icsStamp(d,t){const dt=new Date(d+'T'+(t||'00:00')+':00+09:00');return dt.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');}
function vevent(ev,hours){
  const start=icsStamp(ev.date,ev.time);
  const e=new Date(ev.date+'T'+(ev.time||'00:00')+':00+09:00');e.setHours(e.getHours()+(hours||2));
  const end=e.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
  return ['BEGIN:VEVENT','UID:'+uid('ics')+'@ieum','DTSTAMP:'+start,'DTSTART:'+start,'DTEND:'+end,
    'SUMMARY:'+evNamePlain(ev)+' '+cfg(ev).money.replace('кёҲ',''),'LOCATION:'+(ev.venue+' '+ev.address),
    'DESCRIPTION:'+(ev.message||'').replace(/\n/g,' '),
    'BEGIN:VALARM','TRIGGER:-P1D','ACTION:DISPLAY','DESCRIPTION:'+evNamePlain(ev),'END:VALARM','END:VEVENT'].join('\r\n');
}
/* нҢҢмқј лӮҙліҙлӮҙкё° кіөмҡ©: кіөмң мӢңнҠё мҡ°м„ (iOS м„Өм№ҳнҳ•м—җм„ң a[download]лҠ” л¬ҙлҸҷмһ‘) вҶ’ лӢӨмҡҙлЎңл“ң нҸҙл°ұ. м„ұкіөн–Ҳмқ„ л•Ңл§Ң м„ұкіө нҶ мҠӨнҠё */
function exportFile(blob, fname, shareText, okMsg){
  const file=new File([blob],fname,{type:blob.type||'application/octet-stream'});
  const dl=()=>{ if(noDownload()){ toast(isInApp()?'мқҙ лёҢлқјмҡ°м Җм—җм„  нҢҢмқј м ҖмһҘмқҙ л§үнҳҖ мһҲм–ҙмҡ” вҖ” SafariлЎң м—ҙм–ҙ м ҖмһҘн•ҙ мЈјм„ёмҡ”':'мқҙ нҷ”л©ҙм—җм„  нҢҢмқј м ҖмһҘмқҙ м ңн•ңлҸјмҡ” вҖ” мӮ¬нҢҢлҰ¬м—җм„ң м—ҙм–ҙ м ҖмһҘн•ҙ мЈјм„ёмҡ”'); return; }
    dlBlob(blob,fname); toast(okMsg); };
  if(navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file], text:shareText||fname}).then(()=>toast(okMsg))
      .catch(err=>{ if(err&&err.name==='AbortError'){ return; } dl(); });
    return;
  }
  dl();
}

  exportFile(new Blob([ics],{type:'text/calendar;charset=utf-8'}),'ieum-event.ics',evNamePlain(ev)+' мқјм •','.ics нҢҢмқјмқ„ ліҙлғҲм–ҙмҡ” вҖ” нҢҢмқјмқ„ м—ҙл©ҙ мәҳлҰ°лҚ”м—җ м¶”к°ҖлҸјмҡ”');

function googleCal(ev){
  const start=icsStamp(ev.date,ev.time);const e=new Date(ev.date+'T'+(ev.time||'00:00')+':00+09:00');e.setHours(e.getHours()+3);
  const end=e.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
  const u='https://calendar.google.com/calendar/render?action=TEMPLATE'
    +'&text='+encodeURIComponent(evNamePlain(ev)+' '+cfg(ev).money.replace('кёҲ',''))
    +'&dates='+start+'/'+end+'&location='+encodeURIComponent(ev.venue+' '+ev.address)
    +'&details='+encodeURIComponent((ev.message||'').replace(/\n/g,' '));
  openUrl(u);
}

      // мҠӨнӮҙ лҢҖмһ…мқҖ мӢӨнҢЁн•ҙлҸ„ throwн•ҳм§Җ м•ҠмқҢ вҶ’ 'мқҙнғҲ мқҙл Ҙ'мңјлЎң мӢӨнҢЁ к°җм§Җ.

function ensureHostEvent(){ // л№Ҳ мӢңмһ‘м—җм„ңлҸ„ нҳёмҠӨнҠё лӘЁл“ңк°Җ м•Ҳм „н•ҳлҸ„лЎқ (лҜёмһ…л Ҙ мҙҲм•ҲмқҖ draft вҖ” лӘ©лЎқ л№„л…ём¶ңВ·мқҙнғҲ мӢң м •лҰ¬)
  let ev=S.events.find(e=>e.id===S.ui.hostEventId) || S.events.find(e=>e.role==='host');
  if(!ev){ ev={ id:uid('e'), draft:true, role:'host', type:'wedding', partyA:'', partyB:'', subtitle:'м Җнқ¬ кІ°нҳјн•©лӢҲлӢӨ',
    date:'', time:'13:00', venue:'', address:'', message:'', externalUrl:'',

    S.events.push(ev); S.ui.hostEventId=ev.id; save(); }
  S.ui.hostEventId=ev.id; return ev; }
function pruneDraft(){ // м•„л¬ҙкІғлҸ„ мһ…л Ҙ м•Ҳ н•ң нҳёмҠӨнҠё мҙҲм•ҲмқҖ лӮҳк°Ҳ л•Ң мЎ°мҡ©нһҲ м ңкұ°
  const before=S.events.length;
  S.events=S.events.filter(e=>!(e.draft && e.role==='host' && !evHasContent(e)));
  if(S.events.length!==before){ if(!S.events.find(e=>e.id===S.ui.hostEventId)) S.ui.hostEventId=null; save(); } }
function tutAutoOk(){ // мІ« м„Өм№ҳ нҢҗм •: л№Ҳ мҙҲм•Ҳ(draft)мқҖ м ңмҷё, мһҗлҸҷліөкө¬лЎң лҚ°мқҙн„°к°Җ лҸ„м°©н–Ҳмңјл©ҙ м·ЁмҶҢ

function rowHost(ev,x){
  const r=x.rsvp,st=r.status,c=cfg(ev); const p=x.pay||{};
  const pill=st==='yes'?`<span class="pill pill-ok">${c.counts?`м°ём„қ ${r.count}лӘ…`:'мЎ°л¬ё мҳҲм •'}</span>`:st==='no'?`<span class="pill pill-no">${c.counts?'л¶Ҳм°ё':'мЎ°л¬ё м–ҙл ӨмӣҖ'}</span>`:`<span class="pill pill-wait">лҜёмқ‘лӢө</span>`;
  const src=p.amount!=null?(p.source==='app'?`<span class="pill pill-app">рҹ”ө мқҙмқҢ${p.method==='kakao'?'В·м№ҙм№ҙмҳӨ':p.method==='toss'?'В·нҶ мҠӨ':''}</span>`:`<span class="pill pill-cash">${p.method==='cash'?'рҹ’ө нҳ„кёҲ':'вңҸпёҸ м§Ғм ‘мһ…л Ҙ'}</span>`):'';
  const sideLabel=ev.accounts[x.side]?ev.accounts[x.side].label:'';
  return `<div class="grow">
    <div class="top">
      <div><div class="nm">${esc(x.name)} <span style="font-weight:400;color:var(--muted);font-size:11px">В· ${sideLabel} ${esc(x.relation)}</span></div>
        <div class="meta" style="margin-top:5px">${pill} <span id="src-${x.id}">${src}</span></div></div>
      ${x.unregistered?`<button class="minibtn" onclick="promote('${x.id}')">лӘ…лӢЁмңјлЎң</button>`:`<button class="minibtn" onclick="delGuest('${x.id}')" style="color:var(--danger)">мӮӯм ң</button>`}
    </div>
    <div class="amt">
      <input type="number" inputmode="numeric" placeholder="кёҲм•Ў (нҳ„кёҲВ·кі„мўҢ м§Ғм ‘мһ…л Ҙ)" value="${p.amount??''}" onchange="hostSetPay('${x.id}',this.value)">
      <button class="minibtn ${p.method==='cash'?'on':''}" id="cash-${x.id}" onclick="toggleCash('${x.id}')">нҳ„кёҲ</button>
    </div></div>`;

function evBodyHTML(){
  const all=S.events.filter(e=>!(e.draft&&!evHasContent(e)));
  const q=EVQ.trim();
  if(q){ const hit=all.filter(e=>((evNamePlain(e)||'')+(e.venue||'')+(e.myRelation||'')).includes(q))
      .sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    return `${hit.length?hit.map(e=>evcardHTML(e)).join(''):`<div class="empty">'${esc(q)}' кІҖмғү кІ°кіјк°Җ м—Ҷм–ҙмҡ”</div>`}

  const evs=all.sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  const now=new Date(new Date().toDateString());
  const up=evs.filter(e=>e.date&&new Date(e.date+'T'+(e.time||'00:00'))>=now);
  const past=evs.filter(e=>!e.date||new Date(e.date+'T'+(e.time||'00:00'))<now).reverse();
  const rest=up.slice(1);
  return `${up.length?homeHero(up[0]):''}
  ${rest.length?`<div class="secthead" style="margin:2px 2px 7px"><div class="t">лӢӨмқҢ мқјм •</div><div class="c">${rest.length}кұҙ</div></div>

  ${past.length?`<details class="fold" ${S.ui.pastOpen?'open':''} ontoggle="S.ui.pastOpen=this.open">

}

/* ---------- мқҙмқҢ лӢ¬л Ҙ ---------- */
function ymToday(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function ensureCalYM(){ if(!S.ui.calYM){ const ds=S.events.map(e=>e.date).filter(Boolean).sort(); const t=todayStr();
  const near=ds.find(d=>d>=t)||ds[0]; S.ui.calYM = near ? near.slice(0,7) : ymToday(); } }
function selDateLabel(ds){const d=new Date(ds+'T00:00');const w=['мқј','мӣ”','нҷ”','мҲҳ','лӘ©','кёҲ','нҶ '];return `${d.getMonth()+1}мӣ” ${d.getDate()}мқј (${w[d.getDay()]})`;}
function calNav(delta){ ensureCalYM(); let [y,m]=S.ui.calYM.split('-').map(Number);
  const idx=y*12+(m-1)+delta; y=Math.floor(idx/12); m=idx%12+1;
  S.ui.calYM=y+'-'+String(m).padStart(2,'0'); S.ui.calSelDate=null; save(); render(); }

function calpopGrid(y,m){ const first=new Date(y,m-1,1).getDay(); const days=new Date(y,m,0).getDate();

  return cells; }
function calpopNav(d){ let [y,m]=CALPOP_YM.split('-').map(Number); const i=y*12+(m-1)+d;

function closeCalPopup(){ const bg=document.getElementById('calpop'); if(!bg) return;

function ledgerStats(ev){let attend=0,heads=0,total=0,appSum=0,manualSum=0,paid=0;
  ev.guests.forEach(x=>{if(x.rsvp.status==='yes'){attend++;heads+=x.rsvp.count||1;}
    const p=x.pay||{}; if(p.amount>0){total+=p.amount;paid++; if(p.source==='app')appSum+=p.amount; else manualSum+=p.amount;}});
  return {attend,heads,total,appSum,manualSum,paid};}

function myStats(){ let given=0,gaveCount=0,received=0,recvCount=0; const byRel={};
  S.events.forEach(e=>{
    if(e.role==='host'){ const c=ledgerStats(e).total; if(c>0){received+=c;recvCount++;} }
    else if(e.myGift>0){ given+=e.myGift; gaveCount++; const r=e.myRelation||'кё°нғҖ'; byRel[r]=(byRel[r]||0)+e.myGift; }
  });
  (S.people||[]).forEach(p=>(p.items||[]).forEach(it=>{ // мӮ¬лһҢ нғӯ мҲҳкё° мқҙл ҘлҸ„ н•©мӮ° (н–үмӮ¬ м—°лҸҷл¶„мқҖ мң„м—җм„ң мқҙлҜё м§‘кі„)
    if(!(it.amount>0)) return;
    if(it.dir==='gave'){ given+=it.amount; gaveCount++; const r=p.relation||'кё°нғҖ'; byRel[r]=(byRel[r]||0)+it.amount; }
    else { received+=it.amount; recvCount++; }
  }));
  return {given,gaveCount,received,recvCount,net:received-given,byRel}; }

function txAll(){ const arr=[];
  S.events.forEach(e=>{ if(e.demo||e.tut) return;
    if(e.role==='host'){ (e.guests||[]).forEach(g=>{ const p=g.pay||{}; if(p.amount>0) arr.push({dir:'received',amount:p.amount,label:g.name,sub:evNamePlain(e)+' В· '+cfg(e).label,date:e.date||''}); }); }
    else if(e.myGift>0){ arr.push({dir:'gave',amount:e.myGift,label:evNamePlain(e),sub:cfg(e).label+(e.myRelation?' В· '+e.myRelation:''),date:e.date||''}); } });
  (S.people||[]).forEach(p=>{ if(p.demo||p.tut) return; (p.items||[]).forEach(it=>{ if(it.amount>0)
    arr.push({dir:it.dir,amount:it.amount,label:p.name,sub:(it.label||'кІҪмЎ°мӮ¬')+' В· м§Ғм ‘ кё°лЎқ',date:it.date||''}); }); });
  return arr.sort((a,b)=>(b.date||'').localeCompare(a.date||'')); }

function backupPayload(){ // лҚ°лӘЁ/нҠңнҶ лҰ¬м–ј мЈјмһ…л¶„мқҖ л°ұм—…м—җ мӢЈм§Җ м•ҠмқҢ (лӢӨлҘё кё°кё° ліөмӣҗ мҳӨм—ј л°©м§Җ)

      dlBlob(blob,name); backupDone(); toast('л°ұм—… нҢҢмқјмқ„ м ҖмһҘн–Ҳм–ҙмҡ” вҖ” м•Ҳм „н•ң кіім—җ ліҙкҙҖн•ҳм„ёмҡ”'); };

function sendCard(name,mark){ const ev=hostEvent(); const greeting=personGreeting(ev,name);
  const st=cardState(ev); const o=cardOpts(ev);
  // н”„лҰ¬лҜём—„ л””мһҗмқё/мӮ¬м§„мқҖ лҜёлҰ¬ліҙкё° мһҗмң , мӢӨм ң м „мҶЎмқҖ нҳёмҠӨнҠё нҢЁмҠӨ вҖ” кІ°м ң(л¬ҙлЈҢ к°ңл°© мӨ‘м—” мӣҗнғӯ) нӣ„ мһҗлҸҷ мһ¬к°ң
  if(!hasPass(ev) && (!isFreeCard(st.design,ev) || S.ui.cardPhoto)){
    passTrack('cardSend'); passPrompt(()=>sendCard(name,mark)); return; }
  const svg=cardSVG(st.design, greeting, hostSig(ev), S.ui.cardPhoto, {...o, noText:true}); // н…ҚмҠӨнҠёлҠ” мә”лІ„мҠӨм—җм„ң(мӣ№нҸ°нҠё мң м§Җ)
  const L=cardLayout(st.design, greeting, S.ui.cardPhoto, o);

  svgToPngBlob(svg,800,1000, blob=>{ if(!blob){ copy(greeting); toast('мқҙлҜём§Җ мғқм„ұ мӢӨнҢЁ вҖ” л¬ёкө¬лҘј ліөмӮ¬н–Ҳм–ҙмҡ”'); return; }
    const file=new File([blob],`к°җмӮ¬м№ҙл“ң_${name}.png`,{type:'image/png'});
    const fb=()=>{ if(noDownload()){ copy(greeting); toast('л¬ёкө¬лҘј ліөмӮ¬н–Ҳм–ҙмҡ” вҖ” м№ҙнҶЎм—җ л¶ҷм—¬л„Јм–ҙ ліҙлӮҙм„ёмҡ”'); return; }
      dlBlob(blob,`к°җмӮ¬м№ҙл“ң_${name}.png`); copy(greeting); toast('м№ҙл“ң мқҙлҜём§Җ м ҖмһҘ + л¬ёкө¬ ліөмӮ¬ вҖ” л¬ёмһҗ/м№ҙнҶЎм—җ мІЁл¶Җн•ҳм„ёмҡ”'); };
    try{ if(navigator.canShare && navigator.canShare({files:[file]})){
      navigator.share({files:[file],text:greeting}).then(()=>{ if(mark) markThanked(name); })
        .catch(err=>{ if(err&&err.name==='AbortError')return; fb(); }); return; } }catch(e){}

/* ======================= мЈјкі л°ӣмқҖ мӮ¬лһҢ (нҶөн•©В·кІҖмғү мқҙл Ҙ) ======================= */
const jsq=s=>(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;'); // onclick мҶҚм„ұмқҖ м—”нӢ°нӢ° л””мҪ”л“ң нӣ„ JS нҢҢмӢұ вҶ’ &quot; м•Ҳм „
function unifiedPeople(){ const map={};
  const push=(name,relation,item)=>{ const k=(name||'').trim(); if(!k)return;
    if(!map[k])map[k]={name:k,relation:relation||'',items:[]}; if(relation&&!map[k].relation)map[k].relation=relation; map[k].items.push(item); };
  (S.people||[]).forEach(p=>{ const k=(p.name||'').trim(); if(k&&!map[k]) map[k]={name:k,relation:p.relation||'',items:[]}; // мқҙл Ҙ 0кұҙлҸ„ лӘ©лЎқВ·мғҒм„ём—җ л…ём¶ң
    (p.items||[]).forEach(it=>push(p.name,p.relation,{dir:it.dir,amount:it.amount,label:it.label,date:it.date,src:'manual',auto:false,pid:p.id,iid:it.id})); });
  S.events.filter(e=>e.role==='host').forEach(e=>{ (e.guests||[]).forEach(g=>{ const p=g.pay||{}; if(p.amount>0) push(g.name,g.relation,{dir:'received',amount:p.amount,label:evNamePlain(e)+' '+cfg(e).label,date:e.date,src:p.source==='app'?'app':(p.method==='cash'?'cash':'manual'),auto:true}); }); });
  S.events.filter(e=>e.role!=='host'&&e.myGift>0).forEach(e=>{ push(evNamePlain(e), e.myRelation, {dir:'gave',amount:e.myGift,label:cfg(e).label+' м°ём„қ',date:e.date,src:'app',auto:true}); });
  return Object.values(map).sort((a,b)=>{ const la=a.items.reduce((m,i)=>(i.date||'')>m?i.date:m,''), lb=b.items.reduce((m,i)=>(i.date||'')>m?i.date:m,''); return lb.localeCompare(la); }); }
function pStats2(p){ let gave=0,recv=0; p.items.forEach(it=>{ if(it.dir==='gave')gave+=it.amount; else recv+=it.amount; }); return {gave,recv,net:gave-recv}; }
function balHint(net){ if(net>0) return `<span class="bal pos">лҚ” ліҙлғ„</span>`;
  if(net<0) return `<span class="bal neg">лҚ” л°ӣмқҢ</span>`; return `<span class="bal even">к· нҳ•</span>`; }

/* ======================= н’Ҳм•—мқҙ мғҒнҳё м•ҢлҰј: мЈјкі л°ӣмқҖ кё°лЎқмқҙ мһҲлҠ” л¶„мқҳ кІҪмЎ°мӮ¬лҘј лҶ“м№ҳм§Җ м•ҠкІҢ =======================
   м„ңлІ„ м—Ҷмқҙ к°ҖлҠҘн•ң л°©мӢқ: кІҪмЎ°мӮ¬мқҳ мЈјмқёкіө мқҙлҰ„мқ„ лӮҙ 'мЈјкі л°ӣмқҖ мӮ¬лһҢ' кё°лЎқкіј л§Өм№ӯ.
   в‘ мғҒм„ё нҷ”л©ҙ н’Ҳм•—мқҙ м№ҙл“ң(л°ӣмқҖ л§ҢнҒј ліҙлӢө мӣҗн„°м№ҳ) в‘Ўм¶”к°Җ м§Ғнӣ„ нҶ мҠӨнҠё в‘ўмһ„л°• м•ҢлҰјм—җ ліҙлӢө л¬ёкө¬. */
function reciOn(){ return !(S.settings&&S.settings.recipro===false); } // кё°ліё мјңм§җ вҖ” м„Өм •м—җм„ң лҒҢ мҲҳ мһҲмқҢ
function toggleRecipro(){ S.settings=S.settings||{}; S.settings.recipro=!reciOn(); save(); render();
  toast(reciOn()?'н’Ҳм•—мқҙ м•ҢлҰјмқ„ мј°м–ҙмҡ” вҖ” мЈјкі л°ӣмқҖ л¶„мқҳ кІҪмЎ°мӮ¬лҘј мұҷкІЁл“ңлҰҙкІҢмҡ”':'н’Ҳм•—мқҙ м•ҢлҰјмқ„ к»җм–ҙмҡ”'); }
function reciFor(ev){ if(!reciOn()||!ev||ev.role==='host') return null;
  const names=[evNamePlain(ev),ev.partyA,ev.partyB].map(s=>(s||'').trim()).filter(s=>s.length>=2);
  if(!names.length) return null;
  try{ const ppl=unifiedPeople();
    for(const nm of names){ const p=ppl.find(x=>x.name===nm); if(!p) continue;
      // мқҙ н–үмӮ¬м—җм„ң лӮҙк°Җ ліҙлӮё кё°лЎқмқҖ 'кіјкұ°'к°Җ м•„лӢҳ вҖ” мһҗлҸҷ(myGift нҢҢмғқ)мқҙл“  мҲҳкё°л“  к°ҷмқҖ лӮ м§ңмқҳ gaveлҠ” мқҙ н–үмӮ¬ кІғмңјлЎң к°„мЈјн•ҙ м ңмҷё
      const items=p.items.filter(it=>!(it.dir==='gave'&&it.date===ev.date));
      if(!items.length) continue;
      let gave=0,recv=0,recvMax=0;
      items.forEach(it=>{ const a=it.amount||0; if(it.dir==='gave')gave+=a; else{ recv+=a; if(a>recvMax)recvMax=a; } });
      if(!gave&&!recv) continue;
      return {name:p.name,gave,recv,recvMax,count:items.length}; } }catch(e){}
  return null; }

  const mem=ev.type==='memorial';
  return `<div class="card" style="border-color:var(--gold);background:var(--tint2)">
    <div class="secthead"><div class="t">рҹ”„ н’Ҳм•—мқҙ вҖ” мЈјкі л°ӣмқҖ кё°лЎқмқҙ мһҲлҠ” л¶„мқҙм—җмҡ”</div>
      <button class="minibtn" onclick="openPerson('${jsq(r.name)}')">лӮҙм—ӯ</button></div>
    <p class="sub" style="margin:6px 0 0"><b>${esc(r.name)}</b>лӢҳкіј ${r.count}кұҙ вҖ” л°ӣмқҖ ${won(r.recv)} В· ліҙлӮё ${won(r.gave)} ${balHint(r.gave-r.recv)}</p>
    ${r.recvMax>0?`<button class="btn btn-sage btn-sm" style="margin-top:10px" onclick="setAmt(${r.recvMax});toast('л°ӣмқҖ л§ҢнҒј мұ„мӣҢл’Җм–ҙмҡ” вҖ” м•„лһҳм—җм„ң ліҙлӮҙм„ёмҡ”')">${mem?'рҹ•ҠпёҸ л°ӣмқҖ л§ҲмқҢ лҸҢл Өл“ңлҰ¬кё°':'рҹ’һ л°ӣмқҖ л§ҢнҒј ліҙлӢөн•ҳкё°'} В· ${won(r.recvMax)}</button>`:''}
    <p class="lblnote" style="margin-top:7px">${mem?'мҠ¬н””мқҳ кіҒмқ„ м§ҖмјңмӨҖ л§ҲмқҢ, мһҠм§Җ м•Ҡкі  лҸҢл Өл“ңлҰ¬м„ёмҡ”.':'н•ң лІҲ л°ӣмқҖ л§ҲмқҢ, мһҠм§Җ м•Ҡкі  мқҙм–ҙл“ңлҰҙкІҢмҡ”.'}</p>
  </div>`; }
function reciToastFor(ev){ try{ const r=reciFor(ev); if(!r) return; const mem=ev.type==='memorial';
  setTimeout(()=>toast(`рҹ”„ ${r.name}лӢҳкіј мЈјкі л°ӣмқҖ кё°лЎқмқҙ мһҲм–ҙмҡ”${r.recvMax>0?(mem?` вҖ” л°ӣмқҖ ${won(r.recvMax)}, л§ҲмқҢмқ„ лҸҢл Өл“ңлҰҙ м°ЁлЎҖмҳҲмҡ”`:` вҖ” л°ӣмқҖ ${won(r.recvMax)}, ліҙлӢө мһҠм§Җ л§Ҳм„ёмҡ”`):' вҖ” мғҒм„ём—җм„ң нҷ•мқён•ҳм„ёмҡ”'}`),700); }catch(e){} }

function groupState(){ if(!S.ui.group) S.ui.group={mode:'total', total:300000, n:5, per:50000}; return S.ui.group; }
function openGroup(){ groupState(); S.ui.guestView='group'; save(); render(); window.scrollTo(0,0); }
function groupSet(k,v){ const g=groupState(); if(k==='mode'){g.mode=v;save();render();return;} g[k]=v===''?0:(Number(v)||0); save(); recalcGroup(); }
function groupCalc(){ const g=groupState(); const n=Math.max(1,+g.n||1);
  if(g.mode==='total'){ const per=Math.round((+g.total||0)/n/1000)*1000; return {n, per, total:+g.total||0}; }
  const per=+g.per||0; return {n, per, total:per*n}; }
function recalcGroup(){ const r=groupCalc(); const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  set('g-per',won(r.per)); set('g-total',won(r.total)); set('g-n',r.n+'лӘ…'); }

/* ======================= лҰ¬л§ҲмқёлҚ” В· м•ҢлҰј ======================= */
function upcomingSoon(){ const t=new Date(); t.setHours(0,0,0,0);
  return S.events.filter(e=>{ if(!e.date)return false; const d=new Date(e.date+'T00:00'); const days=Math.round((d-t)/86400000); return days>=0&&days<=7; })
    .sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time)); }
function reminderBanner(){ const soon=upcomingSoon(); if(!soon.length) return '';
  const ev=soon[0]; const c=cfg(ev);
  return `<div class="card remind">
    <div class="rm-top"><span class="rm-h">рҹ”” кі§ лӢӨк°ҖмҷҖмҡ”</span>
      <button class="rm-noti ${S.ui.noti?'on':''}" onclick="toggleNoti()">${S.ui.noti?'вң“ м•ҢлҰј мјңм§җ':'м•ҢлҰј л°ӣкё°'}</button></div>
    <div class="rm-ev" onclick="openEvent('${ev.id}')">
      <span class="rm-ic">${c.icon}</span>
      <div class="rm-info"><div class="rm-nm">${esc(evNamePlain(ev))} <span class="rm-tag">${c.label}</span></div>
        <div class="rm-dt">${dateText(ev)}</div></div>
      <span class="rm-dd">${dday(ev)}</span></div>
    ${soon.length>1?`<div class="rm-more">мҷё ${soon.length-1}кұҙмқҙ мқјмЈјмқј лӮҙм—җ мһҲм–ҙмҡ”</div>`:''}
  </div>`; }
function toggleNoti(){ if(!('Notification' in window)){ toast('мқҙ лёҢлқјмҡ°м ҖлҠ” м•ҢлҰјмқ„ м§Җмӣҗн•ҳм§Җ м•Ҡм•„мҡ”'); return; }
  if(S.ui.noti){ S.ui.noti=false; save(); render(); toast('м•ҢлҰјмқ„ к»җм–ҙмҡ”'); return; }
  Promise.resolve(Notification.requestPermission()).then(p=>{ if(p==='granted'){ S.ui.noti=true; save(); render();
      try{ new Notification('мқҙмқҢ м•ҢлҰјмқҙ мјңмЎҢм–ҙмҡ”', {body:'лӢӨк°ҖмҳӨлҠ” кІҪмЎ°мӮ¬лҘј лҜёлҰ¬ м•Ңл Өл“ңлҰҙкІҢмҡ”.', icon:'icon-192.png'}); }catch(e){}
      fireDueNotis();
    } else { toast('м•ҢлҰј к¶Ңн•ңмқҙ кұ°л¶Җлҗҳм—Ҳм–ҙмҡ”'); } }).catch(()=>toast('м•ҢлҰјмқ„ мјӨ мҲҳ м—Ҷм–ҙмҡ”')); }
function fireDueNotis(){ if(!S.ui.noti||!('Notification' in window)||Notification.permission!=='granted')return;
  const t=new Date(); t.setHours(0,0,0,0);
  upcomingSoon().forEach(ev=>{ const d=new Date(ev.date+'T00:00'); const days=Math.round((d-t)/86400000);
    if(days<=1){ try{ const r=reciFor(ev); // н’Ҳм•—мқҙ: мЈјкі л°ӣмқҖ л¶„мқҳ н–үмӮ¬л©ҙ ліҙлӢө лҰ¬л§Ҳмқёл“ңлҘј н•Ёк»ҳ
      const reciTxt=r&&r.recvMax>0?(ev.type==='memorial'?` вҖ” рҹ”„ л°ӣмқҖ ${won(r.recvMax)}, л§ҲмқҢмқ„ лҸҢл Өл“ңлҰҙ м°ЁлЎҖ`:` вҖ” рҹ”„ л°ӣмқҖ ${won(r.recvMax)}, ліҙлӢө мһҠм§Җ л§Ҳм„ёмҡ”`):'';
      new Notification(`${evNamePlain(ev)} ${cfg(ev).label} ${dday(ev)}`, {body:`${dateText(ev)} В· ${ev.venue||''}`+reciTxt, icon:'icon-192.png', tag:'ieum-'+ev.id}); }catch(e){} } }); }

/* ======================= м—°к°„ кІҪмЎ°мӮ¬л№„ лҰ¬нҸ¬нҠё (кіөмң ) ======================= */
function monthlyChart(){ // мөңк·ј 6к°ңмӣ” ліҙлғ„/л°ӣмқҢ л§үлҢҖ вҖ” мһҗлһ‘мҡ© кіөмң  м—Ҷмқҙ лӮҳлҘј мң„н•ң мҡ”м•Ҫ
  const now=new Date(); const months=[];
  for(let i=5;i>=0;i--){ const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    months.push({ym:d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'), label:(d.getMonth()+1)+'мӣ”', sent:0, recv:0}); }
  const idx={}; months.forEach(m=>idx[m.ym]=m);
  S.events.forEach(e=>{ if(e.demo||e.tut) return; const m=idx[(e.date||'').slice(0,7)]; if(!m) return;
    if(e.role==='host'){ m.recv+=ledgerStats(e).total; } else if(e.myGift>0){ m.sent+=e.myGift; } });
  (S.people||[]).forEach(p=>{ if(p.demo||p.tut) return; (p.items||[]).forEach(it=>{ const m=idx[(it.date||'').slice(0,7)];
    if(!m||!(it.amount>0)) return; if(it.dir==='gave') m.sent+=it.amount; else m.recv+=it.amount; }); });
  if(!months.some(m=>m.sent||m.recv)) return '';
  const max=Math.max(1,...months.map(m=>Math.max(m.sent,m.recv)));
  return `<div class="card"><div class="secthead"><div class="t">мӣ”лі„ кІҪмЎ°мӮ¬л№„ В· мөңк·ј 6к°ңмӣ”</div>
      <div class="c"><span style="color:var(--primary)">в– </span> ліҙлғ„ <span style="color:var(--sage)">в– </span> л°ӣмқҢ</div></div>
    <div style="display:flex;gap:6px;align-items:flex-end;height:112px;margin-top:12px">
      ${months.map(m=>`<div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:3px;height:100%">
        <div style="display:flex;gap:2px;align-items:flex-end;justify-content:center;width:100%;height:90px">
          <div style="width:38%;max-width:14px;height:${Math.round(m.sent/max*100)}%;min-height:${m.sent?3:0}px;background:var(--primary);border-radius:3px 3px 0 0"></div>
          <div style="width:38%;max-width:14px;height:${Math.round(m.recv/max*100)}%;min-height:${m.recv?3:0}px;background:var(--sage);border-radius:3px 3px 0 0"></div>
        </div>
        <div style="font-size:10.5px;color:var(--muted);font-variant-numeric:tabular-nums">${m.label}</div></div>`).join('')}
    </div></div>`; }

/* ---- мІӯмІ©мһҘ URL мһҗлҸҷ л¶„м„қ: м„ңлІ„к°Җ м—Ҷм–ҙ кіөк°ң CORS н”„лЎқмӢңлҘј кІҪмң н•ҙ HTMLмқ„ мқҪмқҢ ---- */
const INVITE_PROXIES=[
  u=>'https://corsproxy.io/?url='+encodeURIComponent(u),
  u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u),
  u=>'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(u)
];
async function fetchInviteHtml(url){
  for(const mk of INVITE_PROXIES){
    try{ const ctl=new AbortController(); const tm=setTimeout(()=>ctl.abort(),9000);
      const r=await fetch(mk(url),{signal:ctl.signal}); clearTimeout(tm);
      if(!r.ok) continue; const t=await r.text();
      if(t && t.length>300) return t;
    }catch(e){}
  }
  return null;
}
function parseInviteHtml(html, url){
  const doc=new DOMParser().parseFromString(html,'text/html');
  const meta=n=>{const m=doc.querySelector(`meta[property="${n}"],meta[name="${n}"]`);return (m&&m.getAttribute('content'))||'';};
  const ogT=meta('og:title'), ogD=meta('og:description'), twT=meta('twitter:title'), twD=meta('twitter:description');
  let ogImg=meta('og:image'); try{ if(ogImg) ogImg=new URL(ogImg, url).href; }catch(e){ ogImg=''; }
  const title=(doc.querySelector('title')||{}).textContent||'';

  let hh,mm=0,pm=false,am=false, tm=text.match(/(мҳӨм „|мҳӨнӣ„)?\s*(\d{1,2})\s*мӢң\s*(\d{1,2})?\s*л¶„?/);

/* ======================= мҳҲмғҒ н•ҳк°қВ·мҳҲмӮ° кі„мӮ°кё° ======================= */
function planVals(ev){ const pl=ev.plan||{};
  return { sent:+pl.sent||0, rate:pl.rate!=null?+pl.rate:60, meal:pl.meal!=null?+pl.meal:60000, gift:pl.gift!=null?+pl.gift:80000 }; }
function planInput(k,v){ const ev=hostEvent(); if(!ev.plan)ev.plan={}; ev.plan[k]=v===''?null:Number(v); save(); recalcBudget(); }
function recalcBudget(){ const ev=hostEvent(); if(!ev)return; const {sent,rate,meal,gift}=planVals(ev);
  const g=Math.round(sent*rate/100), income=g*gift, mc=g*meal, net=income-mc;
  const set=(id,val)=>{const el=document.getElementById(id); if(el)el.textContent=val;};
  set('bd-guests',g); set('bd-income',won(income)); set('bd-meal',won(mc)); set('bd-net',won(net)); }
function budgetCard(ev){ const c=cfg(ev), pl=ev.plan||{}, {sent,rate,meal,gift}=planVals(ev), led=ledgerStats(ev);
  const g=Math.round(sent*rate/100), income=g*gift, mc=g*meal, net=income-mc;
  return `<div class="card">
    <div class="secthead"><div class="t">в‘Ј мҳҲмғҒ ${c.counts?'н•ҳк°қ':'мЎ°л¬ё'}В·мҳҲмӮ° кі„мӮ°кё°</div></div>
    <p class="sub">ліҙлӮё ${c.doc} мҲҳмҷҖ м°ём„қлҘ лЎң мҳҲмғҒ мқёмӣҗВ·мҳҲмӮ°мқ„ мӢңл®¬л Ҳмқҙм…ҳн•©лӢҲлӢӨ.</p>
    <div class="row">
      <div><label>ліҙлӮё ${c.doc} мҲҳ</label><input type="number" inputmode="numeric" value="${pl.sent??''}" placeholder="мҳҲ: 200" oninput="planInput('sent',this.value)"></div>
      <div><label>мҳҲмғҒ м°ём„қлҘ (%)</label><input type="number" inputmode="numeric" value="${pl.rate??60}" oninput="planInput('rate',this.value)"></div>
    </div>
    <div class="row">
      <div><label>1мқё мӢқлҢҖ(мӣҗ)</label><input type="number" inputmode="numeric" value="${pl.meal??60000}" oninput="planInput('meal',this.value)"></div>
      <div><label>1мқё мҳҲмғҒ ${c.money}(мӣҗ)</label><input type="number" inputmode="numeric" value="${pl.gift??80000}" oninput="planInput('gift',this.value)"></div>
    </div>
    <div class="stats" style="margin-top:12px">
      <div class="stat"><div class="v" id="bd-guests">${g}</div><div class="k">мҳҲмғҒ ${c.counts?'м°ём„қ':'мЎ°л¬ё'} мқёмӣҗ</div></div>
      <div class="stat"><div class="v big" id="bd-income">${won(income)}</div><div class="k">мҳҲмғҒ ${c.money}</div></div>
      <div class="stat"><div class="v big" id="bd-meal">${won(mc)}</div><div class="k">мҳҲмғҒ мӢқлҢҖ</div></div>
    </div>
    <div class="budget-net">мҳҲмғҒ н•©кі„(мҲң) <b id="bd-net">${won(net)}</b></div>
    <div class="note">нҳ„мһ¬ мӢӨм ң ${c.counts?'м°ём„қ':'мЎ°л¬ё'} мқ‘лӢө <b>${led.attend}лӘ…</b> В· мӢӨмҲҳл № <b>${won(led.total)}</b> вҖ” мқ‘лӢөмқҙ мҢ“мқјмҲҳлЎқ мҳҲмёЎмқҙ м •нҷ•н•ҙм§‘лӢҲлӢӨ.</div>
  </div>`;
}

  t:'м–јл§Ҳк°Җ мҳҲмқҳмқјк№Ң?', x:'кҙҖкі„В·м°ём„қ м—¬л¶Җл§Ң кі лҘҙл©ҙ н•ңкөӯ мӢңм„ё кё°мӨҖмңјлЎң м¶”мІңн•ҙмҡ”. 4В·6В·8л§ҢмқҖ м•Ңм•„м„ң н”јн•ҙл“ңл Өмҡ”.'},
 {at:'ledger', v:()=>{S.ui.tab='guest';S.ui.guestView='ledger';}, sel:'.stats',
  t:'кІҪмЎ°мӮ¬л№„ к°Җкі„л¶Җ', x:'ліҙлӮё лҸҲВ·л°ӣмқҖ лҸҲВ·н•©кі„к°Җ мһҗлҸҷмңјлЎң м •лҰ¬лҸјмҡ”. мӮ¬лһҢ мқҙлҰ„мңјлЎң м§ҖлӮң кё°лЎқлҸ„ кІҖмғү!'},
 {at:'list', v:()=>{S.ui.tab='guest';S.ui.guestView='list';}, sel:'.badge-add',
  t:'мІӯмІ©мһҘ к°Җм ёмҳӨкё°', x:'м№ҙнҶЎмңјлЎң л°ӣмқҖ мІӯмІ©мһҘ л§ҒнҒ¬лҘј л¶ҷм—¬л„Јмңјл©ҙ мқҙлҰ„В·лӮ м§ңВ·кі„мўҢк№Ңм§Җ мһҗлҸҷмңјлЎң мұ„мӣҢм ёмҡ”.\n\nнҠңнҶ лҰ¬м–ј лҒқ! лҚ°лӘЁлҠ” м§ҖмӣҢм§Җкі , мқҙм ң м§„м§ң кІҪмЎ°мӮ¬лҘј лӢҙм•„ліҙм„ёмҡ” рҹҺү'},
];
function startTutorial(){ if(TUT.on) return;
  TUT.on=true; TUT.last=-1; if(S.meta) S.meta.tutDone=true;
  fillSample(); tutGo(0); }
function tutGo(i){ if(!TUT.on) return;
  if(i>=TUT_STEPS.length){ endTutorial(true); return; }
  TUT.i=Math.max(0,i); S.ui.entered=true; TUT_STEPS[TUT.i].v(); save(); render(); window.scrollTo(0,0); }
function tutTeardown(){ document.querySelectorAll('.tut-hi').forEach(e=>e.classList.remove('tut-hi'));
  const b=document.getElementById('tutbox'); if(b) b.remove(); }
function abortTutorial(){ // лһңл”© мқҙнғҲВ·л©ҖнӢ°нғӯ лҸҷкё°нҷ”В·мһҗлҸҷліөкө¬ л“ұ: нҷ”л©ҙ к°•м ң мқҙлҸҷ м—Ҷмқҙ мЎ°мҡ©нһҲ мў…лЈҢ+м •лҰ¬
  if(!TUT.on) return; TUT.on=false; tutTeardown(); try{ cleanupDemo(); }catch(e){} }
function tutApply(){ if(!TUT.on) return;
  document.querySelectorAll('.tut-hi').forEach(e=>e.classList.remove('tut-hi'));
  const st=TUT_STEPS[TUT.i];
  // мӮ¬мҡ©мһҗк°Җ лӢӨлҘё нҷ”л©ҙмңјлЎң мқҙлҸҷн–Ҳмңјл©ҙ лҸҷлӘ… мҡ”мҶҢ мҳӨнғҗ н•ҳмқҙлқјмқҙнҠё кёҲм§Җ вҶ’ ліөк·Җ лІ„нҠј м ңкіө
  const onStep = S.ui.entered && S.ui.tab==='guest' && S.ui.guestView===st.at && (!st.ev || S.ui.currentEventId===st.ev);
  const el = onStep ? document.querySelector(st.sel) : null;
  let box=document.getElementById('tutbox');
  if(!box){ box=document.createElement('div'); box.id='tutbox'; box.className='tutbox'; document.body.appendChild(box); }
  const last=TUT.i===TUT_STEPS.length-1;
  box.innerHTML=`<button class="x" onclick="endTutorial(false)" aria-label="нҠңнҶ лҰ¬м–ј лӢ«кё°">вң•</button>
    <div class="tt">${st.t}</div><div class="tx">${st.x.replace(/\n/g,'<br/>')}</div>
    ${!el?`<button class="btn btn-line btn-sm" style="margin-top:10px" onclick="tutGo(${TUT.i})">вҶ© мқҙ лӢЁкі„ нҷ”л©ҙмңјлЎң лҸҢм•„к°Җкё°</button>`:''}
    <div class="tutdots">${TUT_STEPS.map((_,k)=>`<i class="${k===TUT.i?'on':''}"></i>`).join('')}</div>
    <div class="tutbtns">
      ${TUT.i>0?`<button class="btn btn-ghost btn-sm" style="flex:1" onclick="tutGo(${TUT.i-1})">мқҙм „</button>`:''}
      <button class="btn btn-primary btn-sm" style="flex:2" onclick="tutGo(${TUT.i+1})">${last?'мӢңмһ‘н•ҳкё° рҹҺү':'лӢӨмқҢ'}</button>
    </div>`;
  if(el){ el.classList.add('tut-hi');
    if(TUT.last!==TUT.i){ try{ el.scrollIntoView({block:'center',behavior:'smooth'}); }catch(e){} TUT.last=TUT.i; } // мҠӨн…қлӢ№ 1нҡҢл§Ң мҠӨнҒ¬лЎӨ
    tutPlace(el,box); setTimeout(()=>{ if(TUT.on) tutPlace(el,box); },350);
  } else { box.style.top='auto'; box.style.bottom='90px'; box.style.left='50%'; box.style.transform='translateX(-50%)'; }
}
function tutPlace(el,box){ if(!TUT.on||!document.body.contains(el)) return;
  const r=el.getBoundingClientRect(), bh=box.offsetHeight||180, bw=Math.min(340,innerWidth-40);
  box.style.transform='none'; box.style.bottom='auto';
  let top=r.bottom+12; if(top+bh>innerHeight-14) top=r.top-bh-12;
  if(top<10) top=Math.max(10, innerHeight-bh-96);
  const left=Math.min(Math.max(12, r.left+r.width/2-bw/2), innerWidth-12-bw);
  box.style.top=top+'px'; box.style.left=left+'px';
}
function endTutorial(done){ if(!TUT.on) return; TUT.on=false;
  tutTeardown();
  cleanupDemo();
  S.ui.tab='guest'; S.ui.guestView='list'; save(); render(); window.scrollTo(0,0);
  toast(done?'мӨҖл№„ лҒқ! мқҙм ң м§„м§ң кІҪмЎ°мӮ¬лҘј лӢҙм•„ліҙм„ёмҡ” рҹҺү':'нҠңнҶ лҰ¬м–јмқ„ лӢ«м•ҳм–ҙмҡ” вҖ” лҚ”ліҙкё°м—җм„ң м–ём ңл“  лӢӨмӢң ліј мҲҳ мһҲм–ҙмҡ”'); }
/* ---- лҚ°лӘЁ м •лҰ¬ ----
   tut(мқҙлІҲ нҠңнҶ лҰ¬м–ј мЈјмһ…л¶„) вҶ’ л¬ҙмЎ°кұҙ мӮӯм ң(м—°мҠө мЎ°мһ‘ нҸ¬н•Ё вҖ” "лҒқлӮҳл©ҙ м§ҖмӣҢм ёмҡ”" м•ҪмҶҚ).
   demo(л Ҳкұ°мӢң v1.0 мҶҢкёү нғңк№…л¶„) вҶ’ мқҙлҰ„ 1н•„л“ңк°Җ м•„лӢҲлқј 'м „мІҙ лӮҙмҡ© мӢңк·ёлӢҲмІҳ'к°Җ мҲңм • мғҳн”Ңкіј
   мҷ„м „нһҲ мқјм№ҳн•  л•Ңл§Ң мӮӯм ң. мһҘл¶ҖВ·н•ҳк°қВ·кёҲм•ЎВ·лӮ м§ң л“ұ м–ҙл–Ө нқ”м ҒмқҙлқјлҸ„ мһҲмңјл©ҙ мӢӨлҚ°мқҙн„°лЎң мҠ№кІ© ліҙнҳё. */
function _evSig(e){ return JSON.stringify({a:e.partyA,b:e.partyB,d:e.date,t:e.time,v:e.venue,ad:e.address,m:e.message,u:e.externalUrl||'',g:e.myGift||0,r:e.myRelation||'',
  ac:(e.accounts||[]).map(x=>[x.label,x.bank,x.number,x.holder,x.kakaopay||'']),
  gs:(e.guests||[]).map(x=>[x.name,x.relation,x.side||0,(x.rsvp||{}).status||null,(x.rsvp||{}).count||1,(x.pay||{}).amount==null?null:x.pay.amount,(x.pay||{}).method||null])
     .sort((p,q)=>String(p[0]).localeCompare(String(q[0])))}); }
function _ppSig(p){ return JSON.stringify({n:p.name,r:p.relation||'',
  it:(p.items||[]).map(i=>[i.dir,i.amount,i.label,i.date]).sort((a,b)=>String(a).localeCompare(String(b)))}); }
function cleanupDemo(){ let changed=false;
  const sd=sampleData(); const eSig={}, pSig={};
  sd.events.forEach(e=>eSig[e.id]=_evSig(e)); sd.people.forEach(p=>pSig[p.id]=_ppSig(p));
  S.events=S.events.filter(e=>{ if(!e.demo&&!e.tut) return true;
    if(e.tut || (eSig[e.id] && _evSig(e)===eSig[e.id])){ changed=true; return false; }
    delete e.demo; delete e.tut; changed=true; return true; });
  S.people=S.people.filter(p=>{ if(!p.demo&&!p.tut) return true;
    if(p.tut || (pSig[p.id] && _ppSig(p)===pSig[p.id])){ changed=true; return false; }
    delete p.demo; delete p.tut; changed=true; return true; });
  if(S.ui.currentEventId && !S.events.find(e=>e.id===S.ui.currentEventId)){ S.ui.currentEventId=null; if(S.ui.guestView==='detail')S.ui.guestView='list'; }
  if(S.ui.hostEventId && !S.events.find(e=>e.id===S.ui.hostEventId)) S.ui.hostEventId=null;
  if(changed) save(); return changed; }
window.addEventListener('resize', ()=>{ try{ if(TUT.on){ const el=document.querySelector(TUT_STEPS[TUT.i].sel); const box=document.getElementById('tutbox'); if(el&&box) tutPlace(el,box); } }catch(e){} });

/* ======================= м•Ҳл“ңлЎңмқҙл“ң л’ӨлЎңк°Җкё° м§Җмӣҗ ======================= */
// м„ёл¶Җ нҷ”л©ҙм—җм„ң н•ҳл“ңмӣЁм–ҙ л°ұлІ„нҠј = м•ұ мў…лЈҢк°Җ м•„лӢҲлқј 'н•ң лӢЁкі„ мң„лЎң'. к°Җл“ң м—”нҠёлҰ¬ 1к°ң мң м§Җ нҢЁн„ҙ.
let _histGuard=false;
function atTopLevel(){ return !S.ui.entered ||
  (S.ui.tab==='guest' && ['list','ledger','reco','more'].includes(S.ui.guestView)
   && !(typeof TUT!=='undefined'&&TUT.on) && !document.getElementById('paysheet') && !document.getElementById('calpop') && !document.getElementById('rgsheet')); }
function histGuard(){ if(_histGuard || atTopLevel()) return;
  _histGuard=true; try{ history.pushState({ieum:1},''); }catch(e){} }
window.addEventListener('popstate', ()=>{
  _histGuard=false;
  if(atTopLevel()) return; // мөңмғҒмң„л©ҙ к·ёлҢҖлЎң вҖ” н•ң лІҲ лҚ” лҲ„лҘҙл©ҙ мў…лЈҢ
  try{
    if(document.getElementById('rgsheet')) closeRestoreGuide();
    else if(document.getElementById('calpop')) closeCalPopup();
    else if(document.getElementById('paysheet')) declinePass();
    else if(typeof TUT!=='undefined'&&TUT.on) endTutorial(false);
    else if(S.ui.tab==='host'){ if(S.ui.hostSub==='thanks'){ backFromHost2(); } else { backFromHost(); } }
    else { const v=S.ui.guestView;
      if(v==='invite') declineInvite();
      else if(v==='person'||v==='personadd') openPeople();
      else if(v==='tx') setGuestTab('ledger');
      else if(v==='people') setGuestTab('ledger');
      else if(v==='settings'||v==='doc'||v==='group'||v==='envelope') setGuestTab('more');
      else backToList(); }
  }catch(e){}
  histGuard(); // м—¬м „нһҲ м„ёл¶Җ нҷ”л©ҙмқҙл©ҙ к°Җл“ң мһ¬мһҘм „
});

/* ======================= л¶ҖнҢ… ======================= */
window.addEventListener('error', ()=>{ try{ toast('мқјмӢңм Ғмқё л¬ём ңк°Җ л°ңмғқн–Ҳм–ҙмҡ”'); }catch(e){} });
applyTheme();
kakaoInit();
try{ if(!TUT.on && cleanupDemo()) {} }catch(e){}  // нҠңнҶ лҰ¬м–ј мӨ‘ м•ұмқҙ кәјм ё лӮЁмқҖ лҚ°лӘЁ мһҗлҸҷ м •лҰ¬
render();
try{ tryAutoRecover(); }catch(e){}
try{ payRecoverBoot(); }catch(e){}  // лҜёмҷ„ кІ°м ң мһҗлҸҷ ліөкө¬(мҠ№мқё мң мӢӨВ·м„Өм№ҳм•ұ нҢҢнӢ°м…ҳ)
try{ if(S.ui.noti) fireDueNotis(); }catch(e){}
try{ relayPull(); }catch(e){}  // нҳёмҠӨнҠё: лҰҙл Ҳмқҙ мӮ¬м„ңн•Ёмқҳ н•ҳк°қ мқ‘лӢө мһҗлҸҷ л°ҳмҳҒ (RELAY.url м„Өм • мӢңм—җл§Ң)
try{ bootRawSnapshot(); }catch(e){}  // м—…лҚ°мқҙнҠё м§Ғнӣ„м—җлҸ„ 'к°Җкіө м „ мӣҗліё' 3м„ёлҢҖ ліҙмЎҙ
/* мў…лЈҢВ·л°ұк·ёлқјмҡҙл“ң м „нҷҳ мӢң мһҗлҸҷ л°ұм—…(кё°кё° лӮҙ лҜёлҹ¬+мҠӨлғ…мғ·) вҖ” лҰ¬л§ҲмқёлҚ” м—Ҷмқҙ н•ӯмғҒ мөңмӢ  мң м§Җ */
addEventListener('visibilitychange',()=>{ if(document.visibilityState!=='hidden') return;
  try{ localStorage.setItem(LS, JSON.stringify(S)); }catch(e){}
  try{ mirror(); }catch(e){} try{ dailySnapshot(); }catch(e){} });
addEventListener('pagehide',()=>{ try{ mirror(); }catch(e){} });

/* PWA: м„ңл№„мҠӨ мӣҢм»Ө л“ұлЎқ */
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./service-worker.js?v=3').catch(()=>{});});}
</script>
